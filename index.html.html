<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>кІҢмһ„мӢ мҙҢ м—…л¬ҙ нҳ„нҷ©нҢҗ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid #E8ECF0;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;display:flex;flex-direction:column}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid #F0F2F5}
.sb-logo-txt{font-size:13px;font-weight:900;color:#1A2340}
.sb-logo-sub{font-size:10px;color:#8A97B0;margin-top:2px;font-weight:500}
.sb-sec{padding:14px 10px 4px}
.sb-sec-lbl{font-size:10px;font-weight:700;color:#B0BEC5;letter-spacing:.7px;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:#5A6785;font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:#F5F7FA;color:#1A2340}
.sb-item.on{background:#EFF4FF;color:#2563EB;font-weight:700}
.sb-item .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-sub{padding-left:14px;margin-top:2px}
.sb-sub-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;cursor:pointer;color:#8A97B0;font-size:12px;font-weight:500;transition:all .15s;margin-bottom:1px;border-left:2px solid transparent}
.sb-sub-item:hover{color:#1A2340;background:#F5F7FA}
.sb-sub-item.on{color:#2563EB;font-weight:700;border-left-color:#2563EB;background:#EFF4FF}
.sb-divider{border:none;border-top:1px solid #F0F2F5;margin:6px 12px}
.sb-footer{padding:14px 16px;border-top:1px solid #F0F2F5;margin-top:auto}
.content-wrap{margin-left:200px;flex:1;min-width:0}
.wnav{display:none!important}

:root{
  --bg:#F5F7FA;--bg2:#fff;--bg3:#EEF2F7;--border:#DDE3ED;
  --text:#1A2340;--text2:#5A6785;--text3:#8A97B0;
  --accent:#2563EB;--accent-light:#EFF4FF;
  --gold:#D97706;--gold-light:#FFFBEB;
  --green:#16A34A;--red:#DC2626;--purple:#7C3AED;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;max-width:1400px;margin:0 auto}
.logo{font-size:18px;font-weight:900;color:var(--text)}.logo span{color:var(--accent)}
.hdr-r{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{background:var(--accent-light);border:1px solid #BFCFFF;color:var(--accent);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sdot.live{background:var(--green);animation:blink 2s infinite}
.slbl{font-size:11px;color:var(--text3)}
.dstr{color:var(--text3);font-size:12px;font-family:'Roboto Mono',monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.wnav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px}
.wnav-in{display:flex;max-width:1400px;margin:0 auto;overflow-x:auto}
.wtab{padding:12px 18px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none}
.wtab:hover{color:var(--text)}.wtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.wtab.biz.on{color:var(--purple);border-bottom-color:var(--purple)}
.per{font-size:11px;font-weight:400;opacity:.8;margin-left:4px}
.main{max-width:1400px;margin:0 auto;padding:20px}
.stitle{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--text)}
.stitle::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;border-top:3px solid var(--border)}
.kc.a{border-top-color:var(--accent)}.kc.g{border-top-color:var(--green)}
.kc.go{border-top-color:var(--gold)}.kc.r{border-top-color:var(--red)}.kc.p{border-top-color:var(--purple)}
.klbl{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px}
.kval{font-size:19px;font-weight:900;font-family:'Roboto Mono',monospace;color:var(--text);letter-spacing:-1px}
.ksub{font-size:11px;color:var(--text3);margin-top:2px}
/* daily */
.dw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:11px}
.dc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.dc label{font-size:11px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px}
.dinp{width:100%;padding:6px 8px;background:var(--bg2);border:1.5px solid var(--accent);border-radius:6px;color:var(--accent);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto Mono',monospace}
.dinp:focus{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.dcalc{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px}
.dcc{border-radius:8px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
/* team cards */
.tg{display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:13px;margin-bottom:18px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tch{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.tnm{font-size:15px;font-weight:900;color:#fff}.tmb{font-size:11px;color:rgba(255,255,255,.75)}
.tcb{padding:13px 14px}
.sbdg{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;margin-bottom:10px;font-size:12px;font-weight:700}
.rs{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.ys{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.gs{background:#F0FDF4;color:#14532D;border:1px solid #BBF7D0}
.bs{background:#EFF4FF;color:#1E3A8A;border:1px solid #BFCFFF}
.pw{height:6px;background:var(--bg3);border-radius:3px;margin:4px 0 12px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .4s}
.ir{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.il{font-size:12px;color:var(--text2);font-weight:500}
.irr{display:flex;align-items:center;gap:5px}
.inp{width:126px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto Mono',monospace}
.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.iunit{font-size:11px;color:var(--text3)}
.dvd{border:none;border-top:1px solid var(--border);margin:9px 0}
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sl{font-size:12px;color:var(--text2)}.sv{font-size:13px;font-weight:700;font-family:'Roboto Mono',monospace;color:var(--text)}
.rbig{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:8px;margin-top:9px;border:1px solid var(--border)}
.rnum{font-size:20px;font-weight:900;font-family:'Roboto Mono',monospace}
.rmsg{font-size:11px;font-weight:700;text-align:right;line-height:1.4}
/* summary */
.sw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 11px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.tbl th:not(:first-child){text-align:right}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl td:not(:first-child){text-align:right;font-family:'Roboto Mono',monospace}
.tbl tr:last-child td{border-bottom:none;background:var(--gold-light);font-weight:700;color:var(--gold)}
.tdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
/* msg */
.mw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.cbtn{padding:6px 14px;border-radius:7px;background:var(--accent);color:#fff;font-weight:700;font-size:12px;border:none;cursor:pointer}
.cbtn:hover{background:#1D4ED8}.cbtn.done{background:var(--green)}
.mbox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'Roboto Mono',monospace;font-size:12px;line-height:1.9;color:var(--text2);white-space:pre-wrap;word-break:break-all}
/* review */
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(228px,1fr));gap:11px;margin-bottom:18px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px}
.rtm{font-size:13px;font-weight:700;margin-bottom:9px}
.rf{margin-bottom:7px}.rf label{font-size:11px;color:var(--text3);font-weight:700;display:block;margin-bottom:3px}
.rf textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px;resize:vertical;min-height:48px;line-height:1.6}
.rf textarea:focus{outline:none;border-color:var(--accent)}
.stblk{margin-bottom:11px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stmr{display:flex;align-items:center;gap:5px;padding:7px 8px;background:var(--accent-light);border-bottom:1px solid var(--border)}
.snmi{width:76px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:13px;font-weight:700;color:var(--accent);background:#fff;font-family:'Noto Sans KR',sans-serif}
.srki{width:56px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:12px;color:var(--text2);background:#fff;font-family:'Noto Sans KR',sans-serif}
.snmi:focus,.srki:focus{outline:none;border-color:var(--accent)}
.sslsh{font-size:14px;color:var(--text3);font-weight:700}
.sta{width:100%;border:none;border-radius:0;min-height:68px;background:var(--bg);color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:7px;resize:vertical;line-height:1.6;display:block}
.sta:focus{outline:none;background:#FFFDE7}
.sttl{font-size:12px;font-weight:700;color:var(--accent);margin:9px 0 7px;border-top:1px solid var(--border);padding-top:9px}
.rtn{text-align:center;padding:11px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;font-size:12px;color:#15803D;margin-bottom:18px;line-height:1.8}
/* biz */
.bsn{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:15px}
.bst{padding:9px 18px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;transition:all .15s}
.bst:hover{color:var(--text)}.bst.on{color:var(--purple);border-bottom-color:var(--purple)}
.btb{margin-bottom:18px}
.bth{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;color:#fff;border-radius:10px 10px 0 0;flex-wrap:wrap;gap:8px}
.btht{font-size:14px;font-weight:900}
.bths{display:flex;gap:10px;align-items:center;font-size:12px;flex-wrap:wrap}
.bmtbl{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.bmtbl th{padding:7px 9px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.bmtbl th:not(:first-child){text-align:right}
.bmtbl td{padding:8px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
.bmtbl tr:last-child td{border-bottom:none;background:var(--bg)}
.binp{padding:4px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-weight:700;font-family:'Roboto Mono',monospace;background:var(--bg);text-align:right;width:100%;box-sizing:border-box}
.binp:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.1);background:#fff}
.nr{text-align:right;font-family:'Roboto Mono',monospace;font-size:12px}
/* consult */
.csg{display:grid;grid-template-columns:repeat(auto-fit,minmax(142px,1fr));gap:10px;margin-bottom:13px}
.csc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;border-top:3px solid var(--border)}
.csc.g{border-top-color:var(--green)}.csc.go{border-top-color:var(--gold)}
.csc.p{border-top-color:var(--purple)}.csc.b{border-top-color:var(--accent)}
.cslb{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px}
.csv{font-size:16px;font-weight:900;font-family:'Roboto Mono',monospace;color:var(--text)}
.csse{font-size:11px;color:var(--text3);margin-top:2px}
.tcg{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:10px;margin-bottom:13px}
.tcc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tcch{padding:8px 12px;color:#fff;font-weight:900;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.tccb{padding:9px 12px}
.tcr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.tcr:last-child{border-bottom:none}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-inp{flex:1;max-width:320px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2)}
.search-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-clear{padding:7px 13px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.search-clear:hover{background:var(--bg3)}
.search-result-cnt{font-size:12px;color:var(--text3)}
.dhdr{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;user-select:none}
.dtc{font-size:13px;font-weight:700;color:var(--accent)}
.dts{font-size:11px;color:var(--text2);font-family:'Roboto Mono',monospace}
.ctbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:2px}
.ctbl th{padding:7px 8px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.ctbl td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.ctbl tr:last-child td{border-bottom:none}.ctbl tr:hover td{background:#FAFBFC}
.tsect{background:var(--bg);padding:4px 11px;font-size:11px;font-weight:700;border-left:3px solid}
.ci{width:100%;padding:4px 5px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--text)}
.ci:hover{border-color:var(--border);background:var(--bg)}.ci:focus{outline:none;border-color:var(--accent);background:#fff}
.cs{width:100%;padding:4px 3px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;cursor:pointer}
.cs:hover{border-color:var(--border);background:var(--bg)}.cs:focus{outline:none;border-color:var(--accent);background:#fff}
.cn{width:100%;padding:4px 5px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Roboto Mono',monospace;background:transparent;text-align:right;color:var(--text)}
.cn:hover{border-color:var(--border);background:var(--bg)}.cn:focus{outline:none;border-color:var(--accent);background:#fff}
.arb{width:100%;padding:5px;font-size:12px;color:var(--text3);background:var(--bg);border:1px dashed var(--border);border-top:none;cursor:pointer;border-radius:0 0 8px 8px}
.arb:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.dbc{width:21px;height:21px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
.dbc:hover{background:#FEE2E2;color:var(--red)}
@media(max-width:600px){.main{padding:14px}.kval{font-size:16px}.inp{width:108px}}
</style>
</head>
<body>
<div class="layout">

<!-- мӮ¬мқҙл“ңл°” -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-txt">кІҢмһ„мӢ мҙҢ</div>
    <div class="sb-logo-sub">м—…л¬ҙ нҳ„нҷ© мӢңмҠӨн…ң</div>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-lbl">л©”лүҙ</div>
    <div class="sb-item" id="nav-dash" onclick="W._swDash()"><span class="ico">рҹ“Ҡ</span> лҢҖмӢңліҙл“ң</div>
    <div class="sb-sub" id="nav-dash-sub" style="display:none">
      <div class="sb-sub-item" id="nav-w0" onclick="W._sw(0)">рҹ“… 1мЈјм°Ё</div>
      <div class="sb-sub-item" id="nav-w1" onclick="W._sw(1)">рҹ“… 2мЈјм°Ё</div>
      <div class="sb-sub-item" id="nav-w2" onclick="W._sw(2)">рҹ“… 3мЈјм°Ё</div>
      <div class="sb-sub-item" id="nav-w3" onclick="W._sw(3)">рҹ“… 4мЈјм°Ё</div>
    </div>
    <div class="sb-item" id="nav-biz" onclick="W._swBiz('мҡ”м•Ҫ')"><span class="ico">рҹ’ј</span> мҳҒм—…нҳ„нҷ©</div>
    <div class="sb-sub" id="nav-biz-sub" style="display:none">
      <div class="sb-sub-item" id="nav-biz-sum" onclick="W._swBiz('мҡ”м•Ҫ')">рҹ“Ҡ мҳҒм—… мҡ”м•Ҫ</div>
      <div class="sb-sub-item" id="nav-biz-con" onclick="W._swBiz('мғҒлӢҙлӮҙм—ӯ')">рҹ“Ӣ мғҒлӢҙ лӮҙм—ӯ</div>
    </div>
  </div>
  <hr class="sb-divider">
  <div class="sb-sec">
    <div class="sb-sec-lbl">м•„м№ҙмқҙлёҢ</div>
    <div id="sb-months"><div style="font-size:11px;color:#B0BEC5;padding:4px 8px">м ҖмһҘлҗң мӣ” м—ҶмқҢ</div></div>
  </div>
  <hr class="sb-divider">
  <div class="sb-sec">
    <div class="sb-sec-lbl">кҙҖлҰ¬</div>
    <a class="sb-item" href="admin.html"><span class="ico">вҡҷ</span> м„Өм •</a>
  </div>
  <div class="sb-footer">
    <div style="font-size:11px;color:#B0BEC5;line-height:1.8">
      <span class="sdot" id="sd"></span><span id="sl">м—°кІ° мӨ‘...</span><br>
      <span id="td"></span>
    </div>
  </div>
</div>

<!-- м»Ён…җмё  -->
<div class="content-wrap">
  <div class="hdr">
    <div class="hdr-in">
      <div id="page-title" style="font-size:15px;font-weight:700;color:var(--text)">лҢҖмӢңліҙл“ң</div>
      <div class="hdr-r">
        <div class="badge" id="goal-badge">рҹҺҜ 6мӣ” лӘ©н‘ң 431,000,000мӣҗ</div>
        <div><span class="sdot" id="sd2" style="display:none"></span></div>
        <div class="dstr" id="td2" style="display:none"></div>

function updDailyInp() {
  const map = [['dp','prevYear'],['dt','thisYear'],['dco','consult'],['dr','contract'],['ds','sales']];

    if (el && document.activeElement !== el)
      el.value = (k==='prevYear'||k==='thisYear'||k==='sales') ? F(DAILY[k]) : DAILY[k]||'';

}
function updDailyCalc() {
  const diff = DAILY.thisYear - DAILY.prevYear;
  const dv = document.getElementById('ddv'), dc = document.getElementById('ddc'), cv = document.getElementById('dcv');

// в”Җв”Җ мғҒлӢҙ м§‘кі„ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function calcMS() {
  const ms = {};
  TM_CFG.forEach(t => t.members.forEach(m => {
    ms[m] = {мғҒлӢҙ:0, л“ұлЎқ:0, лҜёл“ұлЎқ:0, м·ЁмҶҢ:0, мҷ„лӮ©:0, лҜёлӮ©:0};
  }));
  Object.values(CONSULT).forEach(day => {
    Object.values(day||{}).forEach(r => {
      const m = r.mentor; if (!ms[m]) return;
      if (r.status === 'мғҒлӢҙ') ms[m].мғҒлӢҙ++;
      if (r.result === 'мҷ„лӮ©') { ms[m].мҷ„лӮ© += N(r.paid); ms[m].л“ұлЎқ++; }
      if (r.result === 'лҜёлӮ©') { ms[m].лҜёлӮ© += N(r.expected); ms[m].лҜёл“ұлЎқ++; }
      if (r.result === 'лҜёл“ұлЎқнҡҢмҲҳ') { ms[m].мҷ„лӮ© += N(r.paid); ms[m].л“ұлЎқ++; }
      if (r.result === 'м·ЁмҶҢ') ms[m].м·ЁмҶҢ++;
      // м¶”к°Җ вҶ’ м•„л¬ҙкІғлҸ„ л°ҳмҳҒ м•Ҳн•Ё
    });
  });
  return ms;
}

// в”Җв”Җ мҳҒм—… нғӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showBiz() {
  document.getElementById('mc').style.display = 'none';
  document.getElementById('bc').style.display = '';
  const nav = `<div class="bsn">
    <button class="bst${bst==='мҡ”м•Ҫ'?' on':''}" onclick="W._bst('мҡ”м•Ҫ')">рҹ“Ҡ мҳҒм—… мҡ”м•Ҫ</button>
    <button class="bst${bst==='мғҒлӢҙлӮҙм—ӯ'?' on':''}" onclick="W._bst('мғҒлӢҙлӮҙм—ӯ')">рҹ“Ӣ мғҒлӢҙ лӮҙм—ӯ</button>
  </div>`;

  if (bst === 'мғҒлӢҙлӮҙм—ӯ') {
    const prevKw = document.getElementById('consult-search')?.value || '';
    document.getElementById('bc').innerHTML = nav + renderConsult(prevKw);
    return;
  }

  // мҳҒм—… мҡ”м•Ҫ
  const ms = calcMS();
  let totBiz=0, totTM=0, totRef=0, totInq=0, totмғҒлӢҙ=0, totл“ұлЎқ=0, totлҜёл“ұлЎқ=0, totм·ЁмҶҢ=0, totWan=0, totMi=0;
  let validCnt=0, sumRate=0;

  TM_CFG.forEach(t => {
    t.members.forEach(m => {
      const bd = BIZ[t.name]?.[m] || {sales:0,inquiry:0,totalSales:0,refund:0};
      totBiz += bd.sales||0; totTM += bd.totalSales||0; totRef += bd.refund||0;
      totInq += bd.inquiry||0; totWan += ms[m].мҷ„лӮ©; totMi += ms[m].лҜёлӮ©;
      totмғҒлӢҙ += ms[m].мғҒлӢҙ; totл“ұлЎқ += ms[m].л“ұлЎқ; totлҜёл“ұлЎқ += ms[m].лҜёл“ұлЎқ; totм·ЁмҶҢ += ms[m].м·ЁмҶҢ;
      if ((bd.inquiry||0) > 0) { sumRate += ms[m].л“ұлЎқ/(bd.inquiry); validCnt++; }
    });
  });
  const totNet = totTM - totRef;
  const avgRate = validCnt > 0 ? (sumRate/validCnt*100).toFixed(1)+'%' : '0.0%';

  let h = nav;

function updBizKPI() {
  if (bst !== 'мҡ”м•Ҫ') return;
  const ms = calcMS();
  let totBiz=0,totTM=0,totRef=0,totInq=0,totмғҒлӢҙ=0,totл“ұлЎқ=0,totлҜёл“ұлЎқ=0,totм·ЁмҶҢ=0,totWan=0,totMi=0;
  let vc=0,sr=0;
  TM_CFG.forEach(t => t.members.forEach(m => {
    const bd=BIZ[t.name]?.[m]||{};
    totBiz+=(bd.sales||0);totTM+=(bd.totalSales||0);totRef+=(bd.refund||0);
    totInq+=(bd.inquiry||0);totWan+=ms[m].мҷ„лӮ©;totMi+=ms[m].лҜёлӮ©;
    totмғҒлӢҙ+=ms[m].мғҒлӢҙ;totл“ұлЎқ+=ms[m].л“ұлЎқ;totлҜёл“ұлЎқ+=ms[m].лҜёл“ұлЎқ;totм·ЁмҶҢ+=ms[m].м·ЁмҶҢ;
    if((bd.inquiry||0)>0){sr+=ms[m].л“ұлЎқ/bd.inquiry;vc++;}
  }));
  const cards = document.querySelectorAll('#bc .kval');
  if (cards.length >= 8) {
    cards[0].textContent=F(totWan); cards[1].textContent=F(totMi);
    cards[2].textContent=`${totInq}/${totмғҒлӢҙ}/${totл“ұлЎқ}/${totлҜёл“ұлЎқ}/${totм·ЁмҶҢ}`;
    cards[3].textContent=vc>0?(sr/vc*100).toFixed(1)+'%':'0.0%';
  }
}

          </select></td>
          <td><input class="cn" value="${r.paid?F(N(r.paid)):''}" placeholder="0" oninput="W._cu('${date}','${rid}','paid',this.value)"></td>
          <td><input class="cn" value="${r.expected?F(N(r.expected)):''}" placeholder="0" oninput="W._cu('${date}','${rid}','expected',this.value)"></td>
          <td><input class="ci" style="width:46px" value="${r.time||''}" placeholder="00:00" oninput="W._cu('${date}','${rid}','time',this.value)"></td>
          <td><input class="ci" value="${r.note||''}" placeholder="л№„кі " oninput="W._cu('${date}','${rid}','note',this.value)"></td>
          <td><button class="dbc" onclick="W._cd('${date}','${rid}')">Г—</button></td>
        </tr>`;
      });
      h+=`</tbody></table><button class="arb" onclick="W._ca('${date}')">+ н–ү м¶”к°Җ</button>`;
    }
  });

  h+=`<div style="margin-top:11px;display:flex;gap:8px;align-items:center">
    <input type="date" id="cdi" value="${todayStr()}"
      style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--text);background:var(--bg2)">
    <button onclick="W._cad()" style="padding:6px 14px;border-radius:7px;font-size:12px;font-weight:700;background:var(--accent);color:#fff;border:none;cursor:pointer">+ лӮ м§ң м¶”к°Җ</button>
  </div>`;
  return h;
}

// в”Җв”Җ м „м—ӯ н•ёл“Өлҹ¬ W в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// мһ…л Ҙк°’ мҪӨл§Ҳ нҸ¬л§·
function formatBizInp(el) {
  const n = N(el.value);
  const pos = el.selectionStart;
  const old = el.value;
  el.value = n ? F(n) : '';
  // м»Өм„ң мң„м№ҳ ліҙм •
  const diff = el.value.length - old.length;
  try { el.setSelectionRange(pos+diff, pos+diff); } catch(e){}
}

const W = {
  _swDash() {
    curMonth='current'; cw=-1;
    // лҢҖмӢңліҙл“ң мҶҢл©”лүҙ нҶ кёҖ
    const dashSub = document.getElementById('nav-dash-sub');
    const isOpen = dashSub && dashSub.style.display !== 'none';
    if(dashSub) dashSub.style.display = isOpen ? 'none' : '';
    // мҳҒм—…нҳ„нҷ© мҶҢл©”лүҙ лӢ«кё°
    const bizSub = document.getElementById('nav-biz-sub');
    if(bizSub) bizSub.style.display = 'none';
    // нҷңм„ұнҷ”
    ['nav-dash','nav-w0','nav-w1','nav-w2','nav-w3','nav-biz','nav-biz-sum','nav-biz-con'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    document.getElementById('nav-dash')?.classList.add('on');
    const pt = document.getElementById('page-title');
    if(pt) pt.textContent = 'лҢҖмӢңліҙл“ң';
    renderMain();
  },
  _swBiz(tab) {
    curMonth='current'; cw=99; bst=tab;
    // мҶҢл©”лүҙ н‘ңмӢң
    document.getElementById('nav-biz-sub').style.display='';
    // нҷңм„ұнҷ”
    ['nav-dash','nav-w0','nav-w1','nav-w2','nav-w3','nav-biz'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    document.getElementById('nav-biz')?.classList.add('on');
    document.getElementById('nav-biz-sum')?.classList.remove('on');
    document.getElementById('nav-biz-con')?.classList.remove('on');
    if(tab==='мҡ”м•Ҫ') document.getElementById('nav-biz-sum')?.classList.add('on');
    else document.getElementById('nav-biz-con')?.classList.add('on');
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent = tab==='мҡ”м•Ҫ'?'мҳҒм—… мҡ”м•Ҫ':'мғҒлӢҙ лӮҙм—ӯ';
    showBiz();
  },
  _sw(wi) {
    curMonth='current'; cw=wi;
    if(wi===99){
      document.getElementById('nav-biz-sub').style.display='';
      document.getElementById('nav-dash-sub').style.display='none';
    } else {
      document.getElementById('nav-biz-sub').style.display='none';
      document.getElementById('nav-dash-sub').style.display='';
    }
    renderTabs();
    if(wi===99) showBiz();
    else { tcBuilt=false; rvBuilt=false; renderMain(); }
  },
  _setMonth(month) {
    curMonth=month; cw=-1;
    if(month.startsWith('sales/')) arcSubTab='кІ°мӮ°';
    else arcSubTab='мҳҒм—…';
    renderTabs(); renderSbMonths(); renderArchiveView(month);
  },
  _arcTab(month, tab) {
    arcSubTab=tab; renderArchiveView(month);
  },
  _di(field,val) {
    DAILY[field]=N(val); set(rDaily,DAILY); updDailyCalc(); if(cw<99) renderMsg();
  },
  _sv(team,field,val) {
    DATA[team][cw][field]=val; set(rSales,DATA); updTStats(); renderKPI(); renderSum(); renderMsg();
  },
  _rv(team,field,val) { REVIEW[team][field]=val; set(rReview,REVIEW); },
  _bst(tab) {
    bst=tab;
    document.getElementById('nav-biz-sum')?.classList.remove('on');
    document.getElementById('nav-biz-con')?.classList.remove('on');
    if(tab==='мҡ”м•Ҫ') document.getElementById('nav-biz-sum')?.classList.add('on');
    else document.getElementById('nav-biz-con')?.classList.add('on');
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent = tab==='мҡ”м•Ҫ'?'мҳҒм—… мҡ”м•Ҫ':'мғҒлӢҙ лӮҙм—ӯ';
    showBiz();
  },
  _bm(team,member,field,val) {
    const n=N(val);
    if(!BIZ[team]) BIZ[team]={};
    if(!BIZ[team][member]) BIZ[team][member]={sales:0,inquiry:0,totalSales:0,refund:0};
    BIZ[team][member][field]=n;
    // мҲңл§Өм¶ң мһҗлҸҷ н‘ңмӢң
    const bd=BIZ[team][member];
    const net=(bd.totalSales||0)-(bd.refund||0);
    const netEl=document.getElementById("biz-net-"+team+"-"+member);
    if(netEl) netEl.textContent=F(net);
    // нҢҖ н•©кі„ м—…лҚ°мқҙнҠё
    const teamCfg = TM_CFG.find(t=>t.name===team);
    if(teamCfg){
      const tTM = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.totalSales||0),0);
      const tRef = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.refund||0),0);
      const tGoalSum = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.goal||0),0);
      const tmEl = document.getElementById("biz-tm-"+team);
      const refEl = document.getElementById("biz-ref-"+team);
      const netEl2 = document.getElementById("biz-net-"+team+"-team");
      const goalEl = document.getElementById("biz-goal-"+team);
      if(tmEl) tmEl.textContent = F(tTM);
      if(refEl) refEl.textContent = F(tRef);
      if(netEl2) netEl2.textContent = F(tTM-tRef);
      if(goalEl) goalEl.textContent = F(tGoalSum);
    }
    set(rBiz,BIZ); updBizKPI();
  },
  _cc(date) { cCol[date]=!cCol[date]; showBiz(); },
  _cu(date,rid,field,val) {
    if(!CONSULT[date]||!CONSULT[date][rid]) return;
    CONSULT[date][rid][field]=val; set(rConsult,CONSULT); updBizKPI();
  },
  _ca(date) {
    if(!CONSULT[date]) CONSULT[date]={};
    const id=Math.random().toString(36).slice(2,10);
    CONSULT[date][id]={mentor:'',student:'',subject:'',status:'мғҒлӢҙ',result:'',paid:'',expected:'',time:'',note:''};
    set(rConsult,CONSULT); showBiz();
  },
  _cad() {
    const date=document.getElementById('cdi')?.value; if(!date) return;
    if(!CONSULT[date]) CONSULT[date]={};
    const id=Math.random().toString(36).slice(2,10);
    CONSULT[date][id]={mentor:'',student:'',subject:'',status:'мғҒлӢҙ',result:'',paid:'',expected:'',time:'',note:''};
    cCol[date]=false; set(rConsult,CONSULT); showBiz();
  },
  _cd(date,rid) {
    if(!confirm('мӮӯм ңн• к№Ңмҡ”?')) return;
    delete CONSULT[date][rid];
    if(!Object.keys(CONSULT[date]).length) delete CONSULT[date];
    set(rConsult,CONSULT); showBiz();
  },
  _csearch(kw) {
    const el = document.getElementById('bc');
    if(!el) return;
    const nav = document.querySelector('.bsn')?.outerHTML || '';
    // кІҖмғүм°Ҫ нҳ„мһ¬ к°’ м ҖмһҘ
    const curInp = document.getElementById('consult-search');
    const curVal = curInp ? curInp.value : kw;
    el.innerHTML = nav + renderConsult(curVal);
    // кІҖмғүм°Ҫ нҸ¬м»ӨмҠӨ & м»Өм„ң лҒқмңјлЎң
    const inp = document.getElementById('consult-search');
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  },
  _csearchDebounce(val) {
    clearTimeout(window._csTimer);
    window._csTimer = setTimeout(() => W._csearch(val), 300);
  },
  _cp() {
    navigator.clipboard.writeText(document.getElementById('mbox').textContent).then(()=>{
      const b=document.getElementById('cpbtn'); b.textContent='вң… ліөмӮ¬лҗЁ!'; b.classList.add('done');
      setTimeout(()=>{b.textContent='рҹ“Ӣ ліөмӮ¬';b.classList.remove('done');},2000);
    });
  },
};

window.W = W;
cw=-1; renderTabs(); renderMain();
</script>
