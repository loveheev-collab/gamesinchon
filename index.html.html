<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임신촌 업무 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Roboto:wght@500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  font-variant-numeric: normal !important;
  font-feature-settings: "zero" 0 !important;
}
/* Roboto Mono 인라인 오버라이드 */
[style*="Roboto Mono"], .rnum, .kval, .kc-hl .kval,
.dstr, .dinp, .inp, .sv, .binp, .dep-inp, .sch-num,
.al-num, .wl-cell, td, th, input, textarea {
  font-variant-numeric: normal !important;
  font-feature-settings: "zero" 0 !important;
}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-variant-numeric:normal;outline:none !important}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid #E8ECF0;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;display:flex;flex-direction:column}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid #F0F2F5}
.sb-logo-txt{font-size:13px;font-weight:900;color:#1A2340}
.sb-logo-sub{font-size:10px;color:#8A97B0;margin-top:2px;font-weight:500}
.sb-sec{padding:14px 10px 4px}
.sb-sec-lbl{font-size:10px;font-weight:700;color:#B0BEC5;letter-spacing:.7px;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:#5A6785;font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:#F5F7FA;color:#1A2340}
.sb-item.on{background:#EFF4FF;color:#2563EB;font-weight:700}
.sb-item .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-sub{padding-left:14px;margin-top:2px}
.sb-sub-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;cursor:pointer;color:#8A97B0;font-size:12px;font-weight:500;transition:all .15s;margin-bottom:1px;border-left:2px solid transparent}
.sb-sub-item:hover{color:#1A2340;background:#F5F7FA}
.sb-sub-item.on{color:#2563EB;font-weight:700;border-left-color:#2563EB;background:#EFF4FF}
.sb-divider{border:none;border-top:1px solid #F0F2F5;margin:6px 12px}
.sb-footer{padding:14px 16px;border-top:1px solid #F0F2F5;margin-top:auto}
.content-wrap{margin-left:200px;flex:1;min-width:0}
.wnav{display:none!important}

:root{
  --bg:#F5F7FA;--bg2:#fff;--bg3:#EEF2F7;--border:#DDE3ED;
  --text:#1A2340;--text2:#5A6785;--text3:#8A97B0;
  --accent:#2563EB;--accent-light:#EFF4FF;
  --gold:#D97706;--gold-light:#FFFBEB;
  --green:#16A34A;--red:#DC2626;--purple:#7C3AED;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;max-width:1400px;margin:0 auto}
.logo{font-size:18px;font-weight:900;color:var(--text)}.logo span{color:var(--accent)}
.hdr-r{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{background:var(--accent-light);border:1px solid #BFCFFF;color:var(--accent);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sdot.live{background:var(--green);animation:blink 2s infinite}
.slbl{font-size:11px;color:var(--text3)}
.dstr{color:var(--text3);font-size:12px;font-family:'Roboto',monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.wnav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px}
.wnav-in{display:flex;max-width:1400px;margin:0 auto;overflow-x:auto}
.wtab{padding:12px 18px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none}
.wtab:hover{color:var(--text)}.wtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.wtab.biz.on{color:var(--purple);border-bottom-color:var(--purple)}
.per{font-size:11px;font-weight:400;opacity:.8;margin-left:4px}
.main{max-width:1400px;margin:0 auto;padding:20px}
.stitle{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--text)}
.stitle::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;border-top:3px solid var(--border)}
.kc.a{border-top-color:var(--accent)}.kc.g{border-top-color:var(--green)}
.kc.go{border-top-color:var(--gold)}.kc.r{border-top-color:var(--red)}.kc.p{border-top-color:var(--purple)}
.klbl{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px}
.kval{font-size:19px;font-weight:900;font-family:'Roboto',monospace;color:var(--text);letter-spacing:-1px}
.ksub{font-size:11px;color:var(--text3);margin-top:2px}
/* 결산 누계 강조 KPI */
.kg-highlight{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:0;margin-bottom:22px;border-radius:14px;overflow:hidden;border:3px solid #1D4ED8;box-shadow:0 4px 24px rgba(37,99,235,.18)}
.kc-hl{background:var(--bg2);padding:18px 20px;border-right:1px solid #BFCFFF;position:relative}
.kc-hl:last-child{border-right:none}
.kc-hl::before{content:'';position:absolute;top:0;left:0;right:0;height:5px}
.kc-hl.hl-go::before{background:#D97706}
.kc-hl.hl-g::before{background:#16A34A}
.kc-hl.hl-a::before{background:#2563EB}
.kc-hl.hl-diff::before{background:var(--diff-color,#DC2626)}
.kc-hl .klbl{font-size:11px;font-weight:900;color:#6B7280;letter-spacing:.3px;margin-bottom:7px;text-transform:uppercase}
.kc-hl .kval{font-size:24px;font-weight:900;font-family:'Roboto',monospace;letter-spacing:-1.5px}
.kc-hl .ksub{font-size:11px;color:#9CA3AF;margin-top:4px}
.kg-highlight-label{font-size:13px;font-weight:900;color:#1D4ED8;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.kg-highlight-label::before{content:'';display:block;width:4px;height:16px;background:#1D4ED8;border-radius:2px}
/* daily */
.dw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:11px}
.dc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.dc label{font-size:11px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px}
.dinp{width:100%;padding:6px 8px;background:var(--bg2);border:1.5px solid var(--accent);border-radius:6px;color:var(--accent);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto',monospace}
.dinp:focus{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.dcalc{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px}
.dcc{border-radius:8px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
/* team cards */
.tg{display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:13px;margin-bottom:18px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tch{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.tnm{font-size:15px;font-weight:900;color:#fff}.tmb{font-size:11px;color:rgba(255,255,255,.75)}
.tcb{padding:13px 14px}
.sbdg{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;margin-bottom:10px;font-size:12px;font-weight:700}
.rs{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.ys{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.gs{background:#F0FDF4;color:#14532D;border:1px solid #BBF7D0}
.bs{background:#EFF4FF;color:#1E3A8A;border:1px solid #BFCFFF}
.pw{height:6px;background:var(--bg3);border-radius:3px;margin:4px 0 12px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .4s}
.ir{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.il{font-size:12px;color:var(--text2);font-weight:500}
.irr{display:flex;align-items:center;gap:5px}
.inp{width:126px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto',monospace}
.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.iunit{font-size:11px;color:var(--text3)}
.dvd{border:none;border-top:1px solid var(--border);margin:9px 0}
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sl{font-size:12px;color:var(--text2)}.sv{font-size:13px;font-weight:700;font-family:'Roboto',monospace;color:var(--text)}
.rbig{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:8px;margin-top:9px;border:1px solid var(--border)}
.rnum{font-size:20px;font-weight:900;font-family:'Roboto',monospace}
.rmsg{font-size:11px;font-weight:700;text-align:right;line-height:1.4}
/* summary */
.sw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 11px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.tbl th:not(:first-child){text-align:right}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl td:not(:first-child){text-align:right;font-family:'Roboto',monospace}
.tbl tr:last-child td{border-bottom:none;font-weight:700}
.tdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
/* msg */
.mw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.cbtn{padding:6px 14px;border-radius:7px;background:var(--accent);color:#fff;font-weight:700;font-size:12px;border:none;cursor:pointer}
.cbtn:hover{background:#1D4ED8}.cbtn.done{background:var(--green)}
.mbox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'Roboto',monospace;font-size:12px;line-height:1.9;color:var(--text2);white-space:pre-wrap;word-break:break-all}
/* review */
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(228px,1fr));gap:11px;margin-bottom:18px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px}
.rtm{font-size:13px;font-weight:700;margin-bottom:9px}
.rf{margin-bottom:7px}.rf label{font-size:11px;color:var(--text3);font-weight:700;display:block;margin-bottom:3px}
.rf textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px;resize:vertical;min-height:48px;line-height:1.6}
.rf textarea:focus{outline:none;border-color:var(--accent)}
.stblk{margin-bottom:11px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stmr{display:flex;align-items:center;gap:5px;padding:7px 8px;background:var(--accent-light);border-bottom:1px solid var(--border)}
.snmi{width:76px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:13px;font-weight:700;color:var(--accent);background:#fff;font-family:'Noto Sans KR',sans-serif}
.srki{width:56px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:12px;color:var(--text2);background:#fff;font-family:'Noto Sans KR',sans-serif}
.snmi:focus,.srki:focus{outline:none;border-color:var(--accent)}
.sslsh{font-size:14px;color:var(--text3);font-weight:700}
.sta{width:100%;border:none;border-radius:0;min-height:68px;background:var(--bg);color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:7px;resize:vertical;line-height:1.6;display:block}
.sta:focus{outline:none;background:#FFFDE7}
.sttl{font-size:12px;font-weight:700;color:var(--accent);margin:9px 0 7px;border-top:1px solid var(--border);padding-top:9px}
.rtn{text-align:center;padding:11px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;font-size:12px;color:#15803D;margin-bottom:18px;line-height:1.8}
/* biz */
.bsn{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:15px}
.bst{padding:9px 18px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;transition:all .15s}
.bst:hover{color:var(--text)}.bst.on{color:var(--purple);border-bottom-color:var(--purple)}
.btb{margin-bottom:18px}
.bth{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;color:#fff;border-radius:10px 10px 0 0;flex-wrap:wrap;gap:8px}
.btht{font-size:14px;font-weight:900}
.bths{display:flex;gap:10px;align-items:center;font-size:12px;flex-wrap:wrap}
.bmtbl{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.bmtbl th{padding:7px 9px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.bmtbl th:not(:first-child){text-align:right}
.bmtbl td{padding:8px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
.bmtbl tr:last-child td{border-bottom:none;background:var(--bg)}
.binp{padding:4px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-weight:700;font-family:'Roboto',monospace;background:var(--bg);text-align:right;width:100%;box-sizing:border-box}
.binp:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.1);background:#fff}
.nr{text-align:right;font-family:'Roboto',monospace;font-size:12px}
/* consult */
.csg{display:grid;grid-template-columns:repeat(auto-fit,minmax(142px,1fr));gap:10px;margin-bottom:13px}
.csc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;border-top:3px solid var(--border)}
.csc.g{border-top-color:var(--green)}.csc.go{border-top-color:var(--gold)}
.csc.p{border-top-color:var(--purple)}.csc.b{border-top-color:var(--accent)}
.cslb{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px}
.csv{font-size:16px;font-weight:900;font-family:'Roboto',monospace;color:var(--text)}
.csse{font-size:11px;color:var(--text3);margin-top:2px}
.tcg{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:10px;margin-bottom:13px}
.tcc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tcch{padding:8px 12px;color:#fff;font-weight:900;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.tccb{padding:9px 12px}
.tcr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.tcr:last-child{border-bottom:none}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-inp{flex:1;max-width:320px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2)}
.search-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-clear{padding:7px 13px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.search-clear:hover{background:var(--bg3)}
.search-result-cnt{font-size:12px;color:var(--text3)}
.dhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:8px 8px 0 0;margin-bottom:0;cursor:pointer;user-select:none;transition:background .1s}
.dhdr:hover{background:#F8FAFF}
.dtc{font-size:14px;font-weight:900;color:var(--accent)}
.dts{font-size:12px;color:var(--text2);font-family:'Roboto',monospace}
.ctbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;margin-bottom:12px}
.ctbl th{padding:8px 10px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.ctbl td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;background:inherit}
.ctbl tr:last-child td{border-bottom:none}.ctbl tr:hover td{background:#FAFBFF}
.ctbl .team-sep td{font-size:11px;font-weight:700;padding:5px 12px;border-bottom:1px solid var(--border);isolation:isolate}
.ci{width:100%;padding:4px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--text)}
.ci:hover{border-color:var(--border);background:var(--bg)}.ci:focus{outline:none;border-color:var(--accent);background:#EFF6FF}
.cs{width:100%;padding:4px 4px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;cursor:pointer}
.cs:hover{border-color:var(--border);background:var(--bg)}.cs:focus{outline:none;border-color:var(--accent);background:#EFF6FF}
.cn{width:100%;padding:4px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Roboto',monospace;background:transparent;text-align:right;color:var(--text)}
.cn:hover{border-color:var(--border);background:var(--bg)}.cn:focus{outline:none;border-color:var(--accent);background:#EFF6FF}
.arb{width:100%;padding:7px;font-size:12px;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-top:1px dashed var(--border);cursor:pointer;border-radius:0 0 8px 8px;transition:all .15s;margin-bottom:12px}
.arb:hover{background:var(--accent-light);color:var(--accent)}
.rbadge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.rb-완납{background:#FEF08A;color:#854D0E}.rb-미납{background:#FEE2E2;color:#DC2626}
.rb-취소{background:#E5E7EB;color:#6B7280}.rb-COD{background:#EFF4FF;color:#2563EB}
.rb-추가{background:#F0FDF4;color:#16A34A}.rb-미등록회수{background:#F5F3FF;color:#7C3AED}
.rb-대기{background:#F1F5F9;color:#64748B}
.dbc{width:21px;height:21px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
.dbc:hover{background:#FEE2E2;color:var(--red)}
.main{max-width:100%;margin:0;padding:20px 24px}
@media(max-width:600px){.main{padding:14px}.kval{font-size:16px}.inp{width:108px}}
/* ── 직원관리 공통 ── */
.staff-nav{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:18px}
.staff-tab{padding:10px 20px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s}
.staff-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
/* ── 입금 파악 ── */
.dep-wrap{overflow-x:auto}
.dep-date-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.dep-date-lbl{font-size:15px;font-weight:900;color:var(--text)}

// ── Firebase ─────────────────────────────────────────
onValue(rConfig, snap => {
  const v = snap.val();
  if (v) applyConfig(v);
  const b = document.getElementById('goal-badge');
  if (b) b.textContent = '🎯 ' + MONTH_LABEL + ' 목표 ' + F(TG) + '원';
  if (cw < 99) { tcBuilt=false; rvBuilt=false; renderMain(); }
  else showBiz();
});

onValue(rArchive, snap => {
  ARCHIVE = snap.val() || {};
  renderSbMonths();
});

onValue(rSales, snap => {
  const v = snap.val();
  if (v) TEAMS.forEach(t => {
    if (v[t.name]) WEEKS.forEach((_,wi) => {
      if (v[t.name][wi]) DATA[t.name][wi] = {...DATA[t.name][wi], ...v[t.name][wi]};
    });
  });
  document.getElementById('sd').className = 'sdot live';
  document.getElementById('sl').textContent = '실시간 연결됨';
  if (cw < 99) { if (tcBuilt) updTInp(); else buildTC(); renderKPI(); renderSum(); renderMsg(); }
});
onValue(rDaily, snap => {
  const v = snap.val(); if (v) DAILY = {...DAILY, ...v};
  updDailyInp(); updDailyCalc(); if (cw < 99) renderMsg();
});
onValue(rReview, snap => {
  const v = snap.val();
  if (v) TEAMS.forEach(t => { if (v[t.name]) REVIEW[t.name] = {...REVIEW[t.name], ...v[t.name]}; });
  if (cw < 99) { if (rvBuilt) updRvInp(); else buildRv(); }
});
onValue(rBiz, snap => {
  const v = snap.val();
  if (v) TM_CFG.forEach(t => {
    if (v[t.name]) {
      t.members.forEach(m => {
        if (v[t.name][m]) BIZ[t.name][m] = {...BIZ[t.name][m], ...v[t.name][m]};
      });
    }
  });
  if (cw === 99 && bst === '요약') {
    const f = document.activeElement;
    if (f && f.classList.contains('binp')) updBizKPI();
    else showBiz();
  }
});
onValue(rConsult, snap => {
  CONSULT = snap.val() || {};
  if (cw === 99) {
    const f = document.activeElement;
    if (f && (f.classList.contains('ci') || f.classList.contains('cn') || f.classList.contains('cs'))) updBizKPI();
    else showBiz();
  }
});
onValue(rNotice, snap => {
  const v = snap.val();
  NOTICE.text = (v && v.text) ? v.text : '';
  // 대시보드가 보이는 경우 공지 섹션만 업데이트
  const nb = document.getElementById('notice-content-display');
  if (nb) nb.textContent = NOTICE.text || '(공지사항이 없습니다)';
  const ni = document.getElementById('notice-input');
  if (ni && document.activeElement !== ni) ni.value = NOTICE.text || '';
});
onValue(rAddList, snap => {
  ADDLIST = snap.val() || {};
  if (cw === 99 && bst === '추가리스트') showBiz();
});
onValue(rDeposit, snap => {
  DEPOSIT = snap.val() || {};
  if (cw === 300 && !window._depRendering) showDep();
});
onValue(rWorkload, snap => {
  WORKLOAD = snap.val() || {};
  if (cw === 200) showStaff();
});
onValue(rSchedule, snap => {
  SCHEDULE = snap.val() || {};
  if (cw === 300 && !window._depRendering) showDep();
});
onValue(rFeedback, snap => {
  FEEDBACK = snap.val() || {};
  if (cw === 99 && bst === '미납리스트') showBiz();
});

// ── 유틸 ─────────────────────────────────────────────
const F = n => Math.round(n||0).toLocaleString('ko-KR');
const P = (a,b) => b===0 ? '0.0%' : (Math.round(a/b*1000)/10).toFixed(1)+'%';
const N = v => parseInt((v+'').replace(/[^0-9]/g,''))||0;
const WG = (t,wi) => Math.round(WEEKS[wi].total*(t.members/TM)/10000)*10000;
function ST(r) {
  if (r>=1)  return {cl:'bs', b:'🟢', m:'목표 달성! 💪'};
  if (r>=.8) return {cl:'gs', b:'🟢', m:'순항 중!'};
  if (r>=.5) return {cl:'ys', b:'🟡', m:'분발 필요!'};
  return            {cl:'rs', b:'🔴', m:'전략 점검 필요'};
}
const BC = r => r>=.8?'#16A34A':r>=.5?'#D97706':'#DC2626';
const BG = r => r>=.8?'#F0FDF4':r>=.5?'#FFFBEB':'#FEF2F2';
const TC = r => r>=.8?'#15803D':r>=.5?'#B45309':'#DC2626';
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dlbl(s) { const d=new Date(s); const wd=['일','월','화','수','목','금','토']; return `${s} (${wd[d.getDay()]})`; }
function getTeam(m) { return TM_CFG.find(t => t.members.includes(m)); }

// 날짜
(function(){
  const d=new Date(), wd=['일','월','화','수','목','금','토'];
  document.getElementById('td').textContent = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${wd[d.getDay()]})`;
})();

// ── 탭 ───────────────────────────────────────────────
function renderTabs() {
  WEEKS.forEach((w,i) => {
    const el = document.getElementById('nav-w'+i);
    if (el) el.innerHTML = '📅 ' + w.label + ' <span style="font-size:10px;opacity:.6">' + w.period + '</span>';
  });
  ['nav-dash','nav-w0','nav-w1','nav-w2','nav-w3','nav-biz'].forEach(id => {
    const el = document.getElementById(id); if (el) el.classList.remove('on');
  });
  if (cw === -1) { document.getElementById('nav-dash')?.classList.add('on'); }
  else if (cw >= 0 && cw < 99) { document.getElementById('nav-w'+cw)?.classList.add('on'); document.getElementById('nav-dash')?.classList.add('on'); }
  else if (cw === 99) { document.getElementById('nav-biz')?.classList.add('on'); }
  const pt = document.getElementById('page-title');
  if (pt) {
    if (curMonth !== 'current') pt.textContent = '📁 ' + curMonth.slice(0,4) + '년 ' + curMonth.slice(5,7) + '월 아카이브';
    else if (cw === -1) pt.textContent = '대시보드';
    else if (cw === 99) pt.textContent = '영업현황판';
    else pt.textContent = (WEEKS[cw]?.label||'') + ' 매출 현황';
  }
}

function renderSbMonths() {
  const el = document.getElementById('sb-months'); if (!el) return;
  const months = Object.keys(ARCHIVE).sort().reverse();
  if (!months.length) { el.innerHTML = '<div style="font-size:11px;color:#B0BEC5;padding:4px 8px">저장된 월 없음</div>'; return; }
  el.innerHTML = months.map(m => {
    const lbl = m.slice(0,4) + '년 ' + m.slice(5,7) + '월';
    return '<div class="sb-sub-item' + (curMonth===m?' on':'') + '" onclick="W._setMonth(\'' + m + '\')">' + '📁 ' + lbl + '</div>';
  }).join('');
}

    const tGoalBiz   = mList.reduce((s,m)=>s+(BIZ[t.name]?.[m]?.goal||0),0);         // 목표매출
    const tInq       = mList.reduce((s,m)=>s+(BIZ[t.name]?.[m]?.inquiry||0),0);      // 문의
    const tNetSales  = tBizSales - tRefund;                                             // 순매출

    // 상담내역(calcMS) 집계
    const tWan    = mList.reduce((s,m)=>s+(ms[m]?.완납||0),0);
    const tMiNap  = mList.reduce((s,m)=>s+(ms[m]?.미납||0),0);
    const tCancel = mList.reduce((s,m)=>s+(ms[m]?.취소||0),0);
    const tCOD    = mList.reduce((s,m)=>s+(ms[m]?.COD||0),0);
    const tReg    = mList.reduce((s,m)=>s+(ms[m]?.등록||0),0);
    const tSang   = mList.reduce((s,m)=>s+(ms[m]?.상담||0),0);

    // 달성률: 순매출 ÷ 목표매출
    const tRate = tGoalBiz>0 ? tNetSales/tGoalBiz : 0;
    // 상담률: 상담수 ÷ 문의수
    const consultRate = tInq>0 ? (tSang/tInq*100).toFixed(1)+'%' : '—';
    // 등록률: 등록수 ÷ 상담수
    const regRate = tSang>0 ? (tReg/tSang*100).toFixed(1)+'%' : '—';

    h += `<div class="tp-card">
      <div class="tp-card-hdr" style="background:${t.color}">${t.name} (${mList.length}명)</div>
      <div class="tp-card-body">
        <div class="tp-row"><span class="lbl">영업 총매출</span><span class="val g">${F(tBizSales)}원</span></div>
        <div class="tp-row"><span class="lbl">순매출</span><span class="val" style="color:var(--accent)">${F(tNetSales)}원</span></div>
        <div class="tp-row"><span class="lbl">목표 매출</span><span class="val o">${tGoalBiz>0?F(tGoalBiz)+'원':'미설정'}</span></div>
        <div class="tp-row"><span class="lbl">달성률</span><span class="val" style="color:${TC(tRate)}">${ST(tRate).b} ${(tRate*100).toFixed(1)}%</span></div>
        <div class="tp-divider"></div>
        <div class="tp-badges">
          <span class="tp-badge" style="background:#FEF08A;color:#854D0E">완납 ${F(tWan)}</span>
          <span class="tp-badge" style="background:#E5E7EB;color:#374151">미납 ${F(tMiNap)}</span>
          <span class="tp-badge" style="background:#FEE2E2;color:#991B1B">취소 ${tCancel}</span>
          ${tCOD>0?`<span class="tp-badge" style="background:#EFF4FF;color:#2563EB">COD ${tCOD}</span>`:''}
        </div>
        <div class="tp-divider"></div>
        <div class="tp-rate-row">
          <div class="tp-rate-item"><div class="r-lbl">상담률</div><div class="r-val" style="color:${t.color}">${consultRate}</div></div>
          <div class="tp-rate-item"><div class="r-lbl">등록률</div><div class="r-val" style="color:${t.color}">${regRate}</div></div>
          <div class="tp-rate-item"><div class="r-lbl">문의</div><div class="r-val" style="color:${t.color}">${tInq}</div></div>
          <div class="tp-rate-item"><div class="r-lbl">등록수</div><div class="r-val" style="color:${t.color}">${tReg}</div></div>
        </div>
      </div>
    </div>`;
  });

  h += `</div>`;
  h += `<div class="rtn">🟢 실시간 공유 중 — 누구든 입력하면 모든 접속자 화면에 즉시 반영됩니다</div>`;
  mc.innerHTML = h;

  const fields = [['dp','prevYear'],['dt','thisYear'],['dco','consult'],['dr','contract'],['ds','sales']];
  fields.forEach(([id,key]) => {
    const el = document.getElementById(id);
    if (el) el.oninput = function(){ W._di(key, this.value); formatBizInp(this); };
  });

}

function updDailyInp() {
  const map = [['dp','prevYear'],['dt','thisYear'],['dco','consult'],['dr','contract'],['ds','sales']];
  map.forEach(([id,k]) => {
    const el = document.getElementById(id);
    if (el && document.activeElement !== el)
      el.value = (k==='prevYear'||k==='thisYear'||k==='sales') ? F(DAILY[k]) : DAILY[k]||'';
  });
}
function updDailyCalc() {
  const diff = DAILY.thisYear - DAILY.prevYear;
  const dv = document.getElementById('ddv'), dc = document.getElementById('ddc'), cv = document.getElementById('dcv');
  if (dv) { dv.textContent=(diff>=0?'+':'')+F(diff)+'원'; dv.style.color=diff>=0?'#15803D':'#DC2626'; }
  if (dc) dc.style.cssText=`background:${diff>=0?'#F0FDF4':'#FEF2F2'};border:1px solid ${diff>=0?'#BBF7D0':'#FECACA'};border-radius:8px`;
  if (cv) cv.textContent = DAILY.consult>0 ? (DAILY.contract/DAILY.consult*100).toFixed(1)+'%' : '0.0%';
  // 결산 누계 현황 KPI 실시간 갱신
  const ks = document.getElementById('dash-kpi-sales');
  const kr = document.getElementById('dash-kpi-rate');
  const kd = document.getElementById('dash-kpi-diff');
  const kc = document.getElementById('dash-kpi-diff-card');
  if (ks) ks.textContent = F(DAILY.thisYear||0);
  if (kr) kr.textContent = TG>0 ? ((DAILY.thisYear||0)/TG*100).toFixed(1)+'%' : '0.0%';
  if (kd) {
    const remain = Math.max(0, TG - (DAILY.thisYear||0));
    kd.textContent = F(remain);
    kd.style.color = remain > 0 ? '#DC2626' : '#16A34A';
  }
  if (kc) { kc.style.cssText = ''; }
}

function updTStats() {
  TEAMS.forEach(t => {
    const wi=cw, d=DATA[t.name][wi], goal=WG(t,wi), s=N(d.sales), c=N(d.consult), k=N(d.contract);
    const r=goal>0?s/goal:0, st=ST(r), left=Math.max(goal-s,0);
    const sb=document.getElementById(`sb-${t.name}`), pb=document.getElementById(`pb-${t.name}`);
    const rn=document.getElementById(`rn-${t.name}`), rb=document.getElementById(`rb-${t.name}`);
    const rm=document.getElementById(`rm-${t.name}`);
    const scv=document.getElementById(`sv-cv-${t.name}`), spr=document.getElementById(`sv-pr-${t.name}`);
    const slf=document.getElementById(`sv-lf-${t.name}`);
    if(sb){sb.className=`sbdg ${st.cl}`;sb.textContent=`${st.b} ${st.m}`;}
    if(pb){pb.style.width=Math.min(r*100,100)+'%';pb.style.background=BC(r);}
    if(rn){rn.textContent=(r*100).toFixed(1)+'%';rn.style.color=TC(r);}
    if(rb){rb.style.background=BG(r);rb.style.borderColor=BC(r)+'33';}
    if(rm){rm.textContent=`${st.b}\n${st.m}`;rm.style.color=TC(r);}
    if(scv) scv.textContent = c>0?(k/c*100).toFixed(1)+'%':'0.0%';
    if(spr) spr.textContent = F(Math.round(s/t.members))+'원';
    if(slf){slf.textContent=left===0?'✅ 달성!':F(left)+'원';slf.style.color=left===0?'#16A34A':'#DC2626';}
  });
}

function renderUnpaidList() {
  const unpaidByTeam = {};
  TM_CFG.forEach(t => { unpaidByTeam[t.name] = {}; t.members.forEach(m => { unpaidByTeam[t.name][m] = []; }); });

  Object.entries(CONSULT).forEach(([date, rows]) => {
    Object.entries(rows||{}).forEach(([rid, r]) => {
      if (r.result === '미납') {
        const t = getTeam(r.mentor);
        if (t && unpaidByTeam[t.name] && r.mentor) {
          if (!unpaidByTeam[t.name][r.mentor]) unpaidByTeam[t.name][r.mentor] = [];
          unpaidByTeam[t.name][r.mentor].push({date, rid, r});

    });
  });

  let h = `<div class="addlist-wrap">

  const fmtDate = d => {
    const dt = new Date(d);
    return `${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;

  let hasAny = false;
  TM_CFG.forEach(t => {
    const teamItems = t.members.flatMap(m => unpaidByTeam[t.name][m]||[]);
    if (!teamItems.length) return;
    hasAny = true;
    h += `<div class="unpaid-team-block"><div class="unpaid-team-hdr" style="background:${t.color}">
      <span>${t.name} <span style="font-size:12px;font-weight:400;opacity:.9;margin-left:8px">${teamItems.length}건 · 예정 ${F(teamItems.reduce((s,{r})=>s+N(r.expected),0))}원</span></span>
    </div>
    <table class="unpaid-tbl">
      <thead><tr>
        <th style="width:64px">직원</th>

// ── 상담 집계 ─────────────────────────────────────────
function calcMS() {
  const ms = {};
  TM_CFG.forEach(t => t.members.forEach(m => {
    ms[m] = {상담:0, 등록:0, 미등록:0, 취소:0, 완납:0, 미납:0, COD:0};
  }));
  Object.values(CONSULT).forEach(day => {
    Object.values(day||{}).forEach(r => {
      const m = r.mentor; if (!ms[m]) return;
      if (r.status === '상담') ms[m].상담++;
      if (r.result === '완납') { ms[m].완납 += N(r.paid); ms[m].등록++; }
      if (r.result === '미납') { ms[m].미납 += N(r.expected); ms[m].미등록++; }
      if (r.result === '미등록회수') { ms[m].완납 += N(r.paid); ms[m].등록++; }
      if (r.result === '취소') ms[m].취소++;
      if (r.result === 'COD') { ms[m].완납 += N(r.paid); ms[m].등록++; ms[m].COD++; }
      // 추가 → 아무것도 반영 안함
    });
  });
  return ms;
}

function makeBizMonthNav() {
  const bizStart = new Date(BIZ_PERIOD.s+'T00:00:00');
  const bizEnd   = new Date(BIZ_PERIOD.e+'T00:00:00');
  // 영업월 이름 = 시작일의 월 기준
  const curMonthKey = `${bizStart.getFullYear()}-${String(bizStart.getMonth()+1).padStart(2,'0')}`;
  const curMonthLbl = `${bizStart.getFullYear()}년 ${bizStart.getMonth()+1}월`;

  // 아카이브에서 과거 영업월 목록 로드 (ARCHIVE에 biz 데이터 있으면)
  const archiveKeys = Object.keys(ARCHIVE.biz || {}).sort();
  // 현재 영업월 키가 아카이브에 없으면 추가
  const allMonths = [...new Set([...archiveKeys, curMonthKey])].sort();

  const selMonth = window._bizSelMonth || 'current';
  const selIdx = selMonth === 'current'
    ? allMonths.length - 1
    : allMonths.indexOf(selMonth) >= 0 ? allMonths.indexOf(selMonth) : allMonths.length - 1;
  const dispKey = allMonths[selIdx] || curMonthKey;
  const isCurrent = dispKey === curMonthKey;
  const dispYear = parseInt(dispKey.slice(0,4));
  const dispMon  = parseInt(dispKey.slice(5,7));
  const dispLbl  = `${dispYear}년 ${dispMon}월`;
  const canPrev = selIdx > 0;
  const canNext = selIdx < allMonths.length - 1;
  const mj = JSON.stringify(allMonths).replace(/"/g,"'");

  return `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;flex-wrap:wrap">

    <span style="font-size:15px;font-weight:900;min-width:110px;text-align:center">${dispLbl} 영업</span>
    ${isCurrent?'<span style="padding:2px 8px;background:#DBEAFE;color:#2563EB;border-radius:20px;font-size:11px;font-weight:700">현재</span>':''}
    <button onclick="W._bizMonth(${selIdx+1},'${mj}')" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;${canNext?'':'opacity:.3;cursor:not-allowed'}" ${canNext?'':'disabled'}>▶</button>

function updBizKPI() {
  if (bst !== '요약') return;
  const ms = calcMS();
  let totBiz=0,totTM=0,totRef=0,totInq=0,tot상담=0,tot등록=0,tot미등록=0,tot취소=0,totWan=0,totMi=0;
  let vc=0,sr=0;
  TM_CFG.forEach(t => t.members.forEach(m => {
    const bd=BIZ[t.name]?.[m]||{};
    totBiz+=(bd.sales||0);totTM+=(bd.totalSales||0);totRef+=(bd.refund||0);
    totInq+=(bd.inquiry||0);totWan+=ms[m].완납;totMi+=ms[m].미납;
    tot상담+=ms[m].상담;tot등록+=ms[m].등록;tot미등록+=ms[m].미등록;tot취소+=ms[m].취소;
    if((bd.inquiry||0)>0){sr+=ms[m].등록/bd.inquiry;vc++;}
  }));
  const cards = document.querySelectorAll('#bc .kval');
  if (cards.length >= 8) {
    cards[0].textContent=F(totWan); cards[1].textContent=F(totMi);
    cards[2].textContent=`${totInq}/${tot상담}/${tot등록}/${tot미등록}/${tot취소}`;
    cards[3].textContent=vc>0?(sr/vc*100).toFixed(1)+'%':'0.0%';
  }
}

function renderConsult(searchKw='') {
  const dates = Object.keys(CONSULT).sort((a,b)=>b.localeCompare(a));
  let tPaid=0,tExp=0,tRows=0,cWan=0,cSang=0;
  const ts = {};
  TM_CFG.forEach(t => ts[t.name]={paid:0,exp:0,em:0,cnt:0,wan:0});

  dates.forEach(date => Object.values(CONSULT[date]||{}).forEach(r => {
    tPaid+=N(r.paid); tExp+=N(r.expected); tRows++;
    if(r.result==='완납'||r.result==='추가') cWan++;
    if(r.status==='상담') cSang++;
    const t=getTeam(r.mentor);
    if(t){ts[t.name].paid+=N(r.paid);ts[t.name].exp+=N(r.expected);ts[t.name].cnt++;if(r.result==='완납'||r.result==='추가'||r.result==='미등록회수')ts[t.name].wan++;}
  }));

  let allRows = [];
  Object.entries(CONSULT).forEach(([date, rows]) => {
    Object.entries(rows||{}).forEach(([rid, r]) => allRows.push({date,rid,r}));
  });
  const kw = searchKw.trim().toLowerCase();
  const matched = kw ? allRows.filter(({r}) =>
    (r.student||'').toLowerCase().includes(kw) ||
    (r.subject||'').toLowerCase().includes(kw) ||
    (r.mentor||'').toLowerCase().includes(kw)

  let h = `<div class="search-bar">

    </div>
    <input class="search-inp" type="text" placeholder="🔍 학생이름 / 과목 / 멘토 검색..."
      value="${searchKw}" oninput="W._csearchDebounce(this.value)" id="consult-search">
    ${kw ? `<button class="search-clear" onclick="W._csearch('')">✕ 초기화</button>
    <span class="search-result-cnt">${matched.length}건 검색됨</span>` : ''}

  const makeRow = (date, rid, r) => {
    const rowBg = r.result==='완납' ? 'background:#FFFDE7' : r.result==='미납' ? 'background:#FEF2F2' : r.result==='취소' ? 'background:#E5E7EB;color:#6B7280' : r.result==='COD' ? 'background:#EFF4FF' : '';
    const resSty = r.result==='완납' ? 'background:#FEF08A;color:#854D0E' : r.result==='미납' ? 'background:#FEE2E2;color:#DC2626' : r.result==='취소' ? 'background:#E5E7EB;color:#6B7280' : r.result==='COD' ? 'background:#EFF4FF;color:#2563EB' : r.result==='추가' ? 'background:#F0FDF4;color:#16A34A' : r.result==='미등록회수' ? 'background:#F5F3FF;color:#7C3AED' : 'background:#F1F5F9;color:#64748B';
    return `<tr style="${rowBg}">
      <td><select class="cs" onchange="W._cu('${date}','${rid}','mentor',this.value)">
        <option value="">선택</option>
        ${TM_CFG.map(tm=>`<optgroup label="${tm.name}">${tm.members.map(m=>`<option value="${m}"${r.mentor===m?' selected':''}>${m}</option>`).join('')}</optgroup>`).join('')}

      <td><input class="ci" value="${r.student||''}" placeholder="이름" oninput="W._cu('${date}','${rid}','student',this.value)"></td>

      <td><input class="ci" value="${r.note||''}" placeholder="비고" oninput="W._cu('${date}','${rid}','note',this.value)"></td>

    h += makeTbl(rowsHtml);
    return h;
  }
  if(kw && matched.length === 0) {
    h += `<div style="text-align:center;padding:40px;color:var(--text3);font-size:14px">검색 결과가 없어요 🔍</div>`;

  h += `<div class="csg">
    <div class="csc g"><div class="cslb">완납 합계</div><div class="csv">${F(tPaid)}</div><div class="csse">원</div></div>
    <div class="csc go"><div class="cslb">예정 합계</div><div class="csv">${F(tExp)}</div><div class="csse">원</div></div>
    <div class="csc b"><div class="cslb">총 건수</div><div class="csv">${tRows}</div><div class="csse">완납 ${cWan} / 상담 ${cSang}</div></div>
  </div><div class="tcg">`;

  TM_CFG.forEach(t => {
    const s=ts[t.name];
    h+=`<div class="tcc">
      <div class="tcch" style="background:${t.color}"><span>${t.name}</span><span style="font-size:11px;opacity:.8">${t.members.join(' · ')}</span></div>
      <div class="tccb">
        <div class="tcr"><span style="color:var(--text2)">완납</span><span style="font-weight:700;color:var(--green);font-family:'Roboto',monospace">${F(s.paid)}원</span></div>

        <div class="tcr"><span style="color:var(--text2)">건수</span><span style="font-weight:700">${s.cnt}건 (등록 ${s.wan})</span></div>
      </div>
    </div>`;
  });
  h += `</div>`;

  dates.forEach(date => {
    const rows=Object.entries(CONSULT[date]||{});
    if(!rows.length) return;
    let dp=0;
    rows.forEach(([,r])=>{dp+=N(r.paid);});
    const col=cCol[date];
    h+=`<div class="dhdr" onclick="W._cc('${date}')">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="dtc">${dlbl(date)}</span>

      <div style="display:flex;gap:14px;align-items:center">

        <span id="dhdr-arr-${date}" style="font-size:12px;color:var(--text3);font-weight:700">${col?'▼':'▲'}</span>
      </div>
    </div>`;
    if(!col) {
      const to=TM_CFG.map(t=>t.name);
      const sorted=rows.sort(([,a],[,b])=>to.indexOf(getTeam(a.mentor)?.name||'')-to.indexOf(getTeam(b.mentor)?.name||''));
      let rowsHtml = '';
      let lt=null;
      sorted.forEach(([rid,r])=>{
        const t=getTeam(r.mentor);
        if(t&&t.name!==lt){
          lt=t.name;
          rowsHtml+=`<tr class="team-sep" style="background:${t.color}12"><td colspan="9" style="color:${t.color};border-left:3px solid ${t.color}">${t.name}</td></tr>`;
        }

      });
      h+=`<div id="ctbl-${date}">${makeTbl(rowsHtml)}</div>`;
      h+=`<button id="arb-${date}" class="arb" onclick="W._ca('${date}')">+ 행 추가</button>`;
    }
  });

  return h;
}

// ── 입금 파악 (독립 페이지) ───────────────────────────
function showDep() {
  window._depRendering = true;
  try {
  document.getElementById('mc').style.display='none';
  document.getElementById('bc').style.display='none';
  document.getElementById('sc').style.display='none';
  document.getElementById('dc').style.display='';
  const today = todayStr();

  // 예정건 행 초기 세팅 및 초과 빈행 정리
  const initRows = {금일: 7, 익일: 7};
  let needSave = false;
  ['금일','익일'].forEach(type => {
    if (!SCHEDULE[today]) SCHEDULE[today] = {};
    if (!SCHEDULE[today][type]) SCHEDULE[today][type] = {};
    const keys = Object.keys(SCHEDULE[today][type]);
    const cur = keys.length;
    const target = initRows[type];
    if (cur === 0) {
      // 완전 비어있으면 초기 세팅
      for (let i = 0; i < target; i++) {
        const id = 'pre' + String(i).padStart(2,'0');
        SCHEDULE[today][type][id] = {멘토:'',이름:'',시간:'',금액:'',종류:'',결제방법:'',확률:'',특이사항:''};
      }
      needSave = true;
    } else if (type === '익일' && cur > target) {
      // 익일만 초과 빈 행 삭제 (금일은 이동한 행이 있을 수 있으므로 건드리지 않음)
      const emptyKeys = keys.filter(k => {
        const r = SCHEDULE[today][type][k];
        return !r.멘토 && !r.이름 && !r.시간 && !r.금액 && !r.특이사항;
      });
      const excess = cur - target;
      if (emptyKeys.length > 0) {
        emptyKeys.slice(0, excess).forEach(k => delete SCHEDULE[today][type][k]);
        needSave = true;
      }
    }
  });
  if (needSave) set(rSchedule, SCHEDULE);
  setTimeout(() => { window._depRendering = false; }, 1500);

  let depLeftHtml = '';
  let schGumilHtml = '';
  let schIkilHtml = '';
  try { depLeftHtml = renderDepLeft(today); } catch(e) { depLeftHtml = '<div style="color:red;padding:12px">renderDepLeft 오류: ' + e.message + '</div>'; }
  try { schGumilHtml = renderSchPanel(today,'금일'); } catch(e) { schGumilHtml = '<div style="color:red;padding:12px">금일 오류: ' + e.message + '</div>'; }
  try { schIkilHtml = renderSchPanel(today,'익일'); } catch(e) { schIkilHtml = '<div style="color:red;padding:12px">익일 오류: ' + e.message + '</div>'; }

  document.getElementById('dc').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:16px;font-weight:900;color:var(--text)">💵 입금 파악 · ${today}</span>
      <span style="font-size:11px;color:var(--text3)">09:30 / 15:30 기준</span>
      <button onclick="W._depReset('${today}')" style="padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700;background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;cursor:pointer">🔄 초기화</button>
    </div>
    <div class="dep-layout">
      <div>${depLeftHtml}</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${schGumilHtml}
        ${schIkilHtml}
      </div>
    </div>`;
  } catch(e) {
    window._depRendering = false;
    const dc = document.getElementById('dc');
    if(dc) {
      dc.style.display='';
      dc.innerHTML = '<div style="color:red;padding:20px;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">입금파악 오류: ' + e.message + '<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">' + e.stack + '</pre></div>';
    }
    console.error('showDep error:', e);
  }
}

      <td style="text-align:center;font-size:11px;font-weight:700;background:#F0FDF4">${ts.익일예정}</td>

  const t금 = TM_CFG.reduce((s,t)=>s+teamSum[t.name].금일완료,0);
  const t익 = TM_CFG.reduce((s,t)=>s+teamSum[t.name].익일예정,0);
  const t모 = TM_CFG.reduce((s,t)=>s+teamSum[t.name].모레예정,0);

    <td style="font-family:'Roboto',monospace;font-size:11px;color:#FCD34D;text-align:right;padding-right:5px">${F(total남)}</td>
    <td style="font-family:'Roboto',monospace;font-size:11px;color:#93C5FD;font-weight:900;text-align:right;padding-right:5px">${F(total완+total남)}</td>
    <td style="text-align:center;font-size:11px;color:#86EFAC;font-weight:700">${t금}</td>
    <td style="text-align:center;font-size:11px;color:#86EFAC;font-weight:700">${t익}</td>
    <td style="text-align:center;font-size:11px;color:#86EFAC;font-weight:700">${t모}</td>
    <td style="text-align:center;font-size:11px;color:#FCD34D;font-weight:700">${total출}/${TM}</td>
    <td style="text-align:center;font-size:11px;color:#FCD34D;font-weight:700">${total14}/${TM}</td>
  </tr></tbody></table></div></div>`;
  return h;
}

function renderSchPanel(today, type) {
  // 익일 최대 7행 강제 trim (Firebase에 더 많이 저장된 경우 처리)
  const maxRows = {금일: 99, 익일: 99};
  if (SCHEDULE[today]?.[type]) {
    const keys = Object.keys(SCHEDULE[today][type]).sort();
    const max = maxRows[type];
    // 빈 행만 trim (데이터 있는 행은 보존)
    const emptyKeys = keys.filter(k => {
      const r = SCHEDULE[today][type][k];
      return !r.멘토 && !r.이름 && !r.시간 && !r.금액 && !r.특이사항;
    });
    const filledKeys = keys.filter(k => {
      const r = SCHEDULE[today][type][k];
      return r.멘토 || r.이름 || r.시간 || r.금액 || r.특이사항;
    });
    if (keys.length > max) {
      // 빈 행을 잘라서 max에 맞춤
      const toDelete = emptyKeys.slice(0, keys.length - max);
      if (toDelete.length > 0) {
        toDelete.forEach(k => delete SCHEDULE[today][type][k]);
        window._depRendering = true;
        set(rSchedule, SCHEDULE);
        setTimeout(() => { window._depRendering = false; }, 1500);
      }
    }
  }

  const rows = Object.entries(SCHEDULE[today]?.[type]||{}).sort(([a],[b])=>a.localeCompare(b));
  const hdrColor = type==='금일' ? '#2563EB' : '#7C3AED';
  const totalAmt = rows.reduce((s,[,r])=>s+N(r.금액||0),0);
  const filledRows = rows.filter(([,r])=>r.멘토||r.이름);
  const wannapRows = rows.filter(([,r])=>r.완납);
  const minapRows  = rows.filter(([,r])=>r.미납);
  const wannapAmt  = wannapRows.reduce((s,[,r])=>s+N(r.금액||0),0);

  const panelId = 'sch-panel-' + type;

  let h = `<div class="dep-panel" id="${panelId}">
    <div class="dep-panel-hdr" style="background:${hdrColor}">

  rows.forEach(([id, r]) => {

          <option value="">-</option>

      </td>
      <td><input class="sch-inp sch-focus" data-panel="${panelId}" value="${r.이름||''}" style="${ds}"

      <td><input class="sch-inp sch-focus" data-panel="${panelId}" value="${r.시간||''}" style="min-width:52px;${ds}"

        onblur="W._sch('${today}','${type}','${id}','시간',this.value)"
        onkeydown="W._schTab(event,this)"></td>
      <td><input class="sch-num sch-focus" data-panel="${panelId}" value="${r.금액?F(N(r.금액)):''}" placeholder="0" style="min-width:82px;${ds}"

      <td style="${typeBadge}">

          onchange="W._sch('${today}','${type}','${id}','결제방법',this.value)"
          onkeydown="W._schTab(event,this)">
          <option value="">-</option>
          <option value="카드"${r.결제방법==='카드'?' selected':''}>카드</option>
          <option value="결제선생"${r.결제방법==='결제선생'?' selected':''}>결제선생</option>
          <option value="현금"${r.결제방법==='현금'?' selected':''}>현금</option>

}

function renderWorkload() {
  const getWeekMon = (offset=0) => {
    const d = new Date();
    const day = d.getDay();
    const mon = new Date(d);
    mon.setDate(d.getDate() - (day===0?6:day-1) + offset*7);
    return mon.toISOString().slice(0,10);
  };
  const weekKeys = [-1,0,1].map(i=>getWeekMon(i));
  if (!window._wlWeek || !weekKeys.includes(window._wlWeek)) window._wlWeek = weekKeys[1];
  const wlWeek = window._wlWeek;
  const wlData = WORKLOAD[wlWeek] || {};
  const weekLabels = ['이전주','이번주','다음주'];
  const dayKeys = ['mon','tue','wed','thu','fri','sat'];
  const getDayLabels = (monStr) => {
    const mon = new Date(monStr+'T00:00:00');
    return ['월','화','수','목','금','토'].map((wd,i) => {
      const d = new Date(mon); d.setDate(mon.getDate()+i);
      return wd+' '+( d.getMonth()+1)+'/'+ d.getDate();
    });
  };
  const dayLabels = getDayLabels(wlWeek);

  let h = `<div class="wl-wrap">
    <div class="wl-week-nav">
      <span class="wl-week-lbl">📝 주간 업무량</span>
      ${weekKeys.map((k,i)=>`<button class="wl-week-btn${k===wlWeek?' on':''}" onclick="W._wlWeek('${k}')">${weekLabels[i]}</button>`).join('')}
      <span style="font-size:11px;color:var(--text3);margin-left:4px">${wlWeek} 주 시작</span>
    </div>
    <table class="wl-tbl"><thead><tr>
      <th style="width:55px">팀</th>
      <th style="width:72px">직원</th>
      ${dayLabels.map(l=>`<th>${l}</th>`).join('')}
    </tr></thead><tbody>`;

  TM_CFG.forEach(t => {
    h += `<tr><td colspan="8" style="background:${t.color};color:#fff;font-weight:900;padding:5px 10px;text-align:left">${t.name}</td></tr>`;
    t.members.forEach(m => {
      const mData = wlData[m] || {};
      h += `<tr>
        <td style="background:var(--bg);text-align:center;font-size:11px;color:${t.color};font-weight:700;white-space:nowrap">${t.name}</td>
        <td class="wl-name" style="color:${t.color};background:var(--bg)">${m}</td>
        ${dayKeys.map(dk=>`<td><textarea class="wl-cell" placeholder="입력..."
          oninput="if(!WORKLOAD['${wlWeek}'])WORKLOAD['${wlWeek}']={};if(!WORKLOAD['${wlWeek}']['${m}'])WORKLOAD['${wlWeek}']['${m}']={};WORKLOAD['${wlWeek}']['${m}']['${dk}']=this.value"
          onblur="W._wlSave('${wlWeek}','${m}','${dk}',this.value)">${mData[dk]||''}</textarea></td>`).join('')}
      </tr>`;
    });
  });

  h += `</tbody></table></div>`;
  return h;
}

  _swStaff(tab) {
    cw=200; staffTab=tab;
    document.getElementById('mc').style.display='none';
    document.getElementById('bc').style.display='none';
    document.getElementById('sc').style.display='';

  _stab(tab) {
    staffTab=tab;
    ['nav-staff-wl','nav-staff-alt'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    if(tab==='업무량') document.getElementById('nav-staff-wl')?.classList.add('on');
    else if(tab==='대체휴무') document.getElementById('nav-staff-alt')?.classList.add('on');
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent = tab==='업무량'?'업무량':'대체휴무';
    showStaff();
  },
  _dep(date, team, member, field, val) {
    if(!DEPOSIT[date]) DEPOSIT[date]={};
    if(!DEPOSIT[date][team]) DEPOSIT[date][team]={};
    if(!DEPOSIT[date][team][member]) DEPOSIT[date][team][member]={};
    DEPOSIT[date][team][member][field] = val;
    window._depRendering = true;
    set(rDeposit, DEPOSIT);
    setTimeout(() => { window._depRendering = false; }, 2000);

    // 1. 개인 총합 셀 업데이트
    const d = DEPOSIT[date]?.[team]?.[member] || {};
    const memberTotal = N(d.완료금액||0) + N(d.남은금액||0);
    const totalTd = document.querySelector(`[data-total="${member}"]`);
    if (totalTd) {
      totalTd.textContent = F(memberTotal);
      totalTd.style.color = memberTotal > 0 ? 'var(--accent)' : 'var(--text3)';
    }

    // 2. 팀 합계 행 업데이트
    const teamCfg = TM_CFG.find(t => t.name === team);
    if (teamCfg) {
      const teamDep = DEPOSIT[date]?.[team] || {};
      const tWan = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.완료금액||0),0);
      const tNam = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.남은금액||0),0);
      const tTot = tWan + tNam;
      const tGil = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.금일완료||0),0);
      const tIk  = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.익일예정||0),0);
      const tMor = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.모레예정||0),0);
      const sumRow = document.querySelector(`[data-sum="${team}"]`);
      if (sumRow) {
        const tds = sumRow.querySelectorAll('td');
        if (tds[2]) { tds[2].textContent = F(tWan); }
        if (tds[3]) { tds[3].textContent = F(tNam); }
        if (tds[4]) { tds[4].textContent = F(tTot); tds[4].style.color = tTot>0?'var(--accent)':'var(--text3)'; }
        if (tds[5]) tds[5].textContent = tGil;
        if (tds[6]) tds[6].textContent = tIk;
        if (tds[7]) tds[7].textContent = tMor;
      }
    }

    // 3. 전체 합계 행 업데이트
    const dep = DEPOSIT[date] || {};
    const allWan = TM_CFG.reduce((s,t)=>s+t.members.reduce((ss,m)=>ss+N(dep[t.name]?.[m]?.완료금액||0),0),0);
    const allNam = TM_CFG.reduce((s,t)=>s+t.members.reduce((ss,m)=>ss+N(dep[t.name]?.[m]?.남은금액||0),0),0);
    const totalRow = document.querySelector('[data-total-row]');
    if (totalRow) {
      const tds = totalRow.querySelectorAll('td');
      if (tds[2]) tds[2].textContent = F(allWan);
      if (tds[3]) tds[3].textContent = F(allNam);
      if (tds[4]) tds[4].textContent = F(allWan+allNam);
    }

    // 4. 헤더 요약 업데이트
    const hdrSummary = document.querySelector('#dep-panel-left .dep-panel-hdr span:last-child');
    if (hdrSummary) {
      const allOut = TM_CFG.reduce((s,t)=>s+t.members.reduce((ss,m)=>ss+N(dep[t.name]?.[m]?.출근||0?1:0),0),0);
      hdrSummary.textContent = `완료 ${F(allWan)} · 남은 ${F(allNam)} · 출근 ${allOut}/${TM}`;
    }
  },
  _depStatus(date, team, member, type, checked) {
    if(!DEPOSIT[date]) DEPOSIT[date]={};
    if(!DEPOSIT[date][team]) DEPOSIT[date][team]={};
    if(!DEPOSIT[date][team][member]) DEPOSIT[date][team][member]={};
    // 완납/미납 상호 배타 처리
    DEPOSIT[date][team][member][type] = checked;
    if(checked) {
      const other = type==='완납' ? '미납' : '완납';
      DEPOSIT[date][team][member][other] = false;
    }
    window._depRendering = true;
    set(rDeposit, DEPOSIT);
    setTimeout(() => { window._depRendering = false; }, 2000);
    // 행 배경 즉시 업데이트
    const d = DEPOSIT[date][team][member];
    const allRows = document.querySelectorAll('#dep-panel-left tbody tr:not([data-sum]):not([data-total-row])');
    allRows.forEach(tr => {
      const nameTd = tr.querySelector('td:nth-child(2)');
      if (nameTd && nameTd.textContent.trim() === member) {
        tr.style.background = d.완납 ? '#FFFDE7' : d.미납 ? '#F3F4F6' : '';
        nameTd.style.textDecoration = d.완납 ? 'line-through' : '';
        nameTd.style.color = d.완납 ? 'var(--text3)' : '';
        // 반대 체크박스 해제
        const checkboxes = tr.querySelectorAll('input[type=checkbox]');
        checkboxes.forEach(cb => {
          if (cb.onchange && cb.onchange.toString().includes("'완납'")) cb.checked = !!d.완납;
          if (cb.onchange && cb.onchange.toString().includes("'미납'")) cb.checked = !!d.미납;
        });
      }
    });
  },
  _depReset(date) {
    if(!confirm(`${date} 입금파악 데이터를 초기화할까요?\n(예정건 행도 함께 초기화됩니다)`)) return;
    // DEPOSIT 초기화
    if(DEPOSIT[date]) delete DEPOSIT[date];
    set(rDeposit, DEPOSIT);
    // SCHEDULE 초기화
    if(SCHEDULE[date]) delete SCHEDULE[date];
    set(rSchedule, SCHEDULE);
    showDep();
  },
  _wlWeek(key) {
    window._wlWeek = key;
    showStaff();

  _wlSave(week, member, dayKey, val) {

  _swDep() {

  _depTab(e, el) {
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const panel = document.getElementById('dep-panel-left');
    if (!panel) return;
    const focusables = Array.from(panel.querySelectorAll('.dep-focus'));
    const idx = focusables.indexOf(el);
    const next = e.shiftKey ? focusables[idx-1] : focusables[idx+1];
    if (next) { next.focus(); if (next.select) next.select(); }
  },
  _schDone(date, type, id, checked) {
    if(!SCHEDULE[date]?.[type]?.[id]) return;
    SCHEDULE[date][type][id].완납 = checked;
    // 완납 시 미납 해제
    if(checked) SCHEDULE[date][type][id].미납 = false;
    window._depRendering = true;
    set(rSchedule, SCHEDULE);
    setTimeout(() => { window._depRendering = false; }, 1500);
    W._updateSchSummary(date, type);
    const tr = document.querySelector(`[onclick*="_schDel('${date}','${type}','${id}')"]`)?.closest('tr');
    if (tr) {
      if (checked) {
        tr.querySelectorAll('input:not([type=checkbox]),select').forEach(el => {
          el.style.textDecoration = 'line-through';
          el.style.color = 'var(--text3)';
        });
        tr.style.transition = 'opacity .25s';
        tr.style.opacity = '0';
        setTimeout(() => {
          tr.style.display = 'none';
          tr.style.opacity = '1';
          W._updateDoneToggle(date, type);
        }, 260);
      } else {
        tr.querySelectorAll('input:not([type=checkbox]),select').forEach(el => {
          el.style.textDecoration = '';
          el.style.color = '';
        });
        tr.style.display = '';
        tr.style.opacity = '0';
        setTimeout(() => { tr.style.opacity = '1'; }, 10);
        W._updateDoneToggle(date, type);
      }
    }
  },
  _updateSchSummary(date, type) {
    const panelId = 'sch-panel-' + type;
    const sumEl = document.querySelector(`#${panelId} .sch-summary`);
    if (!sumEl) return;
    const rows = Object.values(SCHEDULE[date]?.[type]||{});
    const filled  = rows.filter(r=>r.멘토||r.이름).length;

  _bm(team,member,field,val) {
    const n=N(val);
    if(!BIZ[team]) BIZ[team]={};

    BIZ[team][member][field]=n;
    // 순매출 자동 표시
    const bd=BIZ[team][member];
    const net=(bd.totalSales||0)-(bd.refund||0);
    const netEl=document.getElementById("biz-net-"+team+"-"+member);
    if(netEl) netEl.textContent=F(net);
    // 팀 합계 업데이트
    const teamCfg = TM_CFG.find(t=>t.name===team);
    if(teamCfg){
      const tTM = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.totalSales||0),0);
      const tRef = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.refund||0),0);
      const tGoalSum = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.goal||0),0);
      const tmEl = document.getElementById("biz-tm-"+team);
      const refEl = document.getElementById("biz-ref-"+team);
      const netEl2 = document.getElementById("biz-net-"+team+"-team");
      const goalEl = document.getElementById("biz-goal-"+team);
      if(tmEl) tmEl.textContent = F(tTM);
      if(refEl) refEl.textContent = F(tRef);
      if(netEl2) netEl2.textContent = F(tTM-tRef);
      if(goalEl) goalEl.textContent = F(tGoalSum);
    }
    set(rBiz,BIZ); updBizKPI();
  },

    if(!ADDLIST[id]) return;
    ADDLIST[id][field] = val;
    // 멘토 선택 시 팀 자동 세팅
    if(field==='mentor' && val) {
      const t = getTeam(val);
      if(t) ADDLIST[id].team = t.name;
    }
    set(rAddList, ADDLIST);
    if(field==='status' && cw===99 && bst==='추가리스트') showBiz();
  },
  _cp() {
    navigator.clipboard.writeText(document.getElementById('mbox').textContent).then(()=>{
      const b=document.getElementById('cpbtn'); b.textContent='✅ 복사됨!'; b.classList.add('done');
      setTimeout(()=>{b.textContent='📋 복사';b.classList.remove('done');},2000);
    });
  },
};

window.W = W;

// 전역 에러 캐치
window.onerror = function(msg, src, line, col, err) {
  console.error('JS Error:', msg, 'line:', line, err);
  const mc = document.getElementById('mc');
  if (mc && mc.innerHTML === '') {
    mc.style.display = '';
    mc.innerHTML = `<div style="padding:20px;color:#DC2626;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">
      ⚠ 오류 발생: ${msg}<br>
      <span style="font-size:11px;font-weight:400">line ${line} — ${src}</span>
    </div>`;
  }
  return false;
};

try {
  cw=-1; renderTabs(); renderMain();
} catch(e) {
  console.error('Init error:', e);
  document.getElementById('mc').style.display='';
  document.getElementById('mc').innerHTML = `<div style="padding:20px;color:#DC2626;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">
    ⚠ 초기화 오류: ${e.message}<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">${e.stack}</pre>
  </div>`;
}
</script>
</body>
</html>
