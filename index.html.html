<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임신촌 업무 현황판</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Roboto:wght@500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  font-variant-numeric: normal !important;
  font-feature-settings: "zero" 0 !important;
}
/* Roboto Mono 인라인 오버라이드 */
[style*="Roboto Mono"], .rnum, .kval, .kc-hl .kval,
.dstr, .dinp, .inp, .sv, .binp, .dep-inp, .sch-num,
.al-num, .wl-cell, td, th, input, textarea {
  font-variant-numeric: normal !important;
  font-feature-settings: "zero" 0 !important;
}
</style>
<style>
.lnk-inp {
  width:100%;padding:7px 10px;
  border:1px solid var(--border);border-radius:7px;
  background:var(--bg);outline:none;
  transition:border-color .15s,background .15s;
  cursor:text;
}
.lnk-inp:focus {
  border-color:#2563EB !important;
  background:#EFF6FF !important;
}
*{box-sizing:border-box;margin:0;padding:0;font-variant-numeric:normal;outline:none !important}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid #E8ECF0;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;display:flex;flex-direction:column}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid #F0F2F5}
.sb-logo-txt{font-size:13px;font-weight:900;color:#1A2340}
.sb-logo-sub{font-size:10px;color:#8A97B0;margin-top:2px;font-weight:500}
.sb-sec{padding:14px 10px 4px}
.sb-sec-lbl{font-size:10px;font-weight:700;color:#B0BEC5;letter-spacing:.7px;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:#5A6785;font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:#F5F7FA;color:#1A2340}
.sb-item.on{background:#EFF4FF;color:#2563EB;font-weight:700}
.sb-item .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-sub{padding-left:14px;margin-top:2px}
.sb-sub-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;cursor:pointer;color:#8A97B0;font-size:12px;font-weight:500;transition:all .15s;margin-bottom:1px;border-left:2px solid transparent}
.sb-sub-item:hover{color:#1A2340;background:#F5F7FA}
.sb-sub-item.on{color:#2563EB;font-weight:700;border-left-color:#2563EB;background:#EFF4FF}
.sb-divider{border:none;border-top:1px solid #F0F2F5;margin:6px 12px}
.sb-footer{padding:14px 16px;border-top:1px solid #F0F2F5;margin-top:auto}
.content-wrap{margin-left:200px;flex:1;min-width:0}
.wnav{display:none!important}

:root{
  --bg:#F5F7FA;--bg2:#fff;--bg3:#EEF2F7;--border:#DDE3ED;
  --text:#1A2340;--text2:#5A6785;--text3:#8A97B0;
  --accent:#2563EB;--accent-light:#EFF4FF;
  --gold:#D97706;--gold-light:#FFFBEB;
  --green:#16A34A;--red:#DC2626;--purple:#7C3AED;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;max-width:1400px;margin:0 auto}
.logo{font-size:18px;font-weight:900;color:var(--text)}.logo span{color:var(--accent)}
.hdr-r{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{background:var(--accent-light);border:1px solid #BFCFFF;color:var(--accent);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sdot.live{background:var(--green);animation:blink 2s infinite}
.slbl{font-size:11px;color:var(--text3)}
.dstr{color:var(--text3);font-size:12px;font-family:'Roboto',monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.wnav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px}
.wnav-in{display:flex;max-width:1400px;margin:0 auto;overflow-x:auto}
.wtab{padding:12px 18px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none}
.wtab:hover{color:var(--text)}.wtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.wtab.biz.on{color:var(--purple);border-bottom-color:var(--purple)}
.per{font-size:11px;font-weight:400;opacity:.8;margin-left:4px}
.main{max-width:1400px;margin:0 auto;padding:20px}
.stitle{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--text)}
.stitle::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;border-top:3px solid var(--border)}
.kc.a{border-top-color:var(--accent)}.kc.g{border-top-color:var(--green)}
.kc.go{border-top-color:var(--gold)}.kc.r{border-top-color:var(--red)}.kc.p{border-top-color:var(--purple)}
.klbl{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px}
.kval{font-size:19px;font-weight:900;font-family:'Roboto',monospace;color:var(--text);letter-spacing:-1px}
.ksub{font-size:11px;color:var(--text3);margin-top:2px}
/* 결산 누계 강조 KPI */
.kg-highlight{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:0;margin-bottom:22px;border-radius:14px;overflow:hidden;border:3px solid #1D4ED8;box-shadow:0 4px 24px rgba(37,99,235,.18)}
.kc-hl{background:var(--bg2);padding:18px 20px;border-right:1px solid #BFCFFF}
.kc-hl:last-child{border-right:none}

.kc-hl .klbl{font-size:11px;font-weight:900;color:#6B7280;letter-spacing:.3px;margin-bottom:7px;text-transform:uppercase}
.kc-hl .kval{font-size:24px;font-weight:900;font-family:'Roboto',monospace;letter-spacing:-1.5px}
.kc-hl .ksub{font-size:11px;color:#9CA3AF;margin-top:4px}
.kg-highlight-label{font-size:13px;font-weight:900;color:#1D4ED8;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.kg-highlight-label::before{content:'';display:block;width:4px;height:16px;background:#1D4ED8;border-radius:2px}
/* daily */
.dw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:11px}
.dc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.dc label{font-size:11px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px}
.dinp{width:100%;padding:6px 8px;background:var(--bg2);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto',monospace}
.dinp:focus{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.dcalc{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px}
.dcc{border-radius:8px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
/* team cards */
.tg{display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:13px;margin-bottom:18px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tch{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.tnm{font-size:15px;font-weight:900;color:#fff}.tmb{font-size:11px;color:rgba(255,255,255,.75)}
.tcb{padding:13px 14px}
.sbdg{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;margin-bottom:10px;font-size:12px;font-weight:700}
.rs{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.ys{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.gs{background:#F0FDF4;color:#14532D;border:1px solid #BBF7D0}
.bs{background:#EFF4FF;color:#1E3A8A;border:1px solid #BFCFFF}
.pw{height:6px;background:var(--bg3);border-radius:3px;margin:4px 0 12px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .4s}
.ir{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.il{font-size:12px;color:var(--text2);font-weight:500}
.irr{display:flex;align-items:center;gap:5px}
.inp{width:126px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto',monospace}
.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.iunit{font-size:11px;color:var(--text3)}
.dvd{border:none;border-top:1px solid var(--border);margin:9px 0}
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sl{font-size:12px;color:var(--text2)}.sv{font-size:13px;font-weight:700;font-family:'Roboto',monospace;color:var(--text)}
.rbig{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:8px;margin-top:9px;border:1px solid var(--border)}
.rnum{font-size:20px;font-weight:900;font-family:'Roboto',monospace}
.rmsg{font-size:11px;font-weight:700;text-align:right;line-height:1.4}
/* summary */
.sw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 11px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.tbl th:not(:first-child){text-align:right}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl td:not(:first-child){text-align:right;font-family:'Roboto',monospace}
.tbl tr:last-child td{border-bottom:none;font-weight:700}
.tdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
/* msg */
.mw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.cbtn{padding:6px 14px;border-radius:7px;background:var(--accent);color:#fff;font-weight:700;font-size:12px;border:none;cursor:pointer}
.cbtn:hover{background:#1D4ED8}.cbtn.done{background:var(--green)}
.mbox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'Roboto',monospace;font-size:12px;line-height:1.9;color:var(--text2);white-space:pre-wrap;word-break:break-all}
/* review */
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(228px,1fr));gap:11px;margin-bottom:18px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px}
.rtm{font-size:13px;font-weight:700;margin-bottom:9px}
.rf{margin-bottom:7px}.rf label{font-size:11px;color:var(--text3);font-weight:700;display:block;margin-bottom:3px}
.rf textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px;resize:vertical;min-height:48px;line-height:1.6}
.rf textarea:focus{outline:none;border-color:var(--accent)}
.stblk{margin-bottom:11px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stmr{display:flex;align-items:center;gap:5px;padding:7px 8px;background:var(--accent-light);border-bottom:1px solid var(--border)}
.snmi{width:76px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:13px;font-weight:700;color:var(--accent);background:#fff;font-family:'Noto Sans KR',sans-serif}
.srki{width:56px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:12px;color:var(--text2);background:#fff;font-family:'Noto Sans KR',sans-serif}
.snmi:focus,.srki:focus{outline:none;border-color:var(--accent)}
.sslsh{font-size:14px;color:var(--text3);font-weight:700}
.sta{width:100%;border:none;border-radius:0;min-height:68px;background:var(--bg);color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:7px;resize:vertical;line-height:1.6;display:block}
.sta:focus{outline:none;background:#FFFDE7}
.sttl{font-size:12px;font-weight:700;color:var(--accent);margin:9px 0 7px;border-top:1px solid var(--border);padding-top:9px}
.rtn{text-align:center;padding:11px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;font-size:12px;color:#15803D;margin-bottom:18px;line-height:1.8}
/* biz */
.bsn{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.bst{padding:7px 16px;font-size:13px;font-weight:600;color:var(--text3);border:1px solid var(--border);border-radius:7px;cursor:pointer;background:var(--bg);transition:all .15s}
.bst:hover{color:var(--text);border-color:var(--text3)}.bst.on{color:var(--purple);border-color:var(--purple);background:#F5F3FF}
.btb{margin-bottom:18px}
.bth{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;color:#fff;border-radius:10px 10px 0 0;flex-wrap:wrap;gap:8px}
.btht{font-size:14px;font-weight:900}
.bths{display:flex;gap:10px;align-items:center;font-size:12px;flex-wrap:wrap}
.bmtbl{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.bmtbl th{padding:7px 9px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.bmtbl th:not(:first-child){text-align:right}
.bmtbl td{padding:8px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
.bmtbl tr:last-child td{border-bottom:none;background:var(--bg)}
.binp{padding:4px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-weight:700;font-family:'Roboto',monospace;background:var(--bg);text-align:right;width:100%;box-sizing:border-box}
.binp:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.1);background:#fff}
.nr{text-align:right;font-family:'Roboto',monospace;font-size:12px}
/* consult */
.csg{display:grid;grid-template-columns:repeat(auto-fit,minmax(142px,1fr));gap:10px;margin-bottom:13px}
.csc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;border-top:3px solid var(--border)}
.csc.g{border-top-color:var(--green)}.csc.go{border-top-color:var(--gold)}
.csc.p{border-top-color:var(--purple)}.csc.b{border-top-color:var(--accent)}
.cslb{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px}
.csv{font-size:16px;font-weight:900;font-family:'Roboto',monospace;color:var(--text)}
.csse{font-size:11px;color:var(--text3);margin-top:2px}
.tcg{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:10px;margin-bottom:13px}
.tcc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tcch{padding:8px 12px;color:#fff;font-weight:900;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.tccb{padding:9px 12px}
.tcr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.tcr:last-child{border-bottom:none}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-inp{flex:1;max-width:320px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2)}
.search-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-clear{padding:7px 13px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.search-clear:hover{background:var(--bg3)}
.search-result-cnt{font-size:12px;color:var(--text3)}
.dhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:8px 8px 0 0;margin-bottom:0;cursor:pointer;user-select:none;transition:background .1s}
.dhdr:hover{background:#F8FAFF}
.dtc{font-size:14px;font-weight:900;color:var(--accent)}
.dts{font-size:12px;color:var(--text2);font-family:'Roboto',monospace}
.ctbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;margin-bottom:12px}
.ctbl th{padding:8px 10px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.ctbl td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;background:inherit}
.ctbl tr:last-child td{border-bottom:none}.ctbl tr:hover td{background:#FAFBFF}
.ctbl .team-sep td{font-size:11px;font-weight:700;padding:5px 12px;border-bottom:1px solid var(--border);isolation:isolate}
.ci{width:100%;padding:4px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--text)}
.ci:hover{border-color:var(--border);background:var(--bg)}.ci:focus{outline:none;border-color:var(--accent);background:#EFF6FF}
.cs{width:100%;padding:4px 4px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;cursor:pointer}
.cs:hover{border-color:var(--border);background:var(--bg)}.cs:focus{outline:none;border-color:var(--accent);background:#EFF6FF}
.cn{width:100%;padding:4px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Roboto',monospace;background:transparent;text-align:right;color:var(--text)}
.cn:hover{border-color:var(--border);background:var(--bg)}.cn:focus{outline:none;border-color:var(--accent);background:#EFF6FF}
.arb{width:100%;padding:7px;font-size:12px;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-top:1px dashed var(--border);cursor:pointer;border-radius:0 0 8px 8px;transition:all .15s;margin-bottom:12px}
.arb:hover{background:var(--accent-light);color:var(--accent)}
.rbadge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.rb-완납{background:#FEF08A;color:#854D0E}.rb-미납{background:#FEE2E2;color:#DC2626}
.rb-취소{background:#E5E7EB;color:#6B7280}.rb-COD{background:#EFF4FF;color:#2563EB}
.rb-추가{background:#F0FDF4;color:#16A34A}.rb-미등록회수{background:#F5F3FF;color:#7C3AED}
.rb-대기{background:#F1F5F9;color:#64748B}
.dbc{width:21px;height:21px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
.dbc:hover{background:#FEE2E2;color:var(--red)}
.main{max-width:100%;margin:0;padding:20px 24px}
@media(max-width:600px){.main{padding:14px}.kval{font-size:16px}.inp{width:108px}}
/* ── 직원관리 공통 ── */
.staff-nav{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:18px}
.staff-tab{padding:10px 20px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s}
.staff-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
/* ── 입금 파악 ── */
.dep-wrap{overflow-x:auto}

    // 현재 날짜에 맞는 영업일 자동 감지
    const today = todayStr();
    const curSch = cfg.bizSchedule.find(s => s.start && s.end && today >= s.start && today <= s.end);
    if (curSch) {
      BIZ_PERIOD.s = curSch.start;
      BIZ_PERIOD.e = curSch.end;
      // 현재 영업일에 커스텀 팀 구성이 지정되어 있으면 기본 팀 구성 위에 덮어씀
      if (curSch.teams && curSch.teams.length) {
        const validTeams = curSch.teams.filter(t => t.name && (t.members||[]).length > 0);
        if (validTeams.length) {
          TM_CFG = validTeams;
          TEAMS = validTeams.map(t => ({name:t.name, members:(t.members||[]).length, color:t.color}));
          TM = validTeams.reduce((s,t) => s + (t.members||[]).length, 0);
        }
      }
    } else {
      // 오늘이 어느 영업일에도 안 속할 때: 가장 가까운 미래 영업일 사용
      const futureSch = cfg.bizSchedule.filter(s=>s.start&&s.end).sort((a,b)=>a.start.localeCompare(b.start)).find(s => s.start > today);
      if (futureSch) {
        BIZ_PERIOD.s = futureSch.start;
        BIZ_PERIOD.e = futureSch.end;
        // 커스텀 팀 구성도 적용
        if (futureSch.teams && futureSch.teams.length) {
          const validTeams = futureSch.teams.filter(t => t.name && (t.members||[]).length > 0);
          if (validTeams.length) {
            TM_CFG = validTeams;
            TEAMS = validTeams.map(t => ({name:t.name, members:(t.members||[]).length, color:t.color}));
            TM = validTeams.reduce((s,t) => s + (t.members||[]).length, 0);
          }
        }
      } else if (cfg.bizStart) {
        BIZ_PERIOD.s = cfg.bizStart;
        BIZ_PERIOD.e = cfg.bizEnd || BIZ_PERIOD.e;
      }
    }
  } else {
    BIZ_SCHEDULE_ALL = [];
    if (cfg.bizStart) BIZ_PERIOD.s = cfg.bizStart;
    if (cfg.bizEnd) BIZ_PERIOD.e = cfg.bizEnd;
  }
  TEAMS.forEach(t => {
    if (!DATA[t.name]) DATA[t.name] = {};
    WEEKS.forEach((_,wi) => { if (!DATA[t.name][wi]) DATA[t.name][wi] = {sales:'',consult:'',contract:''}; });
  });
  TM_CFG.forEach(t => {
    if (!BIZ[t.name]) BIZ[t.name] = {};
    t.members.forEach(m => { if (!BIZ[t.name][m]) BIZ[t.name][m] = {sales:0,inquiry:0,totalSales:0,refund:0,goal:0}; });
  });
}

const F = n => Math.round(n||0).toLocaleString('ko-KR');
const P = (a,b) => b===0 ? '0.0%' : (Math.round(a/b*1000)/10).toFixed(1)+'%';
const N = v => parseInt((v+'').replace(/[^0-9]/g,''))||0;
const WG = (t,wi) => {
  const w = WEEKS[wi];
  // 1) 주차에 팀별 목표 지정돼 있으면 우선 사용
  if (w?.teamGoals?.[t.name]) return N(w.teamGoals[t.name]);
  // 2) DATA에 teamGoal 저장돼 있으면 사용
  if (DATA[t.name]?.[wi]?.teamGoal) return N(DATA[t.name][wi].teamGoal);
  // 3) 전체 목표에서 인원 비례 자동 계산
  return Math.round((w?.total||0)*(t.members/TM)/10000)*10000;
};
function ST(r) {
  if (r>=1)  return {cl:'bs', b:'🟢', m:'목표 달성! 💪'};
  if (r>=.8) return {cl:'gs', b:'🟢', m:'순항 중!'};
  if (r>=.5) return {cl:'ys', b:'🟡', m:'분발 필요!'};
  return            {cl:'rs', b:'🔴', m:'전략 점검 필요'};
}
const BC = r => r>=.8?'#16A34A':r>=.5?'#D97706':'#DC2626';
const BG = r => r>=.8?'#F0FDF4':r>=.5?'#FFFBEB':'#FEF2F2';
const TC = r => r>=.8?'#15803D':r>=.5?'#B45309':'#DC2626';
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dlbl(s) { const d=new Date(s); const wd=['일','월','화','수','목','금','토']; return `${s} (${wd[d.getDay()]})`; }
function getTeam(m) { return TM_CFG.find(t => t.members.includes(m)); }
// 이름 + 직급 표시 (직급 없으면 이름만)
function MR(m) {

  return role ? `${m} <span style="font-size:10px;color:var(--text3);font-weight:400">${role}</span>` : m;
}
// 직급 텍스트만 (순수 텍스트 필요한 곳용)
function MRT(m) { return (window._MR && window._MR[m]) ? m + ' ' + window._MR[m] : m; }

        });
        // 팀 합계 행
        const tCRate=tInq?Math.round(tConsult/tInq*100):0;
        const tRRate=tInq?Math.round(tReg/tInq*100):0;
        h += `<tr style="border-top:2px solid ${t.color};background:var(--bg);font-weight:700">

        </tr></tbody></table></div>`;

    } else {

      Object.entries(consultData).forEach(([date,rows]) => {
        Object.entries(rows||{}).forEach(([rid,r]) => {

            if (tm&&r.mentor) {
              if (!unpaidByTeam[tm.name][r.mentor]) unpaidByTeam[tm.name][r.mentor]=[];
              unpaidByTeam[tm.name][r.mentor].push({date,r});
            }
          }
        });
      });
      let hasAny=false;
      h += '<div class="addlist-wrap">';
      teams.forEach(t => {

        h += `<div class="unpaid-team-block"><div class="unpaid-team-hdr" style="background:${t.color}">

          h += `<tr class="member-row"><td colspan="6">${m} (${items.length}건)</td></tr>`;
          items.forEach(({date,r}) => {

              <td>${r.student||'-'}</td><td>${r.subject||'-'}</td>

            </tr>`;
          });
        });
        h += '</tbody></table></div>';
      });
      if (!hasAny) h += '<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">미납 항목이 없습니다</div>';
      h += '</div>';
    }

    h += `<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px 0 16px">읽기 전용 아카이브 데이터입니다</div></div></div>`;
    mc.innerHTML = h;

  } else if (arcKey.startsWith('sales/')) {
    // 결산 아카이브 (기존 로직 유지)
    const k = arcKey.slice(6);
    const arcData = (ARCHIVE.sales || {})[k] || ARCHIVE[k];
    if (!arcData) { mc.innerHTML = '<div style="padding:24px;color:var(--text3);text-align:center">아카이브 데이터를 불러오는 중...</div>'; return; }
    const cfg = arcData.config || {};

      <div style="margin-top:16px;font-size:12px;color:var(--text2);background:var(--bg);border-radius:8px;padding:14px">결산 아카이브 데이터입니다.</div>

}

function renderAllDashboard() {
  const mc = document.getElementById('mc');
  const today = new Date();
  const todayMs = today.getTime();

  // 현재 주차 계산
  let curWeekIdx = -1;
  WEEKS.forEach((w,i) => {
    if (!w.startDate || !w.endDate) return;
    const s = new Date(w.startDate+'T00:00:00').getTime();
    const e = new Date(w.endDate+'T23:59:59').getTime();
    if (todayMs >= s && todayMs <= e) curWeekIdx = i;
  });

  const diff = DAILY.thisYear - DAILY.prevYear;
  let h = `${renderNoticeBar()}
    <div class="stitle">오늘의 매출 현황</div>
    <div class="dw">
      <div class="dg">
        <div class="dc"><label>전년 누계 매출 (원)</label><input class="dinp" id="dp" type="text" inputmode="numeric"></div>
        <div class="dc"><label>올해 누계 매출 (원)</label><input class="dinp" id="dt" type="text" inputmode="numeric"></div>
        <div class="dc"><label>환불 (원)</label><input class="dinp" id="drf" type="text" inputmode="numeric" oninput="W._di('refundAmt',this.value);formatBizInp(this)"></div>
        <div class="dc" style="background:#fff;border:2px solid #2563EB;border-radius:8px;padding:4px 8px"><label style="color:#2563EB;font-weight:700">결산 순매출 (원)</label><input class="dinp" id="dnet" type="text" readonly style="background:#fff;color:var(--text);cursor:default;border-color:#2563EB"></div>
        <div class="dc"><label>일 필요매출 (원)</label><input class="dinp" id="ddaily" type="text" readonly style="background:var(--bg2);color:var(--text2);cursor:default"></div>
        <div class="dc"><label>남은 기간</label><input class="dinp" id="dremain" type="text" readonly style="background:var(--bg2);color:var(--text2);cursor:default"></div>
      <div class="dcalc">
        <div class="dcc" id="ddc" style="background:var(--bg);border:1px solid var(--border);border-radius:8px">
          <span style="font-size:12px;font-weight:700;color:var(--text2)">전년대비 차이</span>
          <span style="font-size:14px;font-weight:900;font-family:'Roboto',monospace;color:var(--red)" id="ddv">-</span>
        </div>

      </div>
    </div>`;

  // 결산 누계
  h += `<div class="kg-highlight-label">결산 누계 현황</div>
    <div class="kg-highlight">
      <div class="kc-hl hl-go"><div class="klbl">월 목표</div><div class="kval" style="color:var(--text)">${F(TG)}</div><div class="ksub">원</div></div>
      <div class="kc-hl hl-g" style="background:#fff;border:2px solid #16A34A;border-radius:10px"><div class="klbl">누계 실적</div><div class="kval" style="color:#16A34A" id="dash-kpi-sales">${F(DAILY.thisYear||0)}</div><div class="ksub">원</div></div>
      <div class="kc-hl hl-a"><div class="klbl">달성률</div><div class="kval" style="color:#2563EB" id="dash-kpi-rate">${TG>0?((DAILY.thisYear||0)/TG*100).toFixed(1)+'%':'0.0%'}</div><div class="ksub">누계 기준</div></div>
      <div class="kc-hl hl-diff" id="dash-kpi-diff-card">
        <div class="klbl">잔여 목표</div>
        <div class="kval" style="color:${TG-(DAILY.thisYear||0)>0?'#DC2626':'#16A34A'}" id="dash-kpi-diff">${F(Math.max(0,TG-(DAILY.thisYear||0)))}</div>
        <div class="ksub">원</div>
      </div>
    </div>`;


  // ── 팀별 성과 (영업현황 BIZ 데이터 기준) ──
  const ms = calcMS();
  // TM_CFG 기준으로 해당 멤버의 팀 키를 먼저 찾아 정확히 참조
  const _dashGetBd = (m) => {
    // 1순위: TM_CFG에서 이 멤버가 속한 팀 이름으로 직접 접근
    const myTeam = TM_CFG.find(t => t.members.includes(m));
    if (myTeam && BIZ[myTeam.name]?.[m]) return BIZ[myTeam.name][m];
    // 2순위: 전체 BIZ 탐색 (fallback)
    for (const tKey of Object.keys(BIZ)) {
      if (BIZ[tKey]?.[m]) return BIZ[tKey][m];
    }
    return {sales:0,inquiry:0,totalSales:0,refund:0,goal:0};
  };
  h += `<div class="kg-highlight-label" style="margin-top:8px">팀별 성과 (당월 누계)</div>
    <div class="tp-grid">`;

  TM_CFG.forEach(t => {
    const mList = t.members;

    // BIZ 영업현황 집계 (팀 이름 무관하게 멤버 이름으로 탐색)
    const tBizSales  = mList.reduce((s,m)=>s+(_dashGetBd(m).totalSales||0),0);   // 영업총매출
    const tRefund    = mList.reduce((s,m)=>s+(_dashGetBd(m).refund||0),0);        // 환불
    const tGoalBiz   = mList.reduce((s,m)=>s+(_dashGetBd(m).goal||0),0);         // 목표매출
    const tInq       = mList.reduce((s,m)=>s+(_dashGetBd(m).inquiry||0),0);      // 문의
    const tNetSales  = tBizSales - tRefund;                                             // 순매출

    // 상담내역(calcMS) 집계
    const tWan    = mList.reduce((s,m)=>s+(ms[m]?.완납||0),0);
    const tMiNap  = mList.reduce((s,m)=>s+(ms[m]?.미납||0),0);
    const tCancel = mList.reduce((s,m)=>s+(ms[m]?.취소||0),0);
    const tCOD    = mList.reduce((s,m)=>s+(ms[m]?.COD||0),0);
    const tReg    = mList.reduce((s,m)=>s+(ms[m]?.등록||0),0);
    const tSang   = mList.reduce((s,m)=>s+(ms[m]?.상담||0),0);

    // 달성률: 순매출 ÷ 목표매출
    const tRate = tGoalBiz>0 ? tNetSales/tGoalBiz : 0;
    // 상담률: 상담수 ÷ 문의수
    const consultRate = tInq>0 ? (tSang/tInq*100).toFixed(1)+'%' : '—';
    // 등록률: 등록수 ÷ 상담수
    const regRate = tSang>0 ? (tReg/tSang*100).toFixed(1)+'%' : '—';

    // 개인별 달성률 바
    const mbrBars = mList.map(m => {
      const bd = _dashGetBd(m);
      const mSales = bd.totalSales||0;
      const mGoal  = bd.goal||0;
      const mRate  = mGoal>0 ? Math.min(100, mSales/mGoal*100) : 0;
      return `<div class="tp-mbr-row">
        <span class="tp-mbr-name">${MRT(m)}</span>
        <div class="tp-mbr-right">
          <div class="tp-mbr-nums">
            <span class="tp-mbr-sales">${F(mSales)}원</span>
            <span class="tp-mbr-pct">${mGoal>0?mRate.toFixed(1)+'%':'—'}</span>
          </div>
          <div class="tp-bar-bg"><div class="tp-bar-fill" style="width:${mRate}%;background:${t.color}88"></div></div>
        </div>
      </div>`;
    }).join('');

    h += `<div class="tp-card">
      <div class="tp-card-hdr">
        <span class="tp-badge" style="background:${t.color};color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px">${t.name} (${mList.length}명)</span>
        <div style="text-align:right">
          <div class="tp-rate-big" style="color:${TC(tRate)}">${(tRate*100).toFixed(1)}%</div>
          <div class="tp-rate-lbl">달성률</div>
        </div>
      </div>
      <div class="tp-bar-wrap">
        <div class="tp-bar-bg" style="height:10px;border-radius:6px">
          <div class="tp-bar-fill" style="width:${Math.min(100,tRate*100)}%;background:${TC(tRate)};border-radius:6px"></div>
        </div>
        <div class="tp-bar-labels">
          <span class="tp-bar-now">${F(tNetSales)}원</span>
          <span class="tp-bar-goal">목표 ${tGoalBiz>0?F(tGoalBiz)+'원':'미설정'}</span>
        </div>
      </div>
      <div class="tp-divider"></div>
      <div class="tp-card-body">
        ${mbrBars}
        <div class="tp-divider" style="margin:8px 0"></div>
        <div class="tp-badges">
          <span class="tp-badge" style="background:#F0FDF4;color:#15803D">완납 ${F(tWan)}</span>
          <span class="tp-badge" style="background:#FEF2F2;color:#991B1B">미납 ${F(tMiNap)}</span>
          <span class="tp-badge" style="background:#F3F4F6;color:#4B5563">취소 ${tCancel}</span>
          ${tCOD>0?`<span class="tp-badge" style="background:#F3F4F6;color:#4B5563">COD ${tCOD}</span>`:''}
        </div>
        <div class="tp-divider" style="margin:8px 0"></div>
        <div class="tp-rate-row">
          <div class="tp-rate-item"><div class="r-lbl">상담률</div><div class="r-val">${consultRate}</div></div>
          <div class="tp-rate-item"><div class="r-lbl">등록률</div><div class="r-val">${regRate}</div></div>
          <div class="tp-rate-item"><div class="r-lbl">문의</div><div class="r-val">${tInq}</div></div>
          <div class="tp-rate-item"><div class="r-lbl">등록수</div><div class="r-val">${tReg}</div></div>
        </div>
      </div>
    </div>`;
  });

  h += `</div>`;
  h += `<div class="rtn">🟢 실시간 공유 중 — 누구든 입력하면 모든 접속자 화면에 즉시 반영됩니다</div>`;
  mc.innerHTML = h;

  const fields = [['dp','prevYear'],['dt','thisYear'],['drf','refundAmt']];
  fields.forEach(([id,key]) => {
    const el = document.getElementById(id);
    if (el) el.oninput = function(){ W._di(key, this.value); formatBizInp(this); };
  });
  updDailyInp(); updDailyCalc();
}

function updDailyInp() {
  const map = [['dp','prevYear'],['dt','thisYear'],['drf','refundAmt']];
  map.forEach(([id,k]) => {
    const el = document.getElementById(id);
    if (el && document.activeElement !== el)
      el.value = F(DAILY[k]||0);
  });
}
function updDailyCalc() {
  const diff = DAILY.thisYear - DAILY.prevYear;
  const dv = document.getElementById('ddv'), dc = document.getElementById('ddc');
  if (dv) { dv.textContent=(diff>=0?'+':'')+F(diff)+'원'; dv.style.color=diff>=0?'#15803D':'#DC2626'; }
  if (dc) dc.style.cssText=`background:${diff>=0?'#F0FDF4':'#FEF2F2'};border:1px solid ${diff>=0?'#BBF7D0':'#FECACA'};border-radius:8px`;
  // 결산 순매출 = 올해누계 - 환불
  const netSales = (DAILY.thisYear||0) - (DAILY.refundAmt||0);
  const elNet = document.getElementById('dnet');
  if (elNet) { elNet.value = F(netSales); elNet.style.color = 'var(--text)'; }
  // 남은 기간 + 일 필요매출
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const remainDays = Math.max(0, lastDay.getDate() - now.getDate() + 1);
  const elRemain = document.getElementById('dremain');
  if (elRemain) elRemain.value = remainDays + '일';
  const remainAmt = Math.max(0, TG - (DAILY.thisYear||0));
  const dailyNeed = remainDays > 0 ? Math.ceil(remainAmt / remainDays) : 0;
  const elDaily = document.getElementById('ddaily');
  if (elDaily) { elDaily.value = F(dailyNeed); elDaily.style.color = dailyNeed > 0 ? '#DC2626' : '#15803D'; }
  // 결산 누계 현황 KPI 실시간 갱신
  const ks = document.getElementById('dash-kpi-sales');
  const kr = document.getElementById('dash-kpi-rate');
  const kd = document.getElementById('dash-kpi-diff');
  const kc = document.getElementById('dash-kpi-diff-card');
  if (ks) ks.textContent = F(DAILY.thisYear||0);
  if (kr) kr.textContent = TG>0 ? ((DAILY.thisYear||0)/TG*100).toFixed(1)+'%' : '0.0%';
  if (kd) {
    const remain = Math.max(0, TG - (DAILY.thisYear||0));
    kd.textContent = F(remain);
    kd.style.color = remain > 0 ? '#DC2626' : '#16A34A';
  }
  if (kc) { kc.style.cssText = ''; }
}

function updTStats() {

function renderUnpaidList() {
  const unpaidByTeam = {};
  TM_CFG.forEach(t => { unpaidByTeam[t.name] = {}; t.members.forEach(m => { unpaidByTeam[t.name][m] = []; }); });

  // 과거 영업월이면 아카이브 데이터, 아니면 라이브 CONSULT 사용
  const today = todayStr();
  const isPast = BIZ_PERIOD.e < today;
  let consultSrc = CONSULT;
  if (isPast) {
    const bizArc = ARCHIVE.biz || {};
    const arcEntry = Object.values(bizArc).find(v => v.period && v.period.s === BIZ_PERIOD.s && v.period.e === BIZ_PERIOD.e);
    if (arcEntry && arcEntry.consult) consultSrc = arcEntry.consult;
  }

  Object.entries(consultSrc).forEach(([date, rows]) => {
    if (date < BIZ_PERIOD.s || date > BIZ_PERIOD.e) return;
    Object.entries(rows||{}).forEach(([rid, r]) => {
      if (r.result === '미납') {
        const t = getTeam(r.mentor);
        if (t && unpaidByTeam[t.name] && r.mentor) {
          if (!unpaidByTeam[t.name][r.mentor]) unpaidByTeam[t.name][r.mentor] = [];
          unpaidByTeam[t.name][r.mentor].push({date, rid, r});
        }
      }
    });
  });

  let h = `<div class="addlist-wrap">
    <div class="stitle" style="margin-bottom:10px">💰 미납 리스트 <span style="font-size:11px;font-weight:400;color:var(--text3)">(상담내역 결과 '미납' 자동집계)</span></div>`;

  const fmtDate = d => {
    const dt = new Date(d);
    return `${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  };

  let hasAny = false;
  TM_CFG.forEach(t => {
    const teamItems = t.members.flatMap(m => unpaidByTeam[t.name][m]||[]);
    if (!teamItems.length) return;
    hasAny = true;
    h += `<div class="unpaid-team-block"><div class="unpaid-team-hdr" style="background:${t.color}">
      <span>${t.name} <span style="font-size:12px;font-weight:400;opacity:.9;margin-left:8px">${teamItems.length}건 · 예정 ${F(teamItems.reduce((s,{r})=>s+N(r.expected),0))}원</span></span>
    </div>
    <table class="unpaid-tbl">
      <thead><tr>
        <th style="width:64px">직원</th>
        <th style="width:64px">학생</th>
        <th style="width:72px">과목</th>
        <th style="width:56px">날짜</th>
        <th style="width:84px">예정금액</th>
        <th style="width:180px">비고</th>
        <th>📝 피드백</th>
      </tr></thead><tbody>`;
    t.members.forEach(m => {
      const items = unpaidByTeam[t.name][m]||[];
      if (!items.length) return;
      h += `<tr class="member-row"><td colspan="7">${m} (${items.length}건)</td></tr>`;
      items.forEach(({date, rid, r}) => {
        const fbKey = `${date}_${rid}`;
        const fb = FEEDBACK[fbKey] || '';
        h += `<tr>
          <td style="color:${t.color};font-weight:600">${m}</td>
          <td>${r.student||'-'}</td>
          <td>${r.subject||'-'}</td>
          <td style="font-family:'Roboto',monospace;font-size:11px">${fmtDate(date)}</td>
          <td style="text-align:right;font-family:'Roboto',monospace;color:var(--gold);font-weight:700">${r.expected?F(N(r.expected)):'-'}</td>
          <td style="color:var(--text2);font-size:11px;line-height:1.5;word-break:keep-all;overflow-wrap:break-word">${r.note||''}</td>
          <td>
            <input class="unpaid-fb-inp" value="${fb.replace(/"/g,'&quot;')}" placeholder="피드백 입력..."
              data-key="${fbKey}"
              oninput="FEEDBACK['${fbKey}']=this.value"
              onblur="W._saveFb('${fbKey}',this.value)"
              style="width:100%;padding:4px 7px;border:1px solid transparent;border-radius:5px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:${fb?'#FFFDE7':'transparent'};color:var(--text);min-width:120px">
          </td>
        </tr>`;
      });
    });
    h += `</tbody></table></div>`;
  });

  if (!hasAny) h += `<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">미납 항목이 없습니다 ✅</div>`;
  h += `</div>`;
  return h;
}

// ── 상담 집계 ─────────────────────────────────────────
function calcMS() {
  const ms = {};
  TM_CFG.forEach(t => t.members.forEach(m => {
    ms[m] = {상담:0, 등록:0, 미등록:0, 취소:0, 완납:0, 미납:0, COD:0};
  }));
  // 예정 영업월이면 상담 데이터도 제로
  if (window._bizIsFuture) return ms;
  // BIZ_PERIOD 범위 안의 날짜만 집계
  Object.entries(CONSULT).forEach(([date, day]) => {
    if (date < BIZ_PERIOD.s || date > BIZ_PERIOD.e) return;
    Object.values(day||{}).forEach(r => {
      const m = r.mentor; if (!ms[m]) return;
      if (r.status === '상담') ms[m].상담++;
      if (r.result === '완납') { ms[m].완납 += N(r.paid); ms[m].등록++; }
      if (r.result === '미납') { ms[m].미납 += N(r.expected); ms[m].미등록++; }
      if (r.result === '미등록회수') { ms[m].완납 += N(r.paid); ms[m].등록++; }
      if (r.result === '취소') ms[m].취소++;
      if (r.result === 'COD') { ms[m].완납 += N(r.paid); ms[m].등록++; ms[m].COD++; }
    });
  });
  return ms;
}

// ── 영업 탭 ──────────────────────────────────────────

function makeBizMonthNav() {
  const bizStart = new Date(BIZ_PERIOD.s+'T00:00:00');
  const today = todayStr();

  // 영업일 일정 전체 목록 활용
  let schedules = BIZ_SCHEDULE_ALL.length
    ? [...BIZ_SCHEDULE_ALL].sort((a,b)=>a.start.localeCompare(b.start))
    : [{label:'', start:BIZ_PERIOD.s, end:BIZ_PERIOD.e}];

  // 현재 영업월 인덱스 (오늘 날짜 기준)
  const curIdx = schedules.findIndex(s => today >= s.start && today <= s.end);
  // 오늘이 어느 영업일에도 속하지 않으면: 가장 가까운 미래 영업일 → 없으면 마지막
  let curActualIdx;
  if (curIdx >= 0) {
    curActualIdx = curIdx;
  } else {
    const futureIdx = schedules.findIndex(s => s.start > today);
    curActualIdx = futureIdx >= 0 ? futureIdx : schedules.length - 1;
  }

  const selMonth = window._bizSelMonth;
  let selIdx = selMonth === undefined || selMonth === 'current'
    ? curActualIdx
    : schedules.findIndex(s => s.start === selMonth);
  if (selIdx < 0) selIdx = curActualIdx;

  const sch = schedules[selIdx] || schedules[schedules.length-1];
  const dispStart = new Date(sch.start+'T00:00:00');
  const dispLbl = sch.label || `${dispStart.getFullYear()}년 ${dispStart.getMonth()+1}월`;
  const isCurrent = selIdx === curActualIdx;
  const canPrev = selIdx > 0;
  const canNext = selIdx < schedules.length - 1;
  // 각 버튼에 start 날짜를 키로 전달
  const prevStart = canPrev ? schedules[selIdx-1].start : '';
  const nextStart = canNext ? schedules[selIdx+1].start : '';

  return `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;flex-wrap:wrap">
    <button onclick="W._bizMonthKey('${prevStart}')" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;${canPrev?'':'opacity:.3;cursor:not-allowed'}" ${canPrev?'':'disabled'}>◀</button>
    <div style="text-align:center;min-width:140px">
      <div style="font-size:15px;font-weight:900">${dispLbl} 영업</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${sch.start} ~ ${sch.end}</div>
    </div>
    ${isCurrent?'<span style="padding:2px 8px;background:#DBEAFE;color:#2563EB;border-radius:20px;font-size:11px;font-weight:700">현재</span>':(sch.start>today?'<span style="padding:2px 8px;background:#DCFCE7;color:#166534;border-radius:20px;font-size:11px;font-weight:700">예정</span>':'<span style="padding:2px 8px;background:#F1F5F9;color:#64748B;border-radius:20px;font-size:11px;font-weight:700">과거</span>')}
    <button onclick="W._bizMonthKey('${nextStart}')" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;${canNext?'':'opacity:.3;cursor:not-allowed'}" ${canNext?'':'disabled'}>▶</button>
    <div style="width:1px;height:24px;background:var(--border);margin:0 4px"></div>
    <button onclick="W._bizMonthCur()" style="padding:5px 12px;border-radius:6px;border:1px solid ${isCurrent?'var(--accent)':'var(--border)'};background:${isCurrent?'var(--accent)':'var(--bg)'};color:${isCurrent?'#fff':'var(--text2)'};font-size:12px;font-weight:700;cursor:pointer">현재 영업월</button>
  </div>`;
}

        <td class="nr" style="color:var(--purple);font-weight:700">${(bd.goal||0)>0?((net/(bd.goal))*100).toFixed(1)+'%':'0.0%'}</td>
      </tr>`;
    });

    h += `<tr>
      <td style="color:${t.color};font-weight:700">팀 합계</td>
      <td class="nr" style="color:var(--text);font-weight:700">${tInq}</td>
      <td class="nr">${t상담}</td>
      <td class="nr">${t등록}</td>
      <td class="nr">${t미등록}</td>
      <td class="nr">${t취소}</td>
      <td class="nr" style="color:var(--text);font-weight:700" id="${"biz-goal-"+t.name}">${F(tGoal)}</td>
      <td class="nr" style="color:var(--text);font-weight:900" id="${"biz-tm-"+t.name}">${F(tTM)}</td>
      <td class="nr" style="color:var(--text)" id="${"biz-ref-"+t.name}">${F(tRef)}</td>
      <td class="nr" style="color:var(--accent);font-weight:900;font-size:14px;background:#EFF4FF;border-radius:4px" id="${"biz-net-"+t.name+"-team"}">${F(tTM-tRef)}</td>
      <td class="nr" style="color:var(--purple);font-weight:700">${tGoal>0?((tTM-tRef)/tGoal*100).toFixed(1)+'%':'0.0%'}</td>
    </tr></tbody></table></div>`;
  });

  const _isPastBiz = BIZ_PERIOD.e < todayStr();
  if (_isPastBiz) {
    h += `<div class="rtn" style="background:#FEF9C3;color:#92400E;border:1px solid #FDE68A">⚠ 지난 영업월 데이터입니다. 수정 후 저장됩니다.</div>`;
  } else {
    h += `<div class="rtn">🟢 영업 실적 실시간 저장 · 상담/등록/미등록은 상담내역에서 자동 집계</div>`;
  }
  document.getElementById('bc').innerHTML = h;
  } catch(e) {
    document.getElementById('bc').style.display='';
    document.getElementById('bc').innerHTML = `<div style="color:red;padding:20px;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">영업현황 오류: ${e.message}<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">${e.stack}</pre></div>`;
    console.error('showBiz error:', e);
  }
}

function updBizKPI() {
  if (bst !== '요약') return;
  const ms = calcMS();
  let totBiz=0,totTM=0,totRef=0,totInq=0,tot상담=0,tot등록=0,tot미등록=0,tot취소=0,totWan=0,totMi=0;
  let vc=0,sr=0;
  const _eb={sales:0,inquiry:0,totalSales:0,refund:0,goal:0};
  // 과거 영업월이면 아카이브 BIZ 참조
  const _kpiArcBiz = (() => {
    if (BIZ_PERIOD.e >= todayStr()) return null;
    const ae = Object.values(ARCHIVE.biz||{}).find(v=>v.period&&v.period.s===BIZ_PERIOD.s&&v.period.e===BIZ_PERIOD.e);
    return ae?.biz || null;
  })();
  const _gb=(team,m)=>{
    if(window._bizIsFuture) return _eb;
    if(BIZ[team]?.[m]) return BIZ[team][m];
    for(const k of Object.keys(BIZ)){ if(BIZ[k]?.[m]) return BIZ[k][m]; }
    if(_kpiArcBiz){
      if(_kpiArcBiz[team]?.[m]) return _kpiArcBiz[team][m];
      for(const k of Object.keys(_kpiArcBiz)){ if(_kpiArcBiz[k]?.[m]) return _kpiArcBiz[k][m]; }
    }
    return _eb;
  };
  const _emptyMs={상담:0,등록:0,미등록:0,취소:0,완납:0,미납:0,COD:0};
  TM_CFG.forEach(t => t.members.forEach(m => {
    const bd=_gb(t.name,m);
    const sm=ms[m]||_emptyMs;
    totBiz+=(bd.sales||0);totTM+=(bd.totalSales||0);totRef+=(bd.refund||0);
    totInq+=(bd.inquiry||0);totWan+=sm.완납;totMi+=sm.미납;
    tot상담+=sm.상담;tot등록+=sm.등록;tot미등록+=sm.미등록;tot취소+=sm.취소;
    if((bd.inquiry||0)>0){sr+=sm.등록/bd.inquiry;vc++;}
  }));
  const cards = document.querySelectorAll('#bc .kval');
  if (cards.length >= 8) {
    cards[0].textContent=F(totWan); cards[1].textContent=F(totMi);
    cards[2].textContent=`${totInq}/${tot상담}/${tot등록}/${tot미등록}/${tot취소}`;
    cards[3].textContent=vc>0?(sr/vc*100).toFixed(1)+'%':'0.0%';
  }
}

// ── 상담 내역 탭 ─────────────────────────────────────
function renderConsult(searchKw='') {
  // 예정 영업월이면 빈 화면
  if (window._bizIsFuture) {
    return '<div style="text-align:center;padding:48px;color:var(--text3);font-size:13px">예정된 영업월입니다.<br>아직 상담 내역이 없어요.</div>';
  }

  // 과거 영업월이면 아카이브 데이터, 아니면 라이브 CONSULT 사용
  const today = todayStr();
  const isPast = BIZ_PERIOD.e < today;
  let consultSrc = CONSULT;
  if (isPast) {
    const bizArc = ARCHIVE.biz || {};
    const arcEntry = Object.values(bizArc).find(v => v.period && v.period.s === BIZ_PERIOD.s && v.period.e === BIZ_PERIOD.e);
    if (arcEntry && arcEntry.consult) consultSrc = arcEntry.consult;
  }

  const dates = Object.keys(consultSrc).filter(d => d >= BIZ_PERIOD.s && d <= BIZ_PERIOD.e).sort((a,b)=>b.localeCompare(a));
  let tPaid=0,tExp=0,tRows=0,cWan=0,cSang=0;
  const ts = {};
  TM_CFG.forEach(t => ts[t.name]={paid:0,exp:0,em:0,cnt:0,wan:0});

  dates.forEach(date => {
    Object.values(consultSrc[date]||{}).forEach(r => {
      tPaid+=N(r.paid); tExp+=N(r.expected); tRows++;
      if(r.result==='완납'||r.result==='추가') cWan++;
      if(r.status==='상담') cSang++;
      const t=getTeam(r.mentor);
      if(t){ts[t.name].paid+=N(r.paid);ts[t.name].exp+=N(r.expected);ts[t.name].cnt++;if(r.result==='완납'||r.result==='추가'||r.result==='미등록회수')ts[t.name].wan++;}
    });
  });

  let allRows = [];
  Object.entries(consultSrc).forEach(([date, rows]) => {
    if (date < BIZ_PERIOD.s || date > BIZ_PERIOD.e) return;
    Object.entries(rows||{}).forEach(([rid, r]) => allRows.push({date,rid,r}));
  });
  const kw = searchKw.trim().toLowerCase();
  const matched = kw ? allRows.filter(({r}) =>
    (r.student||'').toLowerCase().includes(kw) ||
    (r.subject||'').toLowerCase().includes(kw) ||
    (r.mentor||'').toLowerCase().includes(kw)
  ) : null;

  let h = `<div class="search-bar">
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
      <input type="date" id="cdi" value="${todayStr()}"
        style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--text);background:var(--bg2)">
      ${isPast ? '<span style="font-size:11px;padding:4px 10px;background:#F1F5F9;color:#64748B;border-radius:6px;font-weight:600">읽기 전용</span>' : '<button onclick="W._cad()" style="padding:6px 14px;border-radius:7px;font-size:12px;font-weight:700;background:var(--accent);color:#fff;border:none;cursor:pointer;white-space:nowrap">+ 날짜 추가</button>'}
    </div>
    <input class="search-inp" type="text" placeholder="🔍 학생이름 / 과목 / 멘토 검색..."
      value="${searchKw}" oninput="W._csearchDebounce(this.value)" id="consult-search">
    ${kw ? `<button class="search-clear" onclick="W._csearch('')">✕ 초기화</button>
    <span class="search-result-cnt">${matched.length}건 검색됨</span>` : ''}
  </div>`;

  const makeRow = (date, rid, r) => {
    const rowBg = r.result==='완납' ? 'background:#FFFDE7' : r.result==='미납' ? 'background:#FEF2F2' : r.result==='취소' ? 'background:#E5E7EB;color:#6B7280' : r.result==='COD' ? 'background:#EFF4FF' : '';
    const resSty = r.result==='완납' ? 'background:#FEF08A;color:#854D0E' : r.result==='미납' ? 'background:#FEE2E2;color:#DC2626' : r.result==='취소' ? 'background:#E5E7EB;color:#6B7280' : r.result==='COD' ? 'background:#EFF4FF;color:#2563EB' : r.result==='추가' ? 'background:#F0FDF4;color:#16A34A' : r.result==='미등록회수' ? 'background:#F5F3FF;color:#7C3AED' : 'background:#F1F5F9;color:#64748B';
    return `<tr style="${rowBg}">
      <td><select class="cs" onchange="W._cu('${date}','${rid}','mentor',this.value)">
        <option value="">선택</option>
        ${TM_CFG.map(tm=>`<optgroup label="${tm.name}">${tm.members.map(m=>`<option value="${m}"${r.mentor===m?' selected':''}>${m}</option>`).join('')}</optgroup>`).join('')}
      </select></td>
      <td><input class="ci" value="${r.student||''}" placeholder="이름" oninput="W._cu('${date}','${rid}','student',this.value)"></td>
      <td><input class="ci" value="${r.subject||''}" placeholder="과목" oninput="W._cu('${date}','${rid}','subject',this.value)"></td>
      <td><select class="cs" onchange="W._cu('${date}','${rid}','status',this.value)">
        ${STS.map(s=>`<option value="${s}"${r.status===s?' selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><select class="cs" onchange="W._cu('${date}','${rid}','result',this.value)" style="${resSty};border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;appearance:none;-webkit-appearance:none;text-align:center">
        <option value="">대기</option>
        ${RES.map(s=>`<option value="${s}"${r.result===s?' selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><input class="cn" value="${r.paid?F(N(r.paid)):''}" placeholder="0" oninput="W._cu('${date}','${rid}','paid',this.value)"></td>
      <td><input class="cn" value="${r.expected?F(N(r.expected)):''}" placeholder="0" oninput="W._cu('${date}','${rid}','expected',this.value)"></td>
      <td><input class="ci" value="${r.note||''}" placeholder="비고" oninput="W._cu('${date}','${rid}','note',this.value)"></td>
      <td><button class="dbc" onclick="W._cd('${date}','${rid}')">×</button></td>
    </tr>`;
  };

  const makeTbl = (rowsHtml) => `<table class="ctbl"><thead><tr>
    <th style="width:68px">멘토</th><th style="width:78px">학생이름</th>
    <th style="width:80px">과목</th><th style="width:63px">상태</th><th style="width:90px">결과</th>
    <th style="width:86px">완납(원)</th><th style="width:86px">예정(원)</th>
    <th>비고</th><th style="width:22px"></th>
  </tr></thead><tbody>${rowsHtml}</tbody></table>`;

  if(kw && matched.length > 0) {
    const to = TM_CFG.map(t=>t.name);
    const sorted = matched.sort((a,b)=>to.indexOf(getTeam(a.r.mentor)?.name||'')-to.indexOf(getTeam(b.r.mentor)?.name||''));
    let rowsHtml = sorted.map(({date,rid,r}) => makeRow(date,rid,r)).join('');
    h += makeTbl(rowsHtml);
    return h;
  }
  if(kw && matched.length === 0) {
    h += `<div style="text-align:center;padding:40px;color:var(--text3);font-size:14px">검색 결과가 없어요 🔍</div>`;
    return h;
  }

  h += `<div class="csg">
    <div class="csc g"><div class="cslb">완납 합계</div><div class="csv">${F(tPaid)}</div><div class="csse">원</div></div>
    <div class="csc go"><div class="cslb">예정 합계</div><div class="csv">${F(tExp)}</div><div class="csse">원</div></div>
    <div class="csc b"><div class="cslb">총 건수</div><div class="csv">${tRows}</div><div class="csse">완납 ${cWan} / 상담 ${cSang}</div></div>
  </div><div class="tcg">`;

  TM_CFG.forEach(t => {
    const s=ts[t.name];
    h+=`<div class="tcc">
      <div class="tcch" style="background:${t.color}"><span>${t.name}</span><span style="font-size:11px;opacity:.8">${t.members.join(' · ')}</span></div>
      <div class="tccb">
        <div class="tcr"><span style="color:var(--text2)">완납</span><span style="font-weight:700;color:var(--green);font-family:'Roboto',monospace">${F(s.paid)}원</span></div>
        <div class="tcr"><span style="color:var(--text2)">예정</span><span style="font-weight:700;color:var(--gold);font-family:'Roboto',monospace">${F(s.exp)}원</span></div>
        <div class="tcr"><span style="color:var(--text2)">건수</span><span style="font-weight:700">${s.cnt}건 (등록 ${s.wan})</span></div>
      </div>
    </div>`;
  });
  h += `</div>`;

  dates.forEach(date => {
    const rows=Object.entries(CONSULT[date]||{});
    if(!rows.length) return;
    let dp=0;
    rows.forEach(([,r])=>{dp+=N(r.paid);});
    const col=cCol[date];
    h+=`<div class="dhdr" onclick="W._cc('${date}')">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="dtc">${dlbl(date)}</span>
        <span style="font-size:11px;color:var(--text3)">${rows.length}건</span>
      </div>
      <div style="display:flex;gap:14px;align-items:center">
        <span style="font-size:12px;color:var(--text2);font-family:'Roboto',monospace">완납 ${F(dp)}원</span>
        <span id="dhdr-arr-${date}" style="font-size:12px;color:var(--text3);font-weight:700">${col?'▼':'▲'}</span>
      </div>
    </div>`;
    if(!col) {
      const to=TM_CFG.map(t=>t.name);
      const sorted=rows.sort(([,a],[,b])=>to.indexOf(getTeam(a.mentor)?.name||'')-to.indexOf(getTeam(b.mentor)?.name||''));
      let rowsHtml = '';
      let lt=null;
      sorted.forEach(([rid,r])=>{
        const t=getTeam(r.mentor);
        if(t&&t.name!==lt){
          lt=t.name;
          rowsHtml+=`<tr class="team-sep" style="background:var(--bg2)"><td colspan="9" style="color:var(--text2);border-left:3px solid ${t.color};font-weight:700">${t.name}</td></tr>`;
        }
        rowsHtml += makeRow(date,rid,r);
      });
      h+=`<div id="ctbl-${date}">${makeTbl(rowsHtml)}</div>`;
      h+=`<button id="arb-${date}" class="arb" onclick="W._ca('${date}')">+ 행 추가</button>`;
    }
  });

  return h;
}

// 입력값 콤마 포맷
function formatBizInp(el) {
  const n = N(el.value);
  const pos = el.selectionStart;
  const old = el.value;
  el.value = n ? F(n) : '';
  // 커서 위치 보정
  const diff = el.value.length - old.length;
  try { el.setSelectionRange(pos+diff, pos+diff); } catch(e){}
}

// ── 입금 파악 (독립 페이지) ───────────────────────────
function showDep() {
  window._depRendering = true;
  try {
  document.getElementById('mc').style.display='none';
  document.getElementById('bc').style.display='none';
  document.getElementById('sc').style.display='none';
  document.getElementById('dc').style.display='';
  const today = todayStr();

  // 고정키('fixed') 초기화 - 날짜 무관하게 항상 유지
  let needSave = false;
  if (!SCHEDULE['fixed']) SCHEDULE['fixed'] = {};

  // ── 날짜가 바뀌면 완납 행 자동 삭제 ──────────────────────────────
  const _lastDateKey = 'fixed_last_date';
  const _lastDate = SCHEDULE[_lastDateKey] || null;
  if (_lastDate && _lastDate !== today) {
    // 날짜가 바뀐 경우: 금일/익일에서 완납된 행 삭제
    ['금일','익일'].forEach(type => {
      const rows = SCHEDULE['fixed'][type] || {};
      Object.keys(rows).forEach(id => {
        if (rows[id].완납 === true) {
          delete SCHEDULE['fixed'][type][id];
          needSave = true;
        }
      });
    });
  }
  // 오늘 날짜 기록 (다음날 비교용)
  if (SCHEDULE[_lastDateKey] !== today) {
    SCHEDULE[_lastDateKey] = today;
    needSave = true;
  }
  // ─────────────────────────────────────────────────────────────────

  ['금일','익일'].forEach(type => {
    if (!SCHEDULE['fixed'][type]) {
      SCHEDULE['fixed'][type] = {};
      for (let i = 0; i < 7; i++) {
        const id = 'pre' + String(i).padStart(2,'0');
        SCHEDULE['fixed'][type][id] = {_exists:true,멘토:'',이름:'',시간:'',금액:'',종류:'',결제방법:'',확률:'',특이사항:''};
      }
      needSave = true;
    }
  });
  if (needSave) {
    window._depRendering = true;
    // 전체 덮어쓰기 방지 — 변경된 경로만 개별 update
    const savePromises = [];
    if (SCHEDULE[_lastDateKey]) {
      savePromises.push(update(ref(db, 'schedule2025'), {[_lastDateKey]: today}));
    }
    // 완납 행 삭제는 remove로 개별 처리 (이미 위에서 delete됨)
    ['금일','익일'].forEach(type => {
      const rows = SCHEDULE['fixed']?.[type];
      if (rows) {
        Object.keys(rows).forEach(id => {
          // 삭제된 행(완납)은 remove
          savePromises.push(remove(ref(db, `schedule2025/fixed/${type}/${id}`)).catch(()=>{}));
        });
      }
    });
    // 초기 7행 생성도 개별 경로로
    ['금일','익일'].forEach(type => {
      if (SCHEDULE['fixed']?.[type]) {
        Object.entries(SCHEDULE['fixed'][type]).forEach(([id, row]) => {
          savePromises.push(update(ref(db, `schedule2025/fixed/${type}/${id}`), row));
        });
      }
    });
    Promise.all(savePromises).catch(e => console.error('schedule save err:', e));
    setTimeout(() => { window._depRendering = false; }, 2000);
  }

  let depLeftHtml = '';
  let schGumilHtml = '';
  let schIkilHtml = '';
  try { depLeftHtml = renderDepLeft(today); } catch(e) { depLeftHtml = '<div style="color:red;padding:12px">renderDepLeft 오류: ' + e.message + '</div>'; }
  try { schGumilHtml = renderSchPanel('fixed','금일'); } catch(e) { schGumilHtml = '<div style="color:red;padding:12px">금일 오류: ' + e.message + '</div>'; }
  try { schIkilHtml = renderSchPanel('fixed','익일'); } catch(e) { schIkilHtml = '<div style="color:red;padding:12px">익일 오류: ' + e.message + '</div>'; }

  document.getElementById('dc').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:16px;font-weight:900;color:var(--text)">💵 입금 파악 · ${today}</span>
      <span style="font-size:11px;color:var(--text3)">09:30 / 15:30 기준</span>
      <button onclick="W._depReset('${today}')" style="padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700;background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;cursor:pointer">🔄 초기화</button>
    </div>
    <div class="dep-layout">
      <div>${depLeftHtml}</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${schGumilHtml}
        ${schIkilHtml}
      </div>
    </div>`;
  } catch(e) {
    window._depRendering = false;
    const dc = document.getElementById('dc');
    if(dc) {
      dc.style.display='';
      dc.innerHTML = '<div style="color:red;padding:20px;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">입금파악 오류: ' + e.message + '<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">' + e.stack + '</pre></div>';
    }
    console.error('showDep error:', e);
  }
}

function renderDepLeft(today) {
  const dep = DEPOSIT[today] || {};
  const teamSum = {};
  TM_CFG.forEach(t => {
    teamSum[t.name] = {완료:0,남은:0,총합:0,금일완료:0,익일예정:0,모레예정:0,출근:0,출근14:0};
    t.members.forEach(m => {
      const d = dep[t.name]?.[m] || {};
      teamSum[t.name].완료  += N(d.완료금액||0);
      teamSum[t.name].남은  += N(d.남은금액||0);
      teamSum[t.name].총합  += N(d.완료금액||0)+N(d.남은금액||0);
      teamSum[t.name].금일완료 += N(d.금일완료||0);
      teamSum[t.name].익일예정 += N(d.익일예정||0);
      teamSum[t.name].모레예정 += N(d.모레예정||0);
      if(d.출근)   teamSum[t.name].출근++;
      if(d.출근14) teamSum[t.name].출근14++;
    });
  });
  const total완 = TM_CFG.reduce((s,t)=>s+teamSum[t.name].완료,0);
  const total남 = TM_CFG.reduce((s,t)=>s+teamSum[t.name].남은,0);
  const total출 = TM_CFG.reduce((s,t)=>s+teamSum[t.name].출근,0);
  const total14 = TM_CFG.reduce((s,t)=>s+teamSum[t.name].출근14,0);

  let h = `<div class="dep-panel" id="dep-panel-left">

      <span>📊 일별 입금 파악</span>
      <span style="font-size:11px;font-weight:400;opacity:.8">완료 <b style="font-family:'Roboto',monospace">${F(total완)}</b> · 남은 <b style="font-family:'Roboto',monospace">${F(total남)}</b> · 출근 ${total출}/${TM}</span>

        <tr>

          <th rowspan="2" style="width:52px">멘토</th>

          <th style="background:#EFF6FF;width:72px">남은금액</th>
          <th style="background:#EFF6FF;width:60px">총합</th>
          <th style="background:#F0FDF4;width:42px">금일</th>
          <th style="background:#F0FDF4;width:42px">익일</th>
          <th style="background:#F0FDF4;width:42px">모레</th>
          <th style="background:#FEFCE8;width:32px">출근</th>
          <th style="background:#FEFCE8;width:32px">14시</th>
        </tr>
      </thead><tbody>`;

  TM_CFG.forEach(t => {
    let first = true;
    t.members.forEach((m) => {
      const d = dep[t.name]?.[m] || {};
      const total = N(d.완료금액||0)+N(d.남은금액||0);
      const mk = `if(!DEPOSIT['${today}'])DEPOSIT['${today}']={};if(!DEPOSIT['${today}']['${t.name}'])DEPOSIT['${today}']['${t.name}']={};if(!DEPOSIT['${today}']['${t.name}']['${m}'])DEPOSIT['${today}']['${t.name}']['${m}']={}`;
      h += `<tr>
        ${first?'<td rowspan="' + t.members.length + '" style="background:' + t.color + '18;color:' + t.color + ';font-weight:900;font-size:11px;text-align:center;border-right:3px solid ' + t.color + ';vertical-align:middle">' + t.name + '</td>':''}
        <td style="font-size:11px;font-weight:600;padding-left:6px;white-space:nowrap">${MR(m)}</td>
        <td style="background:#F8FBFF"><input class="dep-inp dep-focus" style="width:64px" value="${d.완료금액?F(N(d.완료금액)):''}" placeholder="0"
          oninput="${mk};DEPOSIT['${today}']['${t.name}']['${m}'].완료금액=this.value"
          onblur="W._dep('${today}','${t.name}','${m}','완료금액',this.value);this.value=this.value?F(N(this.value)):''"
          onkeydown="W._depTab(event,this)"></td>
        <td style="background:#F8FBFF"><input class="dep-inp dep-focus" style="width:64px" value="${d.남은금액?F(N(d.남은금액)):''}" placeholder="0"
          oninput="${mk};DEPOSIT['${today}']['${t.name}']['${m}'].남은금액=this.value"
          onblur="W._dep('${today}','${t.name}','${m}','남은금액',this.value);this.value=this.value?F(N(this.value)):''"
          onkeydown="W._depTab(event,this)"></td>
        <td data-total="${m}" style="font-family:'Roboto',monospace;font-size:11px;font-weight:700;text-align:right;padding-right:5px;color:${total>0?'var(--accent)':'var(--text3)'};background:#EFF4FF;white-space:nowrap">${total>0?F(total):'0'}</td>
        <td style="background:#F0FDF4"><input class="dep-inp dep-focus" style="width:36px;text-align:center" value="${d.금일완료||''}" placeholder="0"
          oninput="${mk};DEPOSIT['${today}']['${t.name}']['${m}'].금일완료=this.value"
          onblur="W._dep('${today}','${t.name}','${m}','금일완료',this.value)"
          onkeydown="W._depTab(event,this)"></td>
        <td style="background:#F0FDF4"><input class="dep-inp dep-focus" style="width:36px;text-align:center" value="${d.익일예정||''}" placeholder="0"
          oninput="${mk};DEPOSIT['${today}']['${t.name}']['${m}'].익일예정=this.value"
          onblur="W._dep('${today}','${t.name}','${m}','익일예정',this.value)"
          onkeydown="W._depTab(event,this)"></td>
        <td style="background:#F0FDF4"><input class="dep-inp dep-focus" style="width:36px;text-align:center" value="${d.모레예정||''}" placeholder="0"

        <td style="text-align:center;background:#FEFCE8"><input type="checkbox" class="dep-chk" ${d.출근14?'checked':''} onchange="W._dep('${today}','${t.name}','${m}','출근14',this.checked)"></td>
      </tr>`;
      first = false;
    });
    const ts = teamSum[t.name];
    h += `<tr data-sum="${t.name}" style="background:#F1F5F9;border-top:1px solid #CBD5E1;border-bottom:2px solid ${t.color}50">

  h += `<tr data-total-row style="background:#0F172A;color:#fff">

    <td style="text-align:center;font-size:11px;color:#FCD34D;font-weight:700">${total14}/${TM}</td>

  return h;
}

function renderSchPanel(date, type) {
  const rows = Object.entries(SCHEDULE[date]?.[type]||{}).sort(([a],[b])=>a.localeCompare(b));
  const hdrColor = type==='금일' ? '#2563EB' : '#7C3AED';
  const totalAmt = rows.reduce((s,[,r])=>s+N(r.금액||0),0);
  const filledRows = rows.filter(([,r])=>r.멘토||r.이름);
  const wannapRows = rows.filter(([,r])=>r.완납);
  const minapRows  = rows.filter(([,r])=>r.미납);
  const wannapAmt  = wannapRows.reduce((s,[,r])=>s+N(r.금액||0),0);
  const minapAmt   = minapRows.reduce((s,[,r])=>s+N(r.금액||0),0);
  const panelId = 'sch-panel-' + type;

  let h = `<div class="dep-panel" id="${panelId}">
    <div class="dep-panel-hdr" style="background:${hdrColor}">
      <span>${type==='금일'?'📅':'📆'} ${type} 예정건</span>
    </div>
    <div class="sch-summary" style="padding:9px 16px;background:${type==='금일'?'#EFF4FF':'#F5F3FF'};border-bottom:2px solid ${type==='금일'?'#93C5FD':'#C4B5FD'};display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:900;color:${hdrColor};background:${type==='금일'?'#DBEAFE':'#EDE9FE'};padding:3px 10px;border-radius:20px">${filledRows.length}건</span>
      <span style="font-size:22px;font-weight:900;font-family:'Roboto',monospace;color:${hdrColor}">${F(totalAmt)}<span style="font-size:13px">원</span></span>
      ${type==='금일' ? `
      <span style="font-size:11px;color:#666;margin-left:4px">|</span>
      <span style="font-size:12px;font-weight:700;color:#16A34A">✅ 완납 <b style="font-family:'Roboto',monospace;font-size:14px">${F(wannapAmt)}</b>원</span>
      <span style="font-size:12px;font-weight:700;color:#6B7280">⬜ 미납 <b style="font-family:'Roboto',monospace;font-size:14px">${F(minapAmt)}</b>원</span>
      ` : ''}
      <span style="font-size:11px;color:var(--text3);margin-left:auto">전체 ${rows.length}행</span>
    </div>
    <div class="sch-wrap">
    <table class="sch-tbl">
      <thead><tr>
        <th style="width:28px">${type==='익일'?'→금일':'완납'}</th>
        ${type==='금일' ? '<th style="width:28px">미납</th>' : ''}
        <th style="width:72px">멘토</th>
        <th style="width:64px">이름</th>
        <th style="width:60px">시간</th>
        <th style="width:95px">금액</th>
        <th style="width:72px">종류</th>
        <th style="width:88px">결제방법</th>
        <th style="width:58px">확률</th>
        <th>특이사항</th>
        <th style="width:24px"></th>
      </tr></thead><tbody>`;

  rows.forEach(([id, r]) => {
    const sk = `if(!SCHEDULE['${date}'])SCHEDULE['${date}']={};if(!SCHEDULE['${date}']['${type}'])SCHEDULE['${date}']['${type}']={};if(!SCHEDULE['${date}']['${type}']['${id}'])SCHEDULE['${date}']['${type}']['${id}']={}`;
    const typeBadge = r.종류==='추가' ? 'background:#EFF4FF;color:#2563EB' : r.종류==='신규' ? 'background:#F0FDF4;color:#16A34A' : '';
    const isDone = r.완납 === true;
    const isMiNap = r.미납 === true;
    const ds = isDone ? 'text-decoration:line-through;color:var(--text3)' : '';
    const rowBg = isDone ? 'display:none' : isMiNap ? 'background:#F3F4F6' : '';
    h += `<tr style="${rowBg}">
      <td style="text-align:center">
        ${type==='익일'
          ? `<button title="금일로 이동" onclick="W._schMove('${date}','${id}')"
               style="background:#EFF4FF;border:1px solid #BFCFFF;border-radius:5px;cursor:pointer;font-size:14px;padding:2px 5px;color:#2563EB;line-height:1" tabindex="-1">→</button>`
          : `<input type="checkbox" class="dep-chk" ${isDone?'checked':''}
               onchange="W._schDone('${date}','${type}','${id}',this.checked)" title="완납">`
        }
      </td>
      ${type==='금일' ? `<td style="text-align:center">
        <input type="checkbox" class="dep-chk" style="accent-color:#6B7280" ${isMiNap?'checked':''}
          onchange="W._schMiNap('${date}','${id}',this.checked)" title="미납">
      </td>` : ''}
      <td>
        <input class="sch-inp sch-focus" data-panel="${panelId}" style="width:68px;${ds}" value="${r.멘토||''}" placeholder="-"
          oninput="${sk};SCHEDULE['${date}']['${type}']['${id}'].멘토=this.value"
          onblur="W._sch('${date}','${type}','${id}','멘토',this.value)"
          onkeydown="W._schTab(event,this)">
      </td>
      <td><input class="sch-inp sch-focus" data-panel="${panelId}" value="${r.이름||''}" style="${ds}"
        oninput="${sk};SCHEDULE['${date}']['${type}']['${id}'].이름=this.value"
        onblur="W._sch('${date}','${type}','${id}','이름',this.value)"
        onkeydown="W._schTab(event,this)"></td>
      <td><input class="sch-inp sch-focus" data-panel="${panelId}" value="${r.시간||''}" style="min-width:52px;${ds}"
        oninput="${sk};SCHEDULE['${date}']['${type}']['${id}'].시간=this.value"
        onblur="W._sch('${date}','${type}','${id}','시간',this.value)"
        onkeydown="W._schTab(event,this)"></td>
      <td><input class="sch-num sch-focus" data-panel="${panelId}" value="${r.금액?F(N(r.금액)):''}" placeholder="0" style="min-width:82px;${ds}"
        oninput="${sk};SCHEDULE['${date}']['${type}','${id}'].금액=this.value"
        onblur="W._sch('${date}','${type}','${id}','금액',this.value);this.value=this.value?F(N(this.value)):''"
        onkeydown="W._schTab(event,this)"></td>
      <td style="${typeBadge}">
        <select class="sch-sel sch-focus" data-panel="${panelId}" style="${typeBadge};${ds}"
          onchange="W._sch('${date}','${type}','${id}','종류',this.value);W._schRefresh()"
          onkeydown="W._schTab(event,this)">
          <option value="">-</option>
          <option value="추가"${r.종류==='추가'?' selected':''}>추가</option>
          <option value="신규"${r.종류==='신규'?' selected':''}>신규</option>
        </select>
      </td>
      <td>
        <select class="sch-sel sch-focus" data-panel="${panelId}" style="${ds}"
          onchange="W._sch('${date}','${type}','${id}','결제방법',this.value)"
          onkeydown="W._schTab(event,this)">
          <option value="">-</option>
          <option value="카드"${r.결제방법==='카드'?' selected':''}>카드</option>
          <option value="결제선생"${r.결제방법==='결제선생'?' selected':''}>결제선생</option>
          <option value="현금"${r.결제방법==='현금'?' selected':''}>현금</option>
          <option value="계좌이체"${r.결제방법==='계좌이체'?' selected':''}>계좌이체</option>
        </select>
      </td>
      <td><input class="sch-inp sch-focus" data-panel="${panelId}" style="text-align:center;min-width:46px;${ds}" value="${r.확률||''}"
        oninput="${sk};SCHEDULE['${date}']['${type}']['${id}'].확률=this.value"
        onblur="W._sch('${date}','${type}','${id}','확률',this.value)"
        onkeydown="W._schTab(event,this)"></td>
      <td><input class="sch-inp sch-focus" data-panel="${panelId}" value="${r.특이사항||''}" style="${ds}"
        oninput="${sk};SCHEDULE['${date}']['${type}']['${id}'].특이사항=this.value"
        onblur="W._sch('${date}','${type}','${id}','특이사항',this.value)"
        onkeydown="W._schTab(event,this)"></td>
      <td style="text-align:center;white-space:nowrap">
        <button class="dbc" tabindex="-1" onclick="W._schDel('${date}','${type}','${id}')">×</button>
      </td>
    </tr>`;
  });

  const doneCount = rows.filter(([,r])=>r.완납).length;
  h += `</tbody></table></div>
    <button class="sch-done-toggle" data-showing="false"
      onclick="W._toggleDone('${date}','${type}')"
      style="width:100%;padding:6px;font-size:11px;font-weight:700;background:#F8FAFF;border:none;border-top:1px dashed var(--border);cursor:pointer;color:var(--text3);${doneCount===0?'display:none':''}"
    >완납 ${doneCount}건 숨겨짐 ▼ 펼치기</button>
    <button class="sch-add-btn" onclick="W._schAdd('${date}','${type}')">+ 행 추가</button>
  </div>`;
  return h;
}

function showStaff() {
  try {
  document.getElementById('mc').style.display = 'none';
  document.getElementById('bc').style.display = 'none';
  document.getElementById('sc').style.display = '';
  document.getElementById('dc').style.display = 'none';

  const nav = `<div class="staff-nav">
    <button class="staff-tab${staffTab==='업무량'?' on':''}" onclick="W._stab('업무량')">📝 업무량</button>
    <button class="staff-tab${staffTab==='대체휴무'?' on':''}" onclick="W._stab('대체휴무')">🗓 대체휴무</button>
  </div>`;
  let content = '';
  try {
    if (staffTab==='업무량') content = renderWorkload();
    else if (staffTab==='대체휴무') content = `<div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:12px">🗓</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px">대체휴무 기능</div>
      <div style="font-size:13px">준비 중입니다</div>
    </div>`;
  } catch(e2) {
    content = '<div style="color:red;padding:20px;font-weight:700;background:#FEF2F2;border-radius:8px">렌더 오류: ' + e2.message + '<br><pre style="font-size:11px;font-weight:400">' + e2.stack + '</pre></div>';
  }

  document.getElementById('sc').innerHTML = nav + content;
  } catch(e) {
    document.getElementById('sc').style.display='';
    document.getElementById('sc').innerHTML = `<div style="color:red;padding:20px;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">직원관리 오류: ${e.message}<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">${e.stack}</pre></div>`;
    console.error('showStaff error:', e);
  }
}

function renderDeposit() {
  const today = todayStr();
  const dep = DEPOSIT[today] || {};

  const teamSum = {};
  TM_CFG.forEach(t => {
    teamSum[t.name] = {완료금액:0,남은금액:0,총합:0,금일완료:0,익일예정:0,모레예정:0,금일완료f:0,익일예정f:0,출근:0,출근14:0};
    t.members.forEach(m => {
      const d = dep[t.name]?.[m] || {};
      ['완료금액','남은금액','금일완료','익일예정','모레예정','금일완료f','익일예정f'].forEach(k=>{ teamSum[t.name][k]+=N(d[k]||0); });

// ── 업무량 (블로그) ────────────────────────────────────
// 로컬 날짜 문자열 반환 헬퍼 (UTC 버그 방지)
function _localDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// 날짜 문자열 → 해당 주 월요일 문자열 (로컬 기준)
function _toMonday(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay(); // 0=일,1=월,...,6=토
  const offset = day === 0 ? -6 : -(day - 1);
  d.setDate(d.getDate() + offset);
  return _localDateStr(d);
}
// 오늘이 속한 주 월요일
function _getTodayMonday() {
  const nd = new Date();
  const day = nd.getDay();
  const mon = new Date(nd);
  mon.setDate(nd.getDate() - (day === 0 ? 6 : day - 1));
  return _localDateStr(mon);
}
