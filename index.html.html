          <td style="padding:6px 8px;border:1px solid var(--border);border-left:4px solid ${roleType==='경력'?t.color:'var(--border)'};text-align:center;color:var(--text2);font-weight:700;background:var(--bg)">${t.name}</td>
          <td style="padding:6px 8px;border:1px solid var(--border);font-weight:700;color:var(--text);background:var(--bg);white-space:nowrap">${MRT(m)}</td>
          <td style="padding:4px;border:1px solid var(--border);text-align:center;background:var(--bg);white-space:nowrap">
            <select onchange="W._blogRole('${m}',this.value)"
              style="font-size:10px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);width:52px">
              <option value="팀부장" ${roleType==='팀부장'?'selected':''}>팀부장</option>
              <option value="경력" ${roleType==='경력'?'selected':''}>경력</option>
            </select>
          </td>
          ${days.map(d => {
            // urls: 배열 구조 (방향3: 하루 여러 URL)
            // 구형 단일 객체도 호환 처리
            const raw = mData[d.ds];
            const urlList = Array.isArray(raw?.urls) ? raw.urls
                          : (raw?.url ? [{ url: raw.url, firstTime: raw.firstTime||raw.time, time: raw.time }] : []);
            const dayCnt = urlList.filter(u => isValidUrl(u.url)).length;
            const tdBg = dayCnt > 0 ? '#F0FDF4' : '';

            // 각 URL 행 렌더 — URL 있으면 링크, 없으면 input
            const urlRows = urlList.map((entry, idx) => {
              const uv = entry.url || '';
              const valid = isValidUrl(uv);
              const hasEdit = entry.firstTime && entry.time && entry.firstTime !== entry.time;
              let tHtml = '';
              if (entry.firstTime || entry.time) {
                tHtml = `<span style="color:#6B7280">입력 ${fmtTime(entry.firstTime||entry.time)}</span>`;
                if (hasEdit) tHtml += `<span style="color:${valid?'#D97706':'#9CA3AF'}"> · 수정 ${fmtTime(entry.time)}</span>`;
              }
              // URL 있으면 링크 + 수정 아이콘, 없으면 input
              const safeUrl = uv.replace(/"/g, '&quot;');
              const domain = uv.replace(/https?:\/\/(www\.)?/, '').split('/')[0];
              const urlField = valid
                ? `<div style="display:flex;align-items:center;gap:3px">
                    <a href="${safeUrl}" target="_blank" rel="noopener" title="${safeUrl}"
                      style="flex:1;min-width:0;font-size:10px;color:#2563EB;text-decoration:none;
                             white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;
                             padding:3px 6px;border:1px solid #86EFAC;border-radius:4px;background:#F0FDF4;line-height:1.5">
                      🔗 ${domain}
                    </a>
                    <button onclick="W._blogUrlEdit('${wKey}','${m}','${d.ds}',${idx},this)"
                      title="수정"
                      style="flex-shrink:0;width:22px;height:22px;border:1px solid var(--border);border-radius:4px;
                             background:var(--bg);color:var(--text3);cursor:pointer;font-size:11px;padding:0;line-height:1">✏️</button>
                  </div>`
                : `<input type="url" value="${safeUrl}" placeholder="https://..."
                    data-idx="${idx}"
                    style="width:100%;font-size:10px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;background:#fff"
                    onchange="W._blogUrl('${wKey}','${m}','${d.ds}',this.value,this,${idx})"
                    onblur="if(this.value.trim().startsWith('http'))showBlog()">`;
              return `<div style="display:flex;align-items:flex-start;gap:3px;margin-bottom:3px">
                <div style="flex:1;min-width:0">
                  ${urlField}
                  <div data-timedisp="1" style="font-size:9px;margin-top:1px;line-height:1.5">${tHtml}</div>
                </div>
                <button onclick="W._blogUrlDel('${wKey}','${m}','${d.ds}',${idx})"
                  style="flex-shrink:0;width:16px;height:16px;border:none;background:transparent;color:#9CA3AF;cursor:pointer;font-size:11px;line-height:1;padding:0;margin-top:2px"
                  title="삭제">×</button>
              </div>`;
            }).join('');

            return `<td style="padding:4px 6px;border:1px solid var(--border);vertical-align:top;background:${tdBg}">
              ${urlRows}
              <button onclick="W._blogUrlAdd('${wKey}','${m}','${d.ds}')"
                style="width:100%;margin-top:2px;padding:2px;font-size:10px;color:var(--text3);background:transparent;border:1px dashed var(--border);border-radius:4px;cursor:pointer">+ 추가</button>
            </td>`;
          }).join('')}
          <td data-achieve="1" data-req="${reqCount||''}" style="padding:6px;border:1px solid var(--border);text-align:center;font-weight:700;
            color:${achieved?'#16A34A':'#DC2626'}">
            ${reqCount?`${validCount}/${reqCount}<br><span style="font-size:10px">${achieved?'✓ 달성':'✗ 미달'}</span>`:'—'}
          </td>
        </tr>`;
      });

      if (!members.length) {
        h += `<tr><td colspan="${days.length+4}" style="padding:20px;text-align:center;color:var(--text3);border:1px solid var(--border)">
          ${roleType} 직원이 없어요. 구분 변경으로 지정해주세요.
        </td></tr>`;
      }

      h += `</tbody></table></div></div>`;
    });

    h += `<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px 0">
      URL이 http/https로 시작해야 인정됩니다 · 입력 시각 자동 기록
    </div></div>`;

    sc.innerHTML = h;
  } catch(e) {
    sc.innerHTML = `<div style="color:red;padding:20px;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">업무량 오류: ${e.message}<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">${e.stack}</pre></div>`;
    console.error('showBlog error:', e);
  }
}

window.W = {
  _bizMonthKey(startKey) {
    if (!startKey) return;
    window._bizSelMonth = startKey;
    const sch = BIZ_SCHEDULE_ALL.find(s => s.start === startKey);
    if (sch) { BIZ_PERIOD.s = sch.start; BIZ_PERIOD.e = sch.end; }
    const today = todayStr();
    window._bizIsFuture = sch ? sch.start > today : false;

    // 상담내역/미납리스트/추가리스트 탭은 탭 안에서만 전환 (페이지 이탈 없음)
    if (bst === '상담내역' || bst === '미납리스트' || bst === '추가리스트') {
      showBiz();
      return;
    }

    showBiz();
  },
  _bizMonth(idx, monthsJson) {
    const months = JSON.parse(monthsJson.replace(/'/g,'"'));
    window._bizSelMonth = months[idx] || 'current';
    showBiz();
  },
  _bizMonthCur() {
    window._bizSelMonth = 'current';
    window._bizIsFuture = false;
    curMonth = 'current';  // 아카이브 모드에서 복귀
    const today = todayStr();
    const cur = BIZ_SCHEDULE_ALL.find(s => today >= s.start && today <= s.end);
    if (cur) { BIZ_PERIOD.s = cur.start; BIZ_PERIOD.e = cur.end; }
    cw = 99; renderTabs(); showBiz();
  },
  _bizMonthAll() {
    window._bizSelMonth = 'all';
    showBiz();
  },
  _swStaff(tab) {
    cw=200; staffTab=tab;
    document.getElementById('mc').style.display='none';
    document.getElementById('bc').style.display='none';
    document.getElementById('sc').style.display='';
    ['nav-dash','nav-biz','nav-staff'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    document.getElementById('nav-staff')?.classList.add('on');
    document.getElementById('nav-staff-sub')?.style && (document.getElementById('nav-staff-sub').style.display='');
    const sa2 = document.getElementById('nav-staff-arrow');
    if (sa2) sa2.style.transform = 'rotate(180deg)';
    document.getElementById('nav-biz-sub').style.display='none';
    const ba2 = document.getElementById('nav-biz-arrow');
    if (ba2) ba2.style.transform = 'rotate(0deg)';
    document.getElementById('nav-dash-sub').style.display='none';
    document.getElementById('nav-staff-alt')?.classList.remove('on');
    if(tab==='대체휴무') document.getElementById('nav-staff-alt')?.classList.add('on');
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent = tab==='업무량'?'업무량':'대체휴무';
    showStaff();
  },
  _stab(tab) {
    staffTab=tab;
    document.getElementById('nav-staff-alt')?.classList.remove('on');
    if(tab==='대체휴무') document.getElementById('nav-staff-alt')?.classList.add('on');
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent = tab==='업무량'?'업무량':'대체휴무';
    showStaff();
  },
  _dep(date, team, member, field, val) {
    if(!DEPOSIT[date]) DEPOSIT[date]={};
    if(!DEPOSIT[date][team]) DEPOSIT[date][team]={};
    if(!DEPOSIT[date][team][member]) DEPOSIT[date][team][member]={};
    DEPOSIT[date][team][member][field] = val;
    window._depRendering = true;
    set(rDeposit, DEPOSIT);
    setTimeout(() => { window._depRendering = false; }, 2000);

    // 1. 개인 총합 셀 업데이트
    const d = DEPOSIT[date]?.[team]?.[member] || {};
    const memberTotal = N(d.완료금액||0) + N(d.남은금액||0);
    const totalTd = document.querySelector(`[data-total="${member}"]`);
    if (totalTd) {
      totalTd.textContent = F(memberTotal);
      totalTd.style.color = memberTotal > 0 ? 'var(--accent)' : 'var(--text3)';
    }

    // 2. 팀 합계 행 업데이트
    const teamCfg = TM_CFG.find(t => t.name === team);
    if (teamCfg) {
      const teamDep = DEPOSIT[date]?.[team] || {};
      const tWan = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.완료금액||0),0);
      const tNam = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.남은금액||0),0);
      const tTot = tWan + tNam;
      const tGil = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.금일완료||0),0);
      const tIk  = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.익일예정||0),0);
      const tMor = teamCfg.members.reduce((s,m)=>s+N(teamDep[m]?.모레예정||0),0);
      const sumRow = document.querySelector(`[data-sum="${team}"]`);
      if (sumRow) {
        const tds = sumRow.querySelectorAll('td');
        if (tds[2]) { tds[2].textContent = F(tWan); }
        if (tds[3]) { tds[3].textContent = F(tNam); }
        if (tds[4]) { tds[4].textContent = F(tTot); tds[4].style.color = tTot>0?'var(--accent)':'var(--text3)'; }
        if (tds[5]) tds[5].textContent = tGil;
        if (tds[6]) tds[6].textContent = tIk;
        if (tds[7]) tds[7].textContent = tMor;
      }
    }

    // 3. 전체 합계 행 업데이트
    const dep = DEPOSIT[date] || {};
    const allWan = TM_CFG.reduce((s,t)=>s+t.members.reduce((ss,m)=>ss+N(dep[t.name]?.[m]?.완료금액||0),0),0);
    const allNam = TM_CFG.reduce((s,t)=>s+t.members.reduce((ss,m)=>ss+N(dep[t.name]?.[m]?.남은금액||0),0),0);
    const totalRow = document.querySelector('[data-total-row]');
    if (totalRow) {
      const tds = totalRow.querySelectorAll('td');
      if (tds[2]) tds[2].textContent = F(allWan);
      if (tds[3]) tds[3].textContent = F(allNam);
      if (tds[4]) tds[4].textContent = F(allWan+allNam);
    }

    // 4. 헤더 요약 업데이트
    const hdrSummary = document.querySelector('#dep-panel-left .dep-panel-hdr span:last-child');
    if (hdrSummary) {
      const allOut = TM_CFG.reduce((s,t)=>s+t.members.reduce((ss,m)=>ss+N(dep[t.name]?.[m]?.출근||0?1:0),0),0);
      hdrSummary.textContent = `완료 ${F(allWan)} · 남은 ${F(allNam)} · 출근 ${allOut}/${TM}`;
    }
  },
  _depStatus(date, team, member, type, checked) {
    if(!DEPOSIT[date]) DEPOSIT[date]={};
    if(!DEPOSIT[date][team]) DEPOSIT[date][team]={};
    if(!DEPOSIT[date][team][member]) DEPOSIT[date][team][member]={};
    // 완납/미납 상호 배타 처리
    DEPOSIT[date][team][member][type] = checked;
    if(checked) {
      const other = type==='완납' ? '미납' : '완납';
      DEPOSIT[date][team][member][other] = false;
    }
    window._depRendering = true;
    set(rDeposit, DEPOSIT);
    setTimeout(() => { window._depRendering = false; }, 2000);
    // 행 배경 즉시 업데이트
    const d = DEPOSIT[date][team][member];
    const allRows = document.querySelectorAll('#dep-panel-left tbody tr:not([data-sum]):not([data-total-row])');
    allRows.forEach(tr => {
      const nameTd = tr.querySelector('td:nth-child(2)');
      if (nameTd && nameTd.textContent.trim() === member) {
        tr.style.background = d.완납 ? '#FFFDE7' : d.미납 ? '#F3F4F6' : '';
        nameTd.style.textDecoration = d.완납 ? 'line-through' : '';
        nameTd.style.color = d.완납 ? 'var(--text3)' : '';
        // 반대 체크박스 해제
        const checkboxes = tr.querySelectorAll('input[type=checkbox]');
        checkboxes.forEach(cb => {
          if (cb.onchange && cb.onchange.toString().includes("'완납'")) cb.checked = !!d.완납;
          if (cb.onchange && cb.onchange.toString().includes("'미납'")) cb.checked = !!d.미납;
        });
      }
    });
  },
  _depReset(date) {
    if(!confirm(`${date} 일별 입금파악 데이터를 초기화할까요?\n(금일예정건·익일예정건은 유지됩니다)`)) return;
    if(DEPOSIT[date]) delete DEPOSIT[date];
    set(rDeposit, DEPOSIT);
    showDep();
  },
  _wlWeek(key) {
    window._wlWeek = key;
    showStaff();
  },
  _wlSave(week, member, dayKey, val) {
    if(!WORKLOAD[week]) WORKLOAD[week]={};
    if(!WORKLOAD[week][member]) WORKLOAD[week][member]={};
    WORKLOAD[week][member][dayKey] = val;
    set(rWorkload, WORKLOAD);
  },
  _swDep() {
    cw=300;
    document.getElementById('mc').style.display='none';
    document.getElementById('bc').style.display='none';
    document.getElementById('sc').style.display='none';
    document.getElementById('dc').style.display='';
    ['nav-dash','nav-biz','nav-staff','nav-dep'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    document.getElementById('nav-dep')?.classList.add('on');
    document.getElementById('nav-biz-sub').style.display='none';
    document.getElementById('nav-staff-sub')?.style && (document.getElementById('nav-staff-sub').style.display='none');
    const navDashSub = document.getElementById('nav-dash-sub');
    if(navDashSub) navDashSub.style.display='none';
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent='입금 파악';
    showDep();
  },
  _saveFb(key, val) {
    FEEDBACK[key] = val;
    set(rFeedback, FEEDBACK);
    const inp = document.querySelector(`[data-key="${key}"]`);
    if (inp) inp.style.background = val ? '#FFFDE7' : 'transparent';
  },
  _toggleBiz() {
    const sub = document.getElementById('nav-biz-sub');
    const arrow = document.getElementById('nav-biz-arrow');
    const isOpen = sub && sub.style.display !== 'none';
    if (isOpen) {
      sub.style.display = 'none';
      if (arrow) arrow.style.transform = 'rotate(0deg)';
    } else {
      sub.style.display = '';
      if (arrow) arrow.style.transform = 'rotate(180deg)';
      document.getElementById('nav-staff-sub')?.style && (document.getElementById('nav-staff-sub').style.display = 'none');
      const sa = document.getElementById('nav-staff-arrow');
      if (sa) sa.style.transform = 'rotate(0deg)';
      if (cw !== 99) W._swBiz('요약');
    }
  },
  _toggleStaff() {
    const sub = document.getElementById('nav-staff-sub');

  _bm(team,member,field,val) {
    const n=N(val);
    if(!BIZ[team]) BIZ[team]={};
    if(!BIZ[team][member]) BIZ[team][member]={sales:0,inquiry:0,totalSales:0,refund:0};
    BIZ[team][member][field]=n;
    // 순매출 자동 표시
    const bd=BIZ[team][member];
    const net=(bd.totalSales||0)-(bd.refund||0);
    const netEl=document.getElementById("biz-net-"+team+"-"+member);
    if(netEl) netEl.textContent=F(net);
    // 팀 합계 업데이트
    const teamCfg = TM_CFG.find(t=>t.name===team);
    if(teamCfg){
      const tTM = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.totalSales||0),0);
      const tRef = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.refund||0),0);
      const tGoalSum = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.goal||0),0);
      const tmEl = document.getElementById("biz-tm-"+team);
      const refEl = document.getElementById("biz-ref-"+team);
      const netEl2 = document.getElementById("biz-net-"+team+"-team");
      const goalEl = document.getElementById("biz-goal-"+team);
      if(tmEl) tmEl.textContent = F(tTM);
      if(refEl) refEl.textContent = F(tRef);
      if(netEl2) netEl2.textContent = F(tTM-tRef);
      if(goalEl) goalEl.textContent = F(tGoalSum);
    }
    // TM_CFG에 없는 팀 데이터도 보존하며 저장
    set(rBiz, BIZ); updBizKPI();
  },

    if(!CONSULT[date]||!CONSULT[date][rid]) return;
    CONSULT[date][rid][field] = val;
    set(rConsult, CONSULT);
    updBizKPI();
    // 결과 변경 시 배지 색상 즉시 반영
    if (field === 'result') {
      const sel = document.querySelector(`[onchange*="_cu('${date}','${rid}','result'"]`);
      if (sel) {
        const style =
          val==='완납' ? 'background:#FEF08A;color:#854D0E' :
          val==='미납' ? 'background:#FEE2E2;color:#DC2626' :
          val==='취소' ? 'background:#E5E7EB;color:#6B7280' :
          val==='COD'  ? 'background:#EFF4FF;color:#2563EB' :
          val==='추가' ? 'background:#F0FDF4;color:#16A34A' :
          val==='미등록회수' ? 'background:#F5F3FF;color:#7C3AED' :
          'background:#F1F5F9;color:#64748B';
        sel.style.cssText += ';' + style;
        // 행 배경도 즉시 변경
        const tr = sel.closest('tr');
        if (tr) {
          tr.style.background =
            val==='완납' ? '#FFFDE7' :
            val==='미납' ? '#FEF2F2' :
            val==='취소' ? '#E5E7EB' :
            val==='COD'  ? '#EFF4FF' : '';
        }
      }
    }
  },
  _ca(date) {
    if(!CONSULT[date]) CONSULT[date]={};
    const id=Math.random().toString(36).slice(2,10);
    CONSULT[date][id]={mentor:'',student:'',subject:'',status:'상담',result:'',paid:'',expected:'',note:''};
    set(rConsult,CONSULT); showBiz();
  },
  _cad() {
    const date=document.getElementById('cdi')?.value; if(!date) return;
    if(!CONSULT[date]) CONSULT[date]={};
    const id=Math.random().toString(36).slice(2,10);
    CONSULT[date][id]={mentor:'',student:'',subject:'',status:'상담',result:'',paid:'',expected:'',note:''};
    cCol[date]=false; set(rConsult,CONSULT); showBiz();
  },
  _cd(date,rid) {
    // 이미 확인 단계 진행 중이면 무시
    if(window._cdPending === date+'_'+rid) return;
    window._cdPending = date+'_'+rid;
    // 해당 행의 삭제 버튼을 인라인 확인 UI로 교체
    const btn = document.querySelector(`button.dbc[onclick="W._cd('${date}','${rid}')"]`);
    if(btn) {
      btn.style.display = 'none';
      const conf = document.createElement('span');
      conf.id = 'cd-conf-'+rid;
      conf.innerHTML = `<button onclick="W._cdConfirm('${date}','${rid}')" style="font-size:10px;padding:2px 6px;border-radius:4px;background:#DC2626;color:#fff;border:none;cursor:pointer;font-weight:700">삭제</button>`+
        `<button onclick="W._cdCancel('${date}','${rid}')" style="font-size:10px;padding:2px 5px;border-radius:4px;background:var(--bg);border:1px solid var(--border);cursor:pointer;margin-left:2px">취소</button>`;
      btn.parentNode.appendChild(conf);
    }
  },
  _cdConfirm(date,rid) {
    window._cdPending = null;
    // 해당 tr만 즉시 제거 (재렌더링 없음)
    const btn = document.querySelector(`button.dbc[onclick="W._cd('${date}','${rid}')"]`);
    if(btn) btn.closest('tr')?.remove();
    // 날짜 그룹 — 남은 삭제 버튼이 없으면(해당 날짜 행 전부 삭제) 헤더/테이블/추가버튼도 제거
    const remaining = document.querySelectorAll(`button.dbc[onclick^="W._cd('${date}',"]`);
    if(!remaining.length) {
      const ctbl = document.getElementById('ctbl-'+date);
      if(ctbl) {
        const dhdr = ctbl.previousElementSibling;
        if(dhdr && dhdr.classList.contains('dhdr')) dhdr.remove();
        ctbl.remove();
      }
      const arb = document.getElementById('arb-'+date);
      if(arb) arb.remove();
    }
    // Firebase 반영
    delete CONSULT[date][rid];
    if(CONSULT[date] && !Object.keys(CONSULT[date]).length) delete CONSULT[date];
    set(rConsult, CONSULT);
    // 다음 프레임에 KPI 헤더(합계)만 조용히 업데이트
    requestAnimationFrame(() => {
      const searchKw = document.getElementById('consult-search')?.value || '';
      const bc = document.getElementById('bc');
      if(bc && bst === '상담내역') {
        const newNav = `<div class="bsn">
          <button class="bst" onclick="W._bst('요약')">영업 데이터</button>
          <button class="bst on" onclick="W._bst('상담내역')">상담 내역</button>
          <button class="bst" onclick="W._bst('미납리스트')">미납 리스트</button>
          <button class="bst" onclick="W._bst('추가리스트')">추가 리스트</button>
        </div>`;
        bc.innerHTML = newNav + makeBizMonthNav() + renderConsult(searchKw);
        const inp = document.getElementById('consult-search');
        if(inp && searchKw) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
      }
    });
  },
  _cdCancel(date,rid) {
    window._cdPending = null;
    const conf = document.getElementById('cd-conf-'+rid);
    if(conf) conf.remove();
    const btn = document.querySelector(`button.dbc[onclick="W._cd('${date}','${rid}')"]`);
    if(btn) btn.style.display = '';
  },
  _csearch(kw) {
    const el = document.getElementById('bc');
    if(!el) return;
    const nav = document.querySelector('.bsn')?.outerHTML || '';
    // 검색창 현재 값 저장
    const curInp = document.getElementById('consult-search');
    const curVal = curInp ? curInp.value : kw;
    el.innerHTML = nav + renderConsult(curVal);
    // 검색창 포커스 & 커서 끝으로
    const inp = document.getElementById('consult-search');
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  },
  _csearchDebounce(val) {
    clearTimeout(window._csTimer);
    window._csTimer = setTimeout(() => W._csearch(val), 300);
  },
  _noticeEdit() {
    NOTICE.editing = !NOTICE.editing;
    const disp = document.getElementById('notice-content-display');
    const inp = document.getElementById('notice-input');
    const btn = document.getElementById('notice-edit-btn');
    if (NOTICE.editing) {
      if(disp) disp.style.display='none';
      if(inp) { inp.style.display=''; inp.focus(); }
      if(btn) btn.textContent='✅ 저장';
    } else {
      const txt = document.getElementById('notice-input')?.value || '';
      NOTICE.text = txt;
      set(rNotice, {text: txt});
      if(disp) { disp.textContent = txt||'(공지사항이 없습니다)'; disp.style.display=''; }
      if(inp) inp.style.display='none';
      if(btn) btn.textContent='✏ 수정';
    }
  },
  _noticeInput(val) { NOTICE.text = val; },
  _alAdd() {
    const id = Math.random().toString(36).slice(2,10);

    if(cw===99 && bst==='추가리스트') showBiz();

  _alAddTeam(teamName) {

    ADDLIST[id] = {team:teamName,mentor:'',student:'',age:'',subject:'',remaining:'',interviewDate:'',availableDate:'',expectedAmount:'',status:'진행중',note:''};
    set(rAddList, ADDLIST);
    if(cw===99 && bst==='추가리스트') showBiz();
  },
  _alDel(id) {
    if(window._alDelPending === id) return;
    window._alDelPending = id;
    const btn = document.querySelector(`button.dbc[onclick="W._alDel('${id}')"]`);
    if(btn) {
      btn.style.display = 'none';
      const conf = document.createElement('span');
      conf.id = 'aldel-conf-'+id;
      conf.innerHTML = `<button onclick="W._alDelConfirm('${id}')" style="font-size:10px;padding:2px 6px;border-radius:4px;background:#DC2626;color:#fff;border:none;cursor:pointer;font-weight:700">삭제</button>`+
        `<button onclick="W._alDelCancel('${id}')" style="font-size:10px;padding:2px 5px;border-radius:4px;background:var(--bg);border:1px solid var(--border);cursor:pointer;margin-left:2px">취소</button>`;
      btn.parentNode.appendChild(conf);
    }
  },
  _alDelConfirm(id) {
    window._alDelPending = null;
    // 해당 tr만 즉시 제거
    const btn = document.querySelector(`button.dbc[onclick="W._alDel('${id}')"]`);
    if(btn) btn.closest('tr')?.remove();
    delete ADDLIST[id];
    set(rAddList, ADDLIST);
    // 다음 프레임에 멘토 그룹 헤더/합계 조용히 갱신
    requestAnimationFrame(() => {
      if(cw===99 && bst==='추가리스트') showBiz();
    });
  },
  _alDelCancel(id) {
    window._alDelPending = null;
    const conf = document.getElementById('aldel-conf-'+id);
    if(conf) conf.remove();
    const btn = document.querySelector(`button.dbc[onclick="W._alDel('${id}')"]`);
    if(btn) btn.style.display = '';
  },
  _alUpdate(id, field, val) {
    if(!ADDLIST[id]) return;
    ADDLIST[id][field] = val;
    // 멘토 선택 시 팀 자동 세팅 (재렌더 없이 저장만)
    if(field==='mentor' && val) {
      const t = getTeam(val);
      if(t) ADDLIST[id].team = t.name;
      set(rAddList, ADDLIST);
      return;
    }
    set(rAddList, ADDLIST);
    // 상태 변경 시 재렌더 (멘토 그룹 재배치)
    if(field==='status' && cw===99 && bst==='추가리스트') {
      window._alEditing = false;
      showBiz();
    }
  },
  _cp() {
    navigator.clipboard.writeText(document.getElementById('mbox').textContent).then(()=>{
      const b=document.getElementById('cpbtn'); b.textContent='✅ 복사됨!'; b.classList.add('done');
      setTimeout(()=>{b.textContent='📋 복사';b.classList.remove('done');},2000);
    });
  },
};

// ── 리뷰작성현황 ───────────────────────────────────────
window.showRvStat = function showRvStat() {
  ['mc','bc','sc','dc'].forEach(function(id){var e=document.getElementById(id);if(e)e.style.display='none';});
  var sc = document.getElementById('sc');
  sc.style.display = '';
  ['nav-dash','nav-biz','nav-staff','nav-dep','nav-blog','nav-class','nav-links','nav-rvstat','nav-manual','nav-branch'].forEach(function(id){document.getElementById(id)?.classList.remove('on');});
  document.getElementById('nav-rvstat')?.classList.add('on');

  var WEEK_LABELS = ['1주차','2주차','3주차','4주차'];
  if (!window._rvMonth) {
    var _now = new Date();
    window._rvMonth = _now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0');
  }
  var mKey = window._rvMonth;
  var parts = mKey.split('-');
  var yr = Number(parts[0]), mo = Number(parts[1]);
  var prevM = mo === 1 ? (yr-1)+'-12' : yr+'-'+String(mo-1).padStart(2,'0');
  var nextM = mo === 12 ? (yr+1)+'-01' : yr+'-'+String(mo+1).padStart(2,'0');
  var curM  = todayStr().slice(0,7);

  var firstDay = new Date(yr, mo-1, 1);
  var lastDay  = new Date(yr, mo, 0);
  var fmt2 = function(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
  var period = fmt2(firstDay)+' ~ '+fmt2(lastDay);

  var h = '';
  h += '<div style="display:flex;gap:0;height:calc(100vh - 48px);overflow:hidden">';
  h += '<div style="flex:1;min-width:0;overflow-y:auto;padding:16px 12px 16px 16px">';

  if (mode==='new-class') {
    const newId = 'cls_'+Date.now();
    await set(ref(db,`classmgmt2025/${newId}`), {
      name:g('name'),startDate:g('startDate'),days:g('days'),time:g('time'),
      fee:g('fee'),capacity:g('capacity')||14,note:g('note'),createdAt:Date.now(),students:{}
    });
  } else if (mode==='edit-class') {
    await update(ref(db,`classmgmt2025/${cid}`), {
      name:g('name'),startDate:g('startDate'),days:g('days'),time:g('time'),
      fee:g('fee'),capacity:g('capacity')||14,note:g('note')
    });
  } else if (mode==='new-stu') {
    const newId='stu_'+Date.now();

      name:g('name'),phone:g('phone'),age:g('age'),mentor:g('mentor'),note:g('note')

window._manualOpen = {}; // { partIdx_chapIdx: true/false }

function renderManual() {
  const sc = document.getElementById('sc');
  if (!sc) return;

  // 검색 필터
  const searchKw = window._manualSearch || '';

  // 목차 HTML
  let tocHtml = '';
  MANUAL_DATA.forEach((part, pi) => {
    const isOpen = window._manualOpen['p'+pi] !== false;
    const chapItems = part.chapters.filter(c =>
      !searchKw || c.title.includes(searchKw) || c.content.replace(/<[^>]+>/g,'').includes(searchKw)
    );
    if (searchKw && chapItems.length === 0) return;
    const bgMap = ['#EBF3FF','#F2EEFF','#E6F4EF'];
    const partBg = bgMap[pi] || '#F5F5F5';
    const shortLabel = 'P'+(pi+1);
    tocHtml += `<div style="border-bottom:0.5px solid var(--border)">
      <div onclick="W._manualTogglePart(${pi})" style="background:${partBg};padding:8px 12px 8px 12px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="background:${part.color};color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;flex-shrink:0">${shortLabel}</span>
          <span style="font-size:10.5px;font-weight:700;color:${part.color};line-height:1.3">${part.part.replace(/^PART \d+ · /,'')}</span>
        </div>
        <i class="ti ti-chevron-${isOpen?'down':'right'}" style="font-size:12px;color:${part.color};opacity:.7;flex-shrink:0" aria-hidden="true"></i>
      </div>`;
    if (isOpen || searchKw) {
      chapItems.forEach((chap, ci) => {
        const realCi = part.chapters.indexOf(chap);
        const key = pi+'_'+realCi;
        const isActive = window._manualSelected === key;
        tocHtml += `<div onclick="W._manualSelect('${key}')" style="padding:7px 12px 7px 24px;font-size:12px;cursor:pointer;color:${isActive?part.color:'var(--text2)'};background:${isActive?partBg:'transparent'};border-left:2px solid ${isActive?part.color:'transparent'};font-weight:${isActive?'600':'400'};transition:background .1s">${chap.title}</div>`;
      });
    }
    tocHtml += '</div>';
  });

  // 콘텐츠 HTML
  let contentHtml = '';
  if (window._manualSelected) {
    const [pi, ci] = window._manualSelected.split('_').map(Number);
    const part = MANUAL_DATA[pi];
    const chap = part && part.chapters[ci];
    if (chap) {
      contentHtml = `<div style="max-width:720px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;padding-bottom:16px;border-bottom:0.5px solid var(--border)">
          <span style="font-size:11px;font-weight:700;color:${part.color};background:${part.color}18;padding:3px 10px;border-radius:20px">${part.part}</span>
        </div>
        <div class="m-content">${chap.content}</div>
      </div>`;
    }
  } else {
    contentHtml = `<div style="text-align:center;padding:80px 20px;color:var(--text3)">
      <i class="ti ti-book-2" style="font-size:48px;display:block;margin-bottom:16px;opacity:.25" aria-hidden="true"></i>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text2)">멘토 매뉴얼</div>
      <div style="font-size:13px">왼쪽 목차에서 항목을 선택하세요</div>
    </div>`;
  }

  sc.innerHTML = `
    <style>
    .m-manual-wrap { display:flex;height:calc(100vh - 110px);overflow:hidden; }
    .m-sidebar { width:230px;flex-shrink:0;border-right:0.5px solid var(--border);overflow-y:auto;background:var(--bg2); }

    .m-sidebar-search input:focus { border-color:#378ADD; }
    .m-body { flex:1;overflow-y:auto;padding:28px 32px;background:var(--bg); }
    .m-content h3 { font-size:20px;font-weight:700;margin:0 0 16px;color:var(--text); }
    .m-content h4 { font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text); }
    .m-content p { font-size:13px;line-height:1.9;margin:0 0 10px;color:var(--text2); }
    .m-box { border-radius:0 8px 8px 0;padding:12px 14px;margin:10px 0;font-size:12.5px;line-height:1.8; }

    .m-green { background:#EAF3DE;border-left:3px solid #3B6D11;color:#27500A; }
    .m-code { background:var(--bg2);border-radius:8px;padding:12px 14px;margin:10px 0;font-size:12px;line-height:1.9;white-space:pre-wrap;font-family:monospace;color:var(--text2); }

    .m-table td { padding:8px 10px;border:0.5px solid var(--border);vertical-align:top;color:var(--text2); }
    .m-table tr:nth-child(even) td { background:var(--bg2); }
    </style>
    <div class="m-manual-wrap">
      <div class="m-sidebar">
        <div class="m-sidebar-search">
          <input type="text" placeholder="매뉴얼 내 검색..." value="${searchKw}"
            oninput="window._manualSearch=this.value;renderManual()" />
        </div>
        ${tocHtml}
      </div>
      <div class="m-body">${contentHtml}</div>
    </div>`;
}

W._manualTogglePart = (pi) => {
  const key = 'p'+pi;
  window._manualOpen[key] = window._manualOpen[key] === false ? true : false;
  renderManual();
};

W._manualSelect = (key) => {
  window._manualSelected = key;
  const [pi] = key.split('_').map(Number);
  window._manualOpen['p'+pi] = true;
  renderManual();
};

W._branchRequestEdit = function() {

  }
  const pw = prompt('수정 권한 비밀번호를 입력하세요 (팀장/부장 전용)');
  if (pw === null) return;

function buildTuitionPage() {
  const em = window._branchEditMode;

  const catF = window._tuitionCat||'';

  const WD = window._tuitionWD;
  const WE = window._tuitionWE;

  const CATS = ['아트웍(원화)','그래픽','원화','프로그래밍','기획','팀 프로젝트','웹툰','웹소설','아트웍','게임기획','게임그래픽','게임QA','이펙트','이모티콘','스파인'];
  const ALL_CATS = [...new Set([...WD.map(r=>r.cat),...WE.map(r=>r.cat)])];

  function buildTable(rows, type) {
    const filtered = rows.filter(r =>
      (!catF || r.cat===catF) &&
      (!kw || r.name.toLowerCase().includes(kw) || r.cat.toLowerCase().includes(kw))
    );
    let html = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr style="background:var(--bg2)">' +
      '<th style="padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:11px;width:90px;white-space:nowrap">학과</th>' +
      '<th style="padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:11px">과정명</th>' +
      '<th style="padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:11px;text-align:right;width:76px;white-space:nowrap">수강료</th>' +
      '<th style="padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:11px;text-align:center;width:34px;white-space:nowrap">시간</th>' +
      '<th style="padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:11px;text-align:center;width:34px;white-space:nowrap">일수</th>' +
      '<th style="padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:11px;text-align:center;width:44px;white-space:nowrap">총시간</th>' +
      (em ? '<th style="width:20px;border-bottom:1px solid var(--border)"></th>' : '') +
      '</tr></thead><tbody>';

    if (!filtered.length) {
      html += '<tr><td colspan="7" style="padding:20px;text-align:center;color:var(--text3);font-size:12px">검색 결과 없음</td></tr>';
      html += '</tbody></table>';
      return html;
    }
    let lastCat = '';
    filtered.forEach(r => {
      const idx = rows.indexOf(r);
      if (r.cat !== lastCat && !em) {
        lastCat = r.cat;
        const CC2 = {'아트웍(원화)':['#FFF7ED','#C2410C'],'그래픽':['#EFF6FF','#1D4ED8'],'원화':['#F0FDF4','#166534'],'프로그래밍':['#FDF4FF','#6B21A8'],'기획':['#FFFBEB','#92400E'],'팀 프로젝트':['#F0F9FF','#0369A1'],'웹툰':['#FFF1F2','#9F1239'],'웹소설':['#F0FDFA','#134E4A'],'아트웍':['#FEF9EE','#B45309'],'게임기획':['#FFFBEB','#92400E'],'게임그래픽':['#EFF6FF','#1D4ED8'],'게임QA':['#F5F3FF','#4C1D95'],'이펙트':['#FFF1F2','#BE185D'],'이모티콘':['#FDF4FF','#6B21A8'],'스파인':['#F0FDFA','#065F46']};
        const [_bg,_fc] = CC2[r.cat] || ['#F9FAFB','#374151'];
        html += '<tr><td colspan="6" style="padding:5px 10px;font-size:11px;font-weight:700;color:'+_fc+';background:'+_bg+';border-bottom:1px solid rgba(0,0,0,0.07);border-left:4px solid '+_fc+'">'+r.cat+'</td></tr>';
      }
      const priceStr = r.price ? Number(r.price).toLocaleString()+'원' : '';
      if (em) {
        const catOpts = CATS.map(c=>'<option value="'+c+'"'+(c===r.cat?' selected':'')+'>'+c+'</option>').join('');
        html += '<tr style="border-bottom:1px solid var(--border)">' +
          '<td style="padding:3px 5px"><select style="font-size:11px;width:100%;border:1px solid var(--border);border-radius:4px;padding:2px" onchange="W._tuitionEdit(\'' + type + '\',' + idx + ',\'cat\',this.value)">' + catOpts + '</select></td>' +
          '<td style="padding:3px 5px"><input value="' + r.name.replace(/"/g,'&quot;') + '" style="font-size:11px;width:100%;border:1px solid var(--border);border-radius:4px;padding:2px 4px" onblur="W._tuitionEdit(\'' + type + '\',' + idx + ',\'name\',this.value)"></td>' +
          '<td style="padding:3px 5px"><input value="' + (r.price||'') + '" placeholder="" style="font-size:11px;width:100%;border:1px solid var(--border);border-radius:4px;padding:2px 4px;text-align:right" onblur="W._tuitionEdit(\'' + type + '\',' + idx + ',\'price\',this.value)"></td>' +
          '<td style="padding:3px 5px"><input value="' + r.h + '" style="font-size:11px;width:100%;border:1px solid var(--border);border-radius:4px;padding:2px;text-align:center" onblur="W._tuitionEdit(\'' + type + '\',' + idx + ',\'h\',this.value)"></td>' +
          '<td style="padding:3px 5px"><input value="' + r.d + '" style="font-size:11px;width:100%;border:1px solid var(--border);border-radius:4px;padding:2px;text-align:center" onblur="W._tuitionEdit(\'' + type + '\',' + idx + ',\'d\',this.value)"></td>' +
          '<td style="padding:3px 5px"><input value="' + r.th + '" style="font-size:11px;width:100%;border:1px solid var(--border);border-radius:4px;padding:2px;text-align:center" onblur="W._tuitionEdit(\'' + type + '\',' + idx + ',\'th\',this.value)"></td>' +
          '<td style="padding:3px;text-align:center"><button onclick="W._tuitionDel(\'' + type + '\',' + idx + ')" style="border:none;background:transparent;color:#CBD5E1;cursor:pointer;font-size:14px" onmouseover="this.style.color=\'#EF4444\'" onmouseout="this.style.color=\'#CBD5E1\'">×</button></td>' +
          '</tr>';
      } else {
        html += '<tr style="border-bottom:1px solid var(--border)" onmouseover="this.style.background=\'var(--bg2)\'" onmouseout="this.style.background=\'\'">' +
          '<td style="padding:6px 8px;font-size:12px;color:var(--text2);white-space:nowrap">' + r.cat + '</td>' +
          '<td style="padding:6px 8px;font-size:12px;color:var(--text)">' + r.name + '</td>' +
          '<td style="padding:6px 8px;text-align:right;font-size:12px;font-weight:600;color:var(--text)">' + priceStr + '</td>' +
          '<td style="padding:6px 8px;text-align:center;font-size:12px;color:var(--text3);white-space:nowrap">' + r.h + '</td>' +
          '<td style="padding:6px 8px;text-align:center;font-size:12px;color:var(--text3);white-space:nowrap">' + r.d + '</td>' +

    return html;

    '</div>';
}

  cw = 170; curMonth = 'current';
  // 모든 패널 명시적으로 숨기고 sc만 표시
  ['mc','bc','dc'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const sc=document.getElementById('sc'); if(sc)sc.style.display='';
  // 서브메뉴 닫기
  ['nav-staff-sub','nav-biz-sub','nav-dash-sub'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  ['nav-dash','nav-biz','nav-staff','nav-dep','nav-blog','nav-class','nav-links','nav-rvstat','nav-manual','nav-branch'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
  document.getElementById('nav-rvstat')?.classList.add('on');
  renderTabs();
  showRvStat();
};
// ── 리뷰 데이터 핸들러 ─────────────────────────────────
W._rvText = (mKey, team, member, wk, val) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey][team]) RVSTAT[mKey][team] = {};
  if (!RVSTAT[mKey][team][member]) RVSTAT[mKey][team][member] = {};
  const trimmed = val.trim();
  if (RVSTAT[mKey][team][member][wk] === trimmed) return;
  RVSTAT[mKey][team][member][wk] = trimmed;
  set(rRvStat, RVSTAT);
};
W._rvTotal = (mKey, team, member, val) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey][team]) RVSTAT[mKey][team] = {};
  if (!RVSTAT[mKey][team][member]) RVSTAT[mKey][team][member] = {};
  if (RVSTAT[mKey][team][member].__total === val.trim()) return;
  RVSTAT[mKey][team][member].__total = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvExRow = (wk, val) => {
  if (!RVSTAT['__exrow']) RVSTAT['__exrow'] = {rows:{}, total:''};
  if (!RVSTAT['__exrow'].rows) RVSTAT['__exrow'].rows = {};
  if (RVSTAT['__exrow'].rows[wk] === val.trim()) return;
  RVSTAT['__exrow'].rows[wk] = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvExTotal = (val) => {
  if (!RVSTAT['__exrow']) RVSTAT['__exrow'] = {rows:{}, total:''};
  if (RVSTAT['__exrow'].total === val.trim()) return;
  RVSTAT['__exrow'].total = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvNotice = (mKey, val) => {
  if (RVSTAT.__notice === val) return;
  RVSTAT.__notice = val;
  set(rRvStat, RVSTAT);
};
W._rvExampleText = (mKey, val) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey].__example) RVSTAT[mKey].__example = {text:'',imgs:[]};
  if (RVSTAT[mKey].__example.text === val.trim()) return;
  RVSTAT[mKey].__example.text = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvExampleImg = (mKey, ii, val) => {
  if (!RVSTAT[mKey]?.__example) return;
  if (RVSTAT[mKey].__example.imgs[ii] === val.trim()) return;
  RVSTAT[mKey].__example.imgs[ii] = val.trim();
  set(rRvStat, RVSTAT).then(() => showRvStat());
};
W._rvExampleImgAdd = (mKey) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey].__example) RVSTAT[mKey].__example = {text:'',imgs:[]};
  RVSTAT[mKey].__example.imgs.push('');
  set(rRvStat, RVSTAT).then(() => showRvStat());
};
W._rvExampleImgDel = (mKey, ii) => {
  if (!RVSTAT[mKey]?.__example?.imgs) return;
  RVSTAT[mKey].__example.imgs.splice(ii, 1);
  set(rRvStat, RVSTAT).then(() => showRvStat());
};
W._linkAdd = () => {
  const nameEl = document.getElementById('lnk-name');
  const urlEl  = document.getElementById('lnk-url');
  const name = nameEl?.value.trim();
  const url  = urlEl?.value.trim();
  if (!name || !url) { alert('링크명과 URL을 모두 입력해주세요.'); return; }
  if (!url.startsWith('http')) { alert('URL은 http:// 또는 https://로 시작해야 합니다.'); return; }
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  arr.push({ name, url });
  LINKS = arr;
  set(rLinks, LINKS).then(() => showLinks());
};
W._linkEdit = (idx, field, val) => {
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  if (!arr[idx]) return;
  const trimmed = val.trim();
  if (arr[idx][field] === trimmed) return; // 변경 없으면 저장 안 함
  arr[idx] = { ...arr[idx], [field]: trimmed };
  LINKS = arr;
  set(rLinks, LINKS);
};
W._linkDel = (idx) => {
  if (!confirm('이 링크를 삭제할까요?')) return;
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  arr.splice(idx, 1);
  LINKS = arr;
  set(rLinks, LINKS).then(() => showLinks());
};

// ── 드래그 앤 드롭 순서 변경 ──────────────────────────
let _linkDragFrom = null;
W._linkDragStart = (e, idx) => {
  _linkDragFrom = idx;
  e.dataTransfer.effectAllowed = 'move';
  const tr = e.currentTarget.closest('tr');
  if (tr) { tr.classList.add('dragging'); tr.style.opacity = '0.4'; }
};
W._linkDragOver = (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const tr = e.currentTarget.closest('tr');
  if (tr) tr.style.background = '#EFF6FF';
};
W._linkDrop = (e, toIdx) => {
  e.preventDefault();
  if (_linkDragFrom === null || _linkDragFrom === toIdx) return;
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  const [moved] = arr.splice(_linkDragFrom, 1);
  arr.splice(toIdx, 0, moved);
  LINKS = arr;
  set(rLinks, LINKS).then(() => showLinks());
  _linkDragFrom = null;
};
W._linkDragEnd = (e) => {
  _linkDragFrom = null;
  // 모든 행 스타일 초기화
  document.querySelectorAll('#lnk-tbody tr').forEach(tr => {
    tr.classList.remove('dragging');
    tr.style.opacity = '';
    tr.style.background = '';
  });
};
W._blogUrl = (wKey, member, dateStr, url, inputEl, idx=0) => {
  if (!BLOG[wKey]) BLOG[wKey] = {};
  if (!BLOG[wKey][member]) BLOG[wKey][member] = {};
  const now = new Date().toISOString();
  const dayData = BLOG[wKey][member][dateStr] || {};

  // urls 배열 확보 (구형 단일 객체 호환)
  let urls = Array.isArray(dayData.urls) ? [...dayData.urls]
           : (dayData.url ? [{ url: dayData.url, firstTime: dayData.firstTime||dayData.time, time: dayData.time }]
           : []);

  // 해당 idx 엔트리 업데이트 — prev를 먼저 복사해두고 isEdit 판단
  const prevEntry = urls[idx] ? { ...urls[idx] } : { url: '', firstTime: '', time: '' };
  if (!urls[idx]) urls[idx] = { url: '', firstTime: '', time: '' };
  const trimmed = url.trim();
  // 수정 여부: 이전에 저장된 url이 있고, 지금 입력값과 다를 때
  const isEdit = !!(prevEntry.url && prevEntry.url !== trimmed);

  // firstTime: 최초 저장 시각 — 한 번 기록되면 이후 덮어쓰지 않음
  const firstTime = trimmed ? (prevEntry.firstTime || now) : '';
  // time: 이번 저장 시각 (매번 갱신)
  const time = trimmed ? now : '';

  urls[idx] = { url: trimmed, firstTime, time };
  BLOG[wKey][member][dateStr] = { urls };
  set(rBlog, BLOG);

  // DOM 업데이트 (재렌더 없이)
  if (inputEl) {
    const valid = trimmed.startsWith('http');
    const fmt = t => { const dt=new Date(t); return (dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0'); };

    inputEl.style.borderColor = valid ? '#86EFAC' : 'var(--border)';
    inputEl.style.background = valid ? '#F0FDF4' : '#fff';

    // 시간 표시 업데이트
    const wrap = inputEl.parentElement;
    const timeDiv = wrap.querySelector('div[data-timedisp]');
    if (timeDiv) {
      if (time) {
        // isEdit: 실제 기존 값이 있고 바뀐 경우만 수정으로 표시
        const hasEdit = isEdit;
        let html = `<span style="color:#6B7280">입력 ${fmt(firstTime||time)}</span>`;
        if (hasEdit) html += `<span style="color:${valid?'#D97706':'#9CA3AF'}"> · 수정 ${fmt(time)}</span>`;
        timeDiv.innerHTML = html;
      } else { timeDiv.innerHTML = ''; }
    }

    // td 배경
    const td = inputEl.closest('td');
    if (td) {
      const allUrls = (BLOG[wKey]?.[member]?.[dateStr]?.urls || []);
      const tdValid = allUrls.some(u => u.url && u.url.startsWith('http'));
      td.style.background = tdValid ? '#F0FDF4' : '';
    }

    // 달성 셀 업데이트 — 방향3: 전체 유효 URL 총합
    const row = inputEl.closest('tr');
    if (row) {
      const achieveTd = row.querySelector('td[data-achieve]');
      if (achieveTd) {
        const mData = BLOG[wKey]?.[member] || {};
        let validCnt = 0;
        Object.values(mData).forEach(dv => {
          if (Array.isArray(dv.urls)) validCnt += dv.urls.filter(u=>u.url&&u.url.startsWith('http')).length;
          else if (dv.url && dv.url.startsWith('http')) validCnt++;
        });
        const req = achieveTd.dataset.req ? parseInt(achieveTd.dataset.req) : null;
        if (req) {
          const ok = validCnt >= req;
          achieveTd.innerHTML = `${validCnt}/${req}<br><span style="font-size:10px">${ok?'✓ 달성':'✗ 미달'}</span>`;
          achieveTd.style.color = ok ? '#16A34A' : '#DC2626';
          row.style.background = ok ? '' : '#FFF7F7';
        }
      }
    }
  }
};
// URL 수정 버튼 — 링크를 input으로 전환
W._blogUrlEdit = (wKey, member, dateStr, idx, btn) => {
  const linkEl = btn.previousElementSibling; // <a>
  if (!linkEl) return;
  const currentUrl = linkEl.href || '';
  const input = document.createElement('input');
  input.type = 'url';
  input.value = currentUrl;
  input.dataset.idx = idx;
  input.style.cssText = 'width:100%;font-size:10px;padding:3px 5px;border:1px solid #86EFAC;border-radius:4px;background:#fff';
  input.onchange = function() { W._blogUrl(wKey, member, dateStr, this.value, this, idx); };
  input.onblur = function() { if (this.value.trim().startsWith('http')) showBlog(); };
  // a + btn → input 으로 교체
  const wrap = linkEl.parentElement;
  wrap.innerHTML = '';
  wrap.appendChild(input);
  input.focus();
  input.select();
};
// URL 추가 버튼
W._blogUrlAdd = (wKey, member, dateStr) => {
  if (!BLOG[wKey]) BLOG[wKey] = {};
  if (!BLOG[wKey][member]) BLOG[wKey][member] = {};
  const dayData = BLOG[wKey][member][dateStr] || {};
  let urls = Array.isArray(dayData.urls) ? [...dayData.urls]
           : (dayData.url ? [{ url: dayData.url, firstTime: dayData.firstTime||dayData.time, time: dayData.time }]
           : []);
  urls.push({ url: '', firstTime: '', time: '' });
  BLOG[wKey][member][dateStr] = { urls };
  set(rBlog, BLOG);
  showBlog();
};
// URL 삭제 버튼
W._blogUrlDel = (wKey, member, dateStr, idx) => {
  if (!BLOG[wKey]?.[member]?.[dateStr]) return;
  const dayData = BLOG[wKey][member][dateStr];
  let urls = Array.isArray(dayData.urls) ? [...dayData.urls]
           : (dayData.url ? [{ url: dayData.url, firstTime: dayData.firstTime||dayData.time, time: dayData.time }]
           : []);
  urls.splice(idx, 1);
  BLOG[wKey][member][dateStr] = { urls };
  set(rBlog, BLOG);
  showBlog();
};
W._blogRole = (member, role) => {
  if (!BLOG.__roles) BLOG.__roles = {};
  BLOG.__roles[member] = role;
  set(rBlog, BLOG);
  showBlog();
};

window.W = W;

// 전역 에러 캐치
window.onerror = function(msg, src, line, col, err) {
  console.error('JS Error:', msg, 'line:', line, err);
  const mc = document.getElementById('mc');
  if (mc && mc.innerHTML === '') {
    mc.style.display = '';
    mc.innerHTML = `<div style="padding:20px;color:#DC2626;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">
      ⚠ 오류 발생: ${msg}<br>
      <span style="font-size:11px;font-weight:400">line ${line} — ${src}</span>
    </div>`;
  }
  return false;
};

try {
  cw=-1; renderTabs(); renderMain();
} catch(e) {
  console.error('Init error:', e);
  document.getElementById('mc').style.display='';
  document.getElementById('mc').innerHTML = `<div style="padding:20px;color:#DC2626;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">
    ⚠ 초기화 오류: ${e.message}<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">${e.stack}</pre>
  </div>`;
}
</script>
</body>
</html>
