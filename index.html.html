<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임신촌 업무 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid #E8ECF0;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;display:flex;flex-direction:column}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid #F0F2F5}
.sb-logo-txt{font-size:13px;font-weight:900;color:#1A2340}
.sb-logo-sub{font-size:10px;color:#8A97B0;margin-top:2px;font-weight:500}
.sb-sec{padding:14px 10px 4px}
.sb-sec-lbl{font-size:10px;font-weight:700;color:#B0BEC5;letter-spacing:.7px;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:#5A6785;font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:#F5F7FA;color:#1A2340}
.sb-item.on{background:#EFF4FF;color:#2563EB;font-weight:700}
.sb-item .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-sub{padding-left:14px;margin-top:2px}
.sb-sub-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;cursor:pointer;color:#8A97B0;font-size:12px;font-weight:500;transition:all .15s;margin-bottom:1px;border-left:2px solid transparent}
.sb-sub-item:hover{color:#1A2340;background:#F5F7FA}
.sb-sub-item.on{color:#2563EB;font-weight:700;border-left-color:#2563EB;background:#EFF4FF}
.sb-divider{border:none;border-top:1px solid #F0F2F5;margin:6px 12px}
.sb-footer{padding:14px 16px;border-top:1px solid #F0F2F5;margin-top:auto}
.content-wrap{margin-left:200px;flex:1;min-width:0}
.wnav{display:none!important}

:root{
  --bg:#F5F7FA;--bg2:#fff;--bg3:#EEF2F7;--border:#DDE3ED;
  --text:#1A2340;--text2:#5A6785;--text3:#8A97B0;
  --accent:#2563EB;--accent-light:#EFF4FF;
  --gold:#D97706;--gold-light:#FFFBEB;
  --green:#16A34A;--red:#DC2626;--purple:#7C3AED;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;max-width:1400px;margin:0 auto}
.logo{font-size:18px;font-weight:900;color:var(--text)}.logo span{color:var(--accent)}
.hdr-r{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{background:var(--accent-light);border:1px solid #BFCFFF;color:var(--accent);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sdot.live{background:var(--green);animation:blink 2s infinite}
.slbl{font-size:11px;color:var(--text3)}
.dstr{color:var(--text3);font-size:12px;font-family:'Roboto Mono',monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.wnav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px}
.wnav-in{display:flex;max-width:1400px;margin:0 auto;overflow-x:auto}
.wtab{padding:12px 18px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none}
.wtab:hover{color:var(--text)}.wtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.wtab.biz.on{color:var(--purple);border-bottom-color:var(--purple)}
.per{font-size:11px;font-weight:400;opacity:.8;margin-left:4px}
.main{max-width:1400px;margin:0 auto;padding:20px}
.stitle{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--text)}
.stitle::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;border-top:3px solid var(--border)}
.kc.a{border-top-color:var(--accent)}.kc.g{border-top-color:var(--green)}
.kc.go{border-top-color:var(--gold)}.kc.r{border-top-color:var(--red)}.kc.p{border-top-color:var(--purple)}
.klbl{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px}
.kval{font-size:19px;font-weight:900;font-family:'Roboto Mono',monospace;color:var(--text);letter-spacing:-1px}
.ksub{font-size:11px;color:var(--text3);margin-top:2px}
/* daily */
.dw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:11px}
.dc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.dc label{font-size:11px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px}
.dinp{width:100%;padding:6px 8px;background:var(--bg2);border:1.5px solid var(--accent);border-radius:6px;color:var(--accent);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto Mono',monospace}
.dinp:focus{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.dcalc{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px}
.dcc{border-radius:8px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
/* team cards */
.tg{display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:13px;margin-bottom:18px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tch{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.tnm{font-size:15px;font-weight:900;color:#fff}.tmb{font-size:11px;color:rgba(255,255,255,.75)}
.tcb{padding:13px 14px}
.sbdg{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;margin-bottom:10px;font-size:12px;font-weight:700}
.rs{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.ys{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.gs{background:#F0FDF4;color:#14532D;border:1px solid #BBF7D0}
.bs{background:#EFF4FF;color:#1E3A8A;border:1px solid #BFCFFF}
.pw{height:6px;background:var(--bg3);border-radius:3px;margin:4px 0 12px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .4s}
.ir{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.il{font-size:12px;color:var(--text2);font-weight:500}
.irr{display:flex;align-items:center;gap:5px}
.inp{width:126px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;text-align:right;font-family:'Roboto Mono',monospace}
.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.iunit{font-size:11px;color:var(--text3)}
.dvd{border:none;border-top:1px solid var(--border);margin:9px 0}
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sl{font-size:12px;color:var(--text2)}.sv{font-size:13px;font-weight:700;font-family:'Roboto Mono',monospace;color:var(--text)}
.rbig{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:8px;margin-top:9px;border:1px solid var(--border)}
.rnum{font-size:20px;font-weight:900;font-family:'Roboto Mono',monospace}
.rmsg{font-size:11px;font-weight:700;text-align:right;line-height:1.4}
/* summary */
.sw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 11px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.tbl th:not(:first-child){text-align:right}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl td:not(:first-child){text-align:right;font-family:'Roboto Mono',monospace}
.tbl tr:last-child td{border-bottom:none;background:var(--gold-light);font-weight:700;color:var(--gold)}
.tdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
/* msg */
.mw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:18px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.cbtn{padding:6px 14px;border-radius:7px;background:var(--accent);color:#fff;font-weight:700;font-size:12px;border:none;cursor:pointer}
.cbtn:hover{background:#1D4ED8}.cbtn.done{background:var(--green)}
.mbox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'Roboto Mono',monospace;font-size:12px;line-height:1.9;color:var(--text2);white-space:pre-wrap;word-break:break-all}
/* review */
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(228px,1fr));gap:11px;margin-bottom:18px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px}
.rtm{font-size:13px;font-weight:700;margin-bottom:9px}
.rf{margin-bottom:7px}.rf label{font-size:11px;color:var(--text3);font-weight:700;display:block;margin-bottom:3px}
.rf textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px;resize:vertical;min-height:48px;line-height:1.6}
.rf textarea:focus{outline:none;border-color:var(--accent)}
.stblk{margin-bottom:11px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stmr{display:flex;align-items:center;gap:5px;padding:7px 8px;background:var(--accent-light);border-bottom:1px solid var(--border)}
.snmi{width:76px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:13px;font-weight:700;color:var(--accent);background:#fff;font-family:'Noto Sans KR',sans-serif}
.srki{width:56px;padding:4px 6px;border:1px solid #BFCFFF;border-radius:5px;font-size:12px;color:var(--text2);background:#fff;font-family:'Noto Sans KR',sans-serif}
.snmi:focus,.srki:focus{outline:none;border-color:var(--accent)}
.sslsh{font-size:14px;color:var(--text3);font-weight:700}
.sta{width:100%;border:none;border-radius:0;min-height:68px;background:var(--bg);color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:7px;resize:vertical;line-height:1.6;display:block}
.sta:focus{outline:none;background:#FFFDE7}
.sttl{font-size:12px;font-weight:700;color:var(--accent);margin:9px 0 7px;border-top:1px solid var(--border);padding-top:9px}
.rtn{text-align:center;padding:11px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;font-size:12px;color:#15803D;margin-bottom:18px;line-height:1.8}
/* biz */
.bsn{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:15px}
.bst{padding:9px 18px;font-size:13px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;transition:all .15s}
.bst:hover{color:var(--text)}.bst.on{color:var(--purple);border-bottom-color:var(--purple)}
.btb{margin-bottom:18px}
.bth{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;color:#fff;border-radius:10px 10px 0 0;flex-wrap:wrap;gap:8px}
.btht{font-size:14px;font-weight:900}
.bths{display:flex;gap:10px;align-items:center;font-size:12px;flex-wrap:wrap}
.bmtbl{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.bmtbl th{padding:7px 9px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.bmtbl th:not(:first-child){text-align:right}
.bmtbl td{padding:8px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
.bmtbl tr:last-child td{border-bottom:none;background:var(--bg)}
.binp{padding:4px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-weight:700;font-family:'Roboto Mono',monospace;background:var(--bg);text-align:right;width:100%;box-sizing:border-box}
.binp:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.1);background:#fff}
.nr{text-align:right;font-family:'Roboto Mono',monospace;font-size:12px}
/* consult */
.csg{display:grid;grid-template-columns:repeat(auto-fit,minmax(142px,1fr));gap:10px;margin-bottom:13px}
.csc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;border-top:3px solid var(--border)}
.csc.g{border-top-color:var(--green)}.csc.go{border-top-color:var(--gold)}
.csc.p{border-top-color:var(--purple)}.csc.b{border-top-color:var(--accent)}
.cslb{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px}
.csv{font-size:16px;font-weight:900;font-family:'Roboto Mono',monospace;color:var(--text)}
.csse{font-size:11px;color:var(--text3);margin-top:2px}
.tcg{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:10px;margin-bottom:13px}
.tcc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tcch{padding:8px 12px;color:#fff;font-weight:900;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.tccb{padding:9px 12px}
.tcr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.tcr:last-child{border-bottom:none}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-inp{flex:1;max-width:320px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2)}
.search-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-clear{padding:7px 13px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.search-clear:hover{background:var(--bg3)}
.search-result-cnt{font-size:12px;color:var(--text3)}
.dhdr{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;user-select:none}
.dtc{font-size:13px;font-weight:700;color:var(--accent)}
.dts{font-size:11px;color:var(--text2);font-family:'Roboto Mono',monospace}
.ctbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:2px}
.ctbl th{padding:7px 8px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.ctbl td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.ctbl tr:last-child td{border-bottom:none}.ctbl tr:hover td{background:#FAFBFC}
.tsect{background:var(--bg);padding:4px 11px;font-size:11px;font-weight:700;border-left:3px solid}
.ci{width:100%;padding:4px 5px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--text)}
.ci:hover{border-color:var(--border);background:var(--bg)}.ci:focus{outline:none;border-color:var(--accent);background:#fff}
.cs{width:100%;padding:4px 3px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;cursor:pointer}
.cs:hover{border-color:var(--border);background:var(--bg)}.cs:focus{outline:none;border-color:var(--accent);background:#fff}
.cn{width:100%;padding:4px 5px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Roboto Mono',monospace;background:transparent;text-align:right;color:var(--text)}
.cn:hover{border-color:var(--border);background:var(--bg)}.cn:focus{outline:none;border-color:var(--accent);background:#fff}
.arb{width:100%;padding:5px;font-size:12px;color:var(--text3);background:var(--bg);border:1px dashed var(--border);border-top:none;cursor:pointer;border-radius:0 0 8px 8px}
.arb:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.dbc{width:21px;height:21px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
.dbc:hover{background:#FEE2E2;color:var(--red)}
@media(max-width:600px){.main{padding:14px}.kval{font-size:16px}.inp{width:108px}}
/* 원장공지사항 */
.notice-bar{background:#1D4ED8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 2px 8px rgba(29,78,216,.25)}
.notice-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.notice-body{flex:1;min-width:0}
.notice-title{font-size:12px;font-weight:900;color:#93C5FD;letter-spacing:.5px;margin-bottom:4px}
.notice-content{font-size:13px;color:#fff;font-weight:500;line-height:1.6;word-break:break-all;white-space:pre-wrap}
.notice-edit-btn{padding:5px 11px;border-radius:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap}
.notice-edit-btn:hover{background:rgba(255,255,255,.25)}
.notice-input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:7px 10px;resize:vertical;min-height:52px;line-height:1.6}
.notice-input::placeholder{color:rgba(255,255,255,.5)}
.notice-input:focus{outline:none;background:rgba(255,255,255,.15)}
/* 미납 리스트 탭 */
.unpaid-wrap{margin-top:16px}
.unpaid-team-block{margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.unpaid-team-hdr{padding:8px 13px;color:#fff;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.unpaid-tbl{width:100%;border-collapse:collapse;background:var(--bg2)}
.unpaid-tbl th{padding:7px 9px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border)}
.unpaid-tbl td{padding:7px 9px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.unpaid-tbl tr:last-child td{border-bottom:none}
.unpaid-tbl .member-row{background:var(--bg)}
.unpaid-tbl .member-row td{font-weight:700;font-size:11px;color:var(--text3);padding:4px 9px}
/* 추가 리스트 */
.addlist-wrap{margin-top:18px}
.addlist-tbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.addlist-tbl th{padding:7px 9px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.addlist-tbl td{padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.addlist-tbl tr:last-child td{border-bottom:none}
.addlist-tbl tr.status-완납{background:#FFFDE7}
.addlist-tbl tr.status-미납{background:#F3F4F6}
.addlist-tbl tr.status-진행중{background:var(--bg2)}
.al-inp{width:100%;padding:3px 5px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--text)}
.al-inp:hover{border-color:var(--border);background:var(--bg)}
.al-inp:focus{outline:none;border-color:var(--accent);background:#fff}
.al-sel{width:100%;padding:3px 3px;border:1px solid transparent;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:transparent;cursor:pointer}

<body>
<div class="layout">

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sb-logo">

    <div class="sb-sub" id="nav-dash-sub" style="display:none">
      <div class="sb-sub-item" id="nav-w0" onclick="W._sw(0)">📅 1주차</div>
      <div class="sb-sub-item" id="nav-w1" onclick="W._sw(1)">📅 2주차</div>
      <div class="sb-sub-item" id="nav-w2" onclick="W._sw(2)">📅 3주차</div>
      <div class="sb-sub-item" id="nav-w3" onclick="W._sw(3)">📅 4주차</div>
    </div>

    <div class="sb-sub" id="nav-biz-sub" style="display:none">

      <div class="sb-sub-item" id="nav-biz-con" onclick="W._swBiz('상담내역')">📋 상담 내역</div>
      <div class="sb-sub-item" id="nav-biz-unp" onclick="W._swBiz('미납리스트')">💰 미납 리스트</div>
      <div class="sb-sub-item" id="nav-biz-add" onclick="W._swBiz('추가리스트')">📋 추가 리스트</div>
    </div>
  </div>

  <div class="sb-sec">
    <div class="sb-sec-lbl">아카이브</div>
    <div id="sb-months"><div style="font-size:11px;color:#B0BEC5;padding:4px 8px">저장된 월 없음</div></div>
  </div>
  <hr class="sb-divider">
  <div class="sb-sec">
    <div class="sb-sec-lbl">관리</div>
    <a class="sb-item" href="admin.html"><span class="ico">⚙</span> 설정</a>
  </div>
  <div class="sb-footer">
    <div style="font-size:11px;color:#B0BEC5;line-height:1.8">
      <span class="sdot" id="sd"></span><span id="sl">연결 중...</span><br>
      <span id="td"></span>
    </div>
  </div>
</div>

<!-- 컨텐츠 -->
<div class="content-wrap">
  <div class="hdr">
    <div class="hdr-in">
      <div id="page-title" style="font-size:15px;font-weight:700;color:var(--text)">대시보드</div>
      <div class="hdr-r">
        <div class="badge" id="goal-badge">🎯 6월 목표 431,000,000원</div>
        <div><span class="sdot" id="sd2" style="display:none"></span></div>
        <div class="dstr" id="td2" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="wnav" style="display:none"><div class="wnav-in" id="wtabs"></div></div>
  <div class="main">
    <div id="mc"></div>
    <div id="bc" style="display:none"></div>
  </div>
</div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDvYouAWDL-KYTegBOie6P_teOtX3ubBlI",
  authDomain:"sinchon-91dea.firebaseapp.com",
  databaseURL:"https://sinchon-91dea-default-rtdb.firebaseio.com",
  projectId:"sinchon-91dea",
  storageBucket:"sinchon-91dea.firebasestorage.app",
  messagingSenderId:"541758337781",
  appId:"1:541758337781:web:b6fa7bc21c402a21628bbc"
});
const db = getDatabase(app);
const rConfig  = ref(db,'config');
const rArchive = ref(db,'archive');
const rSales   = ref(db,'sales2025');
const rReview  = ref(db,'review2025');
const rDaily   = ref(db,'daily2025');
const rBiz     = ref(db,'biz2025');
const rConsult = ref(db,'consult2025');
const rNotice  = ref(db,'notice2025');
const rAddList = ref(db,'addlist2025');

// ── 설정 ─────────────────────────────────────────────
const STS = ['상담','추가'];
const RES = ['완납','미납','추가','미등록회수','취소','COD'];
let WEEKS = [{label:'1주차',period:'6/1~6/8',total:110000000},{label:'2주차',period:'6/9~6/14',total:111000000},{label:'3주차',period:'6/15~6/20',total:60000000},{label:'4주차',period:'6/21~6/30',total:150000000}];
let TEAMS = [{name:'1팀',members:4,color:'#2563EB'},{name:'2팀',members:3,color:'#16A34A'},{name:'3팀',members:3,color:'#7C3AED'},{name:'4팀',members:3,color:'#EA580C'}];
let TM_CFG = [{name:'1팀',color:'#2563EB',members:['정충만','박효선','강채원','송평강']},{name:'2팀',color:'#16A34A',members:['이재운','김태정','한대희']},{name:'3팀',color:'#7C3AED',members:['백영광','이상천','안현우']},{name:'4팀',color:'#EA580C',members:['서승표','송준수','한가흔']}];
let BIZ_PERIOD = {s:'2026-05-14', e:'2026-06-11'};
let TG = 431000000, TM = 13, MONTH_LABEL = '6월';

function applyConfig(cfg) {
  if (!cfg) return;
  if (cfg.weeks) WEEKS = cfg.weeks;
  if (cfg.teams) {
    TM_CFG = cfg.teams;
    TEAMS = cfg.teams.map(t => ({name:t.name, members:t.members.length, color:t.color}));
    TM = cfg.teams.reduce((s,t) => s + t.members.length, 0);
  }
  if (cfg.totalGoal) TG = cfg.totalGoal;
  if (cfg.monthLabel) MONTH_LABEL = cfg.monthLabel;
  if (cfg.bizStart) BIZ_PERIOD.s = cfg.bizStart;
  if (cfg.bizEnd) BIZ_PERIOD.e = cfg.bizEnd;
  TEAMS.forEach(t => {
    if (!DATA[t.name]) DATA[t.name] = {};
    WEEKS.forEach((_,wi) => { if (!DATA[t.name][wi]) DATA[t.name][wi] = {sales:'',consult:'',contract:''}; });
  });
  TM_CFG.forEach(t => {
    if (!BIZ[t.name]) BIZ[t.name] = {};
    t.members.forEach(m => { if (!BIZ[t.name][m]) BIZ[t.name][m] = {sales:0,inquiry:0,totalSales:0,refund:0,goal:0}; });
  });
}

// ── 상태 ─────────────────────────────────────────────
let cw = -1, bst = '요약';
let curMonth = 'current';
let ARCHIVE = {};
let arcSubTab = '결산';
let DATA = {}, DAILY = {prevYear:190730000,thisYear:170276400,consult:0,contract:0,sales:0};
let REVIEW = {}, BIZ = {}, CONSULT = {};
let NOTICE = {text:'', editing:false};
let ADDLIST = {};
let cCol = {};
let tcBuilt = false, rvBuilt = false;

// 초기화
TEAMS.forEach(t => {
  DATA[t.name] = {};
  REVIEW[t.name] = {good:'',improve:'',
    strat1:'',strat2:'',strat3:'',strat4:'',strat5:'',
    name1:'',rank1:'',name2:'',rank2:'',name3:'',rank3:'',
    name4:'',rank4:'',name5:'',rank5:''};
  WEEKS.forEach((_,wi) => DATA[t.name][wi] = {sales:'',consult:'',contract:''});
});
TM_CFG.forEach(t => {
  BIZ[t.name] = {};
  t.members.forEach(m => BIZ[t.name][m] = {sales:0, inquiry:0, totalSales:0, refund:0, goal:0});
});

// ── Firebase ─────────────────────────────────────────
onValue(rConfig, snap => {
  const v = snap.val();
  if (v) applyConfig(v);
  const b = document.getElementById('goal-badge');
  if (b) b.textContent = '🎯 ' + MONTH_LABEL + ' 목표 ' + F(TG) + '원';
  if (cw < 99) { tcBuilt=false; rvBuilt=false; renderMain(); }
  else showBiz();
});

onValue(rArchive, snap => {
  ARCHIVE = snap.val() || {};
  renderSbMonths();
});

onValue(rSales, snap => {
  const v = snap.val();
  if (v) TEAMS.forEach(t => {
    if (v[t.name]) WEEKS.forEach((_,wi) => {
      if (v[t.name][wi]) DATA[t.name][wi] = {...DATA[t.name][wi], ...v[t.name][wi]};
    });
  });
  document.getElementById('sd').className = 'sdot live';
  document.getElementById('sl').textContent = '실시간 연결됨';
  if (cw < 99) { if (tcBuilt) updTInp(); else buildTC(); renderKPI(); renderSum(); renderMsg(); }
});
onValue(rDaily, snap => {
  const v = snap.val(); if (v) DAILY = {...DAILY, ...v};
  updDailyInp(); updDailyCalc(); if (cw < 99) renderMsg();
});
onValue(rReview, snap => {
  const v = snap.val();
  if (v) TEAMS.forEach(t => { if (v[t.name]) REVIEW[t.name] = {...REVIEW[t.name], ...v[t.name]}; });
  if (cw < 99) { if (rvBuilt) updRvInp(); else buildRv(); }
});
onValue(rBiz, snap => {
  const v = snap.val();
  if (v) TM_CFG.forEach(t => {
    if (v[t.name]) {
      t.members.forEach(m => {
        if (v[t.name][m]) BIZ[t.name][m] = {...BIZ[t.name][m], ...v[t.name][m]};
      });
    }
  });
  if (cw === 99 && bst === '요약') {
    const f = document.activeElement;
    if (f && f.classList.contains('binp')) updBizKPI();
    else showBiz();
  }
});
onValue(rConsult, snap => {
  CONSULT = snap.val() || {};
  if (cw === 99) {
    const f = document.activeElement;
    if (f && (f.classList.contains('ci') || f.classList.contains('cn') || f.classList.contains('cs'))) updBizKPI();
    else showBiz();
  }
});
onValue(rNotice, snap => {
  const v = snap.val();
  NOTICE.text = (v && v.text) ? v.text : '';
  // 대시보드가 보이는 경우 공지 섹션만 업데이트
  const nb = document.getElementById('notice-content-display');
  if (nb) nb.textContent = NOTICE.text || '(공지사항이 없습니다)';
  const ni = document.getElementById('notice-input');
  if (ni && document.activeElement !== ni) ni.value = NOTICE.text || '';
});
onValue(rAddList, snap => {
  ADDLIST = snap.val() || {};
  if (cw === 99 && bst === '추가리스트') showBiz();
});

// ── 유틸 ─────────────────────────────────────────────
const F = n => Math.round(n||0).toLocaleString('ko-KR');
const P = (a,b) => b===0 ? '0.0%' : (Math.round(a/b*1000)/10).toFixed(1)+'%';
const N = v => parseInt((v+'').replace(/[^0-9]/g,''))||0;
const WG = (t,wi) => Math.round(WEEKS[wi].total*(t.members/TM)/10000)*10000;
function ST(r) {
  if (r>=1)  return {cl:'bs', b:'🟢', m:'목표 달성! 💪'};
  if (r>=.8) return {cl:'gs', b:'🟢', m:'순항 중!'};
  if (r>=.5) return {cl:'ys', b:'🟡', m:'분발 필요!'};
  return            {cl:'rs', b:'🔴', m:'전략 점검 필요'};
}
const BC = r => r>=.8?'#16A34A':r>=.5?'#D97706':'#DC2626';
const BG = r => r>=.8?'#F0FDF4':r>=.5?'#FFFBEB':'#FEF2F2';
const TC = r => r>=.8?'#15803D':r>=.5?'#B45309':'#DC2626';
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dlbl(s) { const d=new Date(s); const wd=['일','월','화','수','목','금','토']; return `${s} (${wd[d.getDay()]})`; }
function getTeam(m) { return TM_CFG.find(t => t.members.includes(m)); }

// 날짜
(function(){
  const d=new Date(), wd=['일','월','화','수','목','금','토'];
  document.getElementById('td').textContent = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${wd[d.getDay()]})`;
})();

// ── 탭 ───────────────────────────────────────────────
function renderTabs() {
  WEEKS.forEach((w,i) => {
    const el = document.getElementById('nav-w'+i);
    if (el) el.innerHTML = '📅 ' + w.label + ' <span style="font-size:10px;opacity:.6">' + w.period + '</span>';
  });
  ['nav-dash','nav-w0','nav-w1','nav-w2','nav-w3','nav-biz'].forEach(id => {
    const el = document.getElementById(id); if (el) el.classList.remove('on');
  });
  if (cw === -1) { document.getElementById('nav-dash')?.classList.add('on'); }
  else if (cw >= 0 && cw < 99) { document.getElementById('nav-w'+cw)?.classList.add('on'); document.getElementById('nav-dash')?.classList.add('on'); }
  else if (cw === 99) { document.getElementById('nav-biz')?.classList.add('on'); }
  const pt = document.getElementById('page-title');
  if (pt) {
    if (curMonth !== 'current') pt.textContent = '📁 ' + curMonth.slice(0,4) + '년 ' + curMonth.slice(5,7) + '월 아카이브';
    else if (cw === -1) pt.textContent = '대시보드';
    else if (cw === 99) pt.textContent = '영업현황판';
    else pt.textContent = (WEEKS[cw]?.label||'') + ' 매출 현황';
  }
}

function renderSbMonths() {
  const el = document.getElementById('sb-months'); if (!el) return;
  const months = Object.keys(ARCHIVE).sort().reverse();
  if (!months.length) { el.innerHTML = '<div style="font-size:11px;color:#B0BEC5;padding:4px 8px">저장된 월 없음</div>'; return; }
  el.innerHTML = months.map(m => {
    const lbl = m.slice(0,4) + '년 ' + m.slice(5,7) + '월';
    return '<div class="sb-sub-item' + (curMonth===m?' on':'') + '" onclick="W._setMonth(\'' + m + '\')">' + '📁 ' + lbl + '</div>';
  }).join('');
}

// ── 결산 메인 ─────────────────────────────────────────
function renderAllDashboard() {
  // 전체 대시보드: 오늘 현황 + 1~4주차 전체
  const mc = document.getElementById('mc');

  // 오늘 현황 HTML
  let h = `
    ${renderNoticeBar()}
    <div class="stitle">📊 오늘의 매출 현황</div>
    <div class="dw">
      <div class="dg">
        <div class="dc"><label>📅 전년 누계 매출 (원)</label><input class="dinp" id="dp" type="text" inputmode="numeric"></div>
        <div class="dc"><label>💰 올해 누계 매출 (원)</label><input class="dinp" id="dt" type="text" inputmode="numeric"></div>
        <div class="dc"><label>📞 전일 상담 건수</label><input class="dinp" id="dco" type="text" inputmode="numeric"></div>
        <div class="dc"><label>✅ 전일 등록 건수</label><input class="dinp" id="dr" type="text" inputmode="numeric"></div>
        <div class="dc"><label>💵 전일 매출 (원)</label><input class="dinp" id="ds" type="text" inputmode="numeric"></div>
      </div>
      <div class="dcalc">
        <div class="dcc" id="ddc" style="background:var(--bg);border:1px solid var(--border);border-radius:8px">
          <span style="font-size:12px;font-weight:700;color:var(--text2)">📉 전년대비 차이</span>
          <span style="font-size:14px;font-weight:900;font-family:'Roboto Mono',monospace;color:var(--red)" id="ddv">-</span>
        </div>
        <div class="dcc" style="background:var(--bg);border:1px solid var(--border);border-radius:8px">
          <span style="font-size:12px;font-weight:700;color:var(--text2)">🔄 전일 전환율</span>
          <span style="font-size:14px;font-weight:900;font-family:'Roboto Mono',monospace;color:var(--text)" id="dcv">-</span>
        </div>
      </div>
    </div>`;

  // 누계 KPI
  const totalSales = TEAMS.reduce((s,t)=>WEEKS.reduce((ss,_,i)=>ss+N(DATA[t.name]?.[i]?.sales||0),s),0);
  const diff = DAILY.thisYear - DAILY.prevYear;
  h += `<div class="stitle">📈 결산 누계 현황</div>
    <div class="kg">
      <div class="kc go"><div class="klbl">월 목표</div><div class="kval">${F(TG)}</div><div class="ksub">원</div></div>
      <div class="kc g"><div class="klbl">누계 실적</div><div class="kval" id="dash-kpi-sales">${F(DAILY.thisYear||0)}</div><div class="ksub">원</div></div>
      <div class="kc a"><div class="klbl">달성률</div><div class="kval" id="dash-kpi-rate">${TG>0?((DAILY.thisYear||0)/TG*100).toFixed(1)+'%':'0.0%'}</div><div class="ksub">누계 기준</div></div>
      <div class="kc" id="dash-kpi-diff-card"><div class="klbl">전년대비</div><div class="kval" id="dash-kpi-diff" style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${F(diff)}</div><div class="ksub">원</div></div>
    </div>`;

  // 주차별 결산 (1~4주차 전체)
  WEEKS.forEach((w,i) => {
    const ws = TEAMS.reduce((s,t)=>s+N(DATA[t.name]?.[i]?.sales||0),0);
    const r = w.total>0?ws/w.total:0; const st = ST(r);
    const teamRows = TEAMS.map(t=>{
      const d=DATA[t.name]?.[i]||{};
      const s=N(d.sales),c=N(d.consult),k=N(d.contract);
      const g=Math.round(w.total*(t.members/TM)/10000)*10000;
      const tr=g>0?s/g:0; const tst=ST(tr);
      return `<tr>
        <td><span class="tdot" style="background:${t.color}"></span>${t.name} (${t.members}명)</td>
        <td>${F(g)}</td><td>${F(s)}</td>
        <td style="color:${TC(tr)};font-weight:700">${tst.b} ${(tr*100).toFixed(1)}%</td>
        <td>${c}</td><td>${k}</td><td>${P(k,c)}</td>
      </tr>`;
    }).join('');
    h += `<div class="stitle" style="margin-top:20px">
        ${w.label} <span style="font-size:12px;font-weight:400;color:var(--text3)">${w.period}</span>
        <span style="margin-left:10px;font-size:12px;color:${TC(r)};font-weight:700">${st.b} ${(r*100).toFixed(1)}% &nbsp;|&nbsp; ${F(ws)}원 / 목표 ${F(w.total)}원</span>
      </div>
      <div class="sw"><table class="tbl">
        <thead><tr><th>팀</th><th style="text-align:right">목표</th><th style="text-align:right">실적</th>
        <th style="text-align:right">달성률</th><th style="text-align:right">상담</th>
        <th style="text-align:right">등록</th><th style="text-align:right">전환율</th></tr></thead>
        <tbody>${teamRows}</tbody>
      </table></div>`;
  });

  h += `<div class="rtn">🟢 실시간 공유 중 — 누구든 입력하면 모든 접속자 화면에 즉시 반영됩니다</div>`;
  mc.innerHTML = h;

  // 이벤트 연결
  const fields = [['dp','prevYear'],['dt','thisYear'],['dco','consult'],['dr','contract'],['ds','sales']];
  fields.forEach(([id,key]) => {
    const el = document.getElementById(id);
    if (el) el.oninput = function(){ W._di(key, this.value); formatBizInp(this); };
  });
  updDailyInp(); updDailyCalc();
}

function renderMain() {
  document.getElementById('mc').style.display = '';
  document.getElementById('bc').style.display = 'none';
  if (cw === -1) { renderAllDashboard(); return; }
  document.getElementById('mc').innerHTML = `
    ${renderNoticeBar()}
    <div class="stitle">📊 오늘의 매출 현황</div>
    <div class="dw">
      <div class="dg">

function updDailyInp() {
  const map = [['dp','prevYear'],['dt','thisYear'],['dco','consult'],['dr','contract'],['ds','sales']];
  map.forEach(([id,k]) => {
    const el = document.getElementById(id);
    if (el && document.activeElement !== el)
      el.value = (k==='prevYear'||k==='thisYear'||k==='sales') ? F(DAILY[k]) : DAILY[k]||'';
  });
}
function updDailyCalc() {
  const diff = DAILY.thisYear - DAILY.prevYear;
  const dv = document.getElementById('ddv'), dc = document.getElementById('ddc'), cv = document.getElementById('dcv');
  if (dv) { dv.textContent=(diff>=0?'+':'')+F(diff)+'원'; dv.style.color=diff>=0?'#15803D':'#DC2626'; }
  if (dc) dc.style.cssText=`background:${diff>=0?'#F0FDF4':'#FEF2F2'};border:1px solid ${diff>=0?'#BBF7D0':'#FECACA'};border-radius:8px`;
  if (cv) cv.textContent = DAILY.consult>0 ? (DAILY.contract/DAILY.consult*100).toFixed(1)+'%' : '0.0%';
  // 결산 누계 현황 KPI 실시간 갱신
  const ks = document.getElementById('dash-kpi-sales');
  const kr = document.getElementById('dash-kpi-rate');
  const kd = document.getElementById('dash-kpi-diff');
  const kc = document.getElementById('dash-kpi-diff-card');
  if (ks) ks.textContent = F(DAILY.thisYear||0);
  if (kr) kr.textContent = TG>0 ? ((DAILY.thisYear||0)/TG*100).toFixed(1)+'%' : '0.0%';
  if (kd) { kd.textContent=(diff>=0?'+':'')+F(diff); kd.style.color=diff>=0?'var(--green)':'var(--red)'; }
  if (kc) kc.className = 'kc '+(diff>=0?'g':'r');
}

function renderKPI() {
  const wi=cw, ws=TEAMS.reduce((s,t)=>s+N(DATA[t.name][wi].sales),0);
  const wg=WEEKS[wi].total, wr=wg>0?ws/wg:0;
  const ts=TEAMS.reduce((s,t)=>WEEKS.reduce((ss,_,i)=>ss+N(DATA[t.name][i].sales),s),0);
  const st=ST(wr), cl=wr>=.8?'g':wr>=.5?'go':'r';
  document.getElementById('kpi').innerHTML=`
    <div class="kc"><div class="klbl">이번 주 목표</div><div class="kval">${F(wg)}</div><div class="ksub">원</div></div>
    <div class="kc a"><div class="klbl">이번 주 실적</div><div class="kval">${F(ws)}</div><div class="ksub">원</div></div>
    <div class="kc ${cl}"><div class="klbl">이번 주 달성률</div><div class="kval" style="color:${TC(wr)}">${P(ws,wg)}</div><div class="ksub">${st.b} ${st.m}</div></div>
    <div class="kc go"><div class="klbl">6월 누계 실적</div><div class="kval">${F(ts)}</div><div class="ksub">/ ${F(TG)}원 &nbsp;|&nbsp; <b style="color:var(--gold)">${P(ts,TG)}</b></div></div>`;
}

function updTStats() {
  TEAMS.forEach(t => {
    const wi=cw, d=DATA[t.name][wi], goal=WG(t,wi), s=N(d.sales), c=N(d.consult), k=N(d.contract);
    const r=goal>0?s/goal:0, st=ST(r), left=Math.max(goal-s,0);
    const sb=document.getElementById(`sb-${t.name}`), pb=document.getElementById(`pb-${t.name}`);
    const rn=document.getElementById(`rn-${t.name}`), rb=document.getElementById(`rb-${t.name}`);
    const rm=document.getElementById(`rm-${t.name}`);
    const scv=document.getElementById(`sv-cv-${t.name}`), spr=document.getElementById(`sv-pr-${t.name}`);
    const slf=document.getElementById(`sv-lf-${t.name}`);
    if(sb){sb.className=`sbdg ${st.cl}`;sb.textContent=`${st.b} ${st.m}`;}
    if(pb){pb.style.width=Math.min(r*100,100)+'%';pb.style.background=BC(r);}
    if(rn){rn.textContent=(r*100).toFixed(1)+'%';rn.style.color=TC(r);}
    if(rb){rb.style.background=BG(r);rb.style.borderColor=BC(r)+'33';}
    if(rm){rm.textContent=`${st.b}\n${st.m}`;rm.style.color=TC(r);}
    if(scv) scv.textContent = c>0?(k/c*100).toFixed(1)+'%':'0.0%';
    if(spr) spr.textContent = F(Math.round(s/t.members))+'원';
    if(slf){slf.textContent=left===0?'✅ 달성!':F(left)+'원';slf.style.color=left===0?'#16A34A':'#DC2626';}
  });
}

function renderMsg() {
  if (cw >= 99) return;
  const wi=cw, w=WEEKS[wi], ws=TEAMS.reduce((s,t)=>s+N(DATA[t.name][wi].sales),0);
  const wr=w.total>0?ws/w.total:0, st=ST(wr);
  const diff=DAILY.thisYear-DAILY.prevYear, conv=DAILY.consult>0?(DAILY.contract/DAILY.consult*100).toFixed(1):0;
  const lines=[
    `📊 [${w.label} ${w.period}] 매출 현황`,`━━━━━━━━━━━━━━━━━`,
    `📅 전년 누계: ${F(DAILY.prevYear)}원`,`💰 올해 누계: ${F(DAILY.thisYear)}원`,
    `📉 전년대비: ${diff>=0?'+':''}${F(diff)}원`,
    `📞 전일 상담: ${DAILY.consult}건 → 등록: ${DAILY.contract}건 (전환율 ${conv}%)`,
    `💵 전일 매출: ${F(DAILY.sales)}원`,`━━━━━━━━━━━━━━━━━`,
    `🎯 주간 목표: ${F(w.total)}원`,`📈 전체 실적: ${F(ws)}원 (${P(ws,w.total)}) ${st.b} ${st.m}`,`━━━━━━━━━━━━━━━━━`,
  ];
  TEAMS.forEach(t=>{
    const d=DATA[t.name][wi],g=WG(t,wi),s=N(d.sales);
    lines.push(`[${t.name}] ${F(s)}원 (${P(s,g)}) ${ST(g>0?s/g:0).b} | 상담 ${N(d.consult)}건 → 등록 ${N(d.contract)}건`);
  });
  lines.push(`━━━━━━━━━━━━━━━━━`);
  const el=document.getElementById('mbox'); if(el) el.textContent=lines.join('\n');
}

// ── 미납 리스트 ───────────────────────────────────────
function renderUnpaidList() {
  // 상담내역에서 result==='미등록'인 항목 수집
  const unpaidByTeam = {};
  TM_CFG.forEach(t => { unpaidByTeam[t.name] = {}; t.members.forEach(m => { unpaidByTeam[t.name][m] = []; }); });

  Object.entries(CONSULT).forEach(([date, rows]) => {
    Object.entries(rows||{}).forEach(([rid, r]) => {
      if (r.result === '미납') {
        const t = getTeam(r.mentor);
        if (t && unpaidByTeam[t.name] && r.mentor) {
          if (!unpaidByTeam[t.name][r.mentor]) unpaidByTeam[t.name][r.mentor] = [];
          unpaidByTeam[t.name][r.mentor].push({date, rid, r});
        }
      }
    });
  });

  let h = `<div class="addlist-wrap">
    <div class="stitle" style="margin-bottom:10px">💰 미납 리스트 <span style="font-size:11px;font-weight:400;color:var(--text3)">(상담내역 결과 '미납' 자동집계)</span></div>`;

  const fmtDate = d => {
    const dt = new Date(d);
    const mm = String(dt.getMonth()+1).padStart(2,'0');
    const dd = String(dt.getDate()).padStart(2,'0');
    return `${mm}-${dd}`;
  };

  let hasAny = false;
  TM_CFG.forEach(t => {
    const teamItems = t.members.flatMap(m => unpaidByTeam[t.name][m]||[]);
    if (!teamItems.length) return;
    hasAny = true;
    h += `<div class="unpaid-team-block"><div class="unpaid-team-hdr" style="background:${t.color}">
      <span>${t.name}</span>
      <span style="font-size:11px;font-weight:400;opacity:.85">${teamItems.length}건 · 예정 ${F(teamItems.reduce((s,{r})=>s+N(r.expected),0))}원</span>
    </div>
    <table class="unpaid-tbl">
      <thead><tr>
        <th style="width:70px">직원</th><th style="width:80px">학생</th>
        <th style="width:80px">과목</th><th style="width:80px">날짜</th>
        <th style="width:90px">예정금액</th><th>비고</th>
      </tr></thead><tbody>`;
    t.members.forEach(m => {
      const items = unpaidByTeam[t.name][m]||[];
      if (!items.length) return;
      h += `<tr class="member-row"><td colspan="6">${m} (${items.length}건)</td></tr>`;
      items.forEach(({date,rid,r}) => {
        h += `<tr>
          <td style="color:${t.color};font-weight:600">${m}</td>
          <td>${r.student||'-'}</td>
          <td>${r.subject||'-'}</td>
          <td style="font-family:'Roboto Mono',monospace;font-size:11px">${fmtDate(date)}</td>
          <td style="text-align:right;font-family:'Roboto Mono',monospace;color:var(--gold);font-weight:700">${r.expected?F(N(r.expected)):'-'}</td>
          <td style="color:var(--text2)">${r.note||''}</td>
        </tr>`;
      });
    });
    h += `</tbody></table></div>`;
  });

  if (!hasAny) h += `<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">미납 항목이 없습니다 ✅</div>`;
  h += `</div>`;
  return h;
}

// ── 상담 집계 ─────────────────────────────────────────
function calcMS() {
  const ms = {};
  TM_CFG.forEach(t => t.members.forEach(m => {
    ms[m] = {상담:0, 등록:0, 미등록:0, 취소:0, 완납:0, 미납:0, COD:0};
  }));
  Object.values(CONSULT).forEach(day => {
    Object.values(day||{}).forEach(r => {
      const m = r.mentor; if (!ms[m]) return;
      if (r.status === '상담') ms[m].상담++;
      if (r.result === '완납') { ms[m].완납 += N(r.paid); ms[m].등록++; }
      if (r.result === '미납') { ms[m].미납 += N(r.expected); ms[m].미등록++; }
      if (r.result === '미등록회수') { ms[m].완납 += N(r.paid); ms[m].등록++; }
      if (r.result === '취소') ms[m].취소++;
      if (r.result === 'COD') { ms[m].완납 += N(r.paid); ms[m].등록++; ms[m].COD++; }
      // 추가 → 아무것도 반영 안함
    });
  });
  return ms;
}

  let vc=0,sr=0;
  TM_CFG.forEach(t => t.members.forEach(m => {
    const bd=BIZ[t.name]?.[m]||{};
    totBiz+=(bd.sales||0);totTM+=(bd.totalSales||0);totRef+=(bd.refund||0);
    totInq+=(bd.inquiry||0);totWan+=ms[m].완납;totMi+=ms[m].미납;

    if((bd.inquiry||0)>0){sr+=ms[m].등록/bd.inquiry;vc++;}
  }));
  const cards = document.querySelectorAll('#bc .kval');
  if (cards.length >= 8) {
    cards[0].textContent=F(totWan); cards[1].textContent=F(totMi);

    cards[3].textContent=vc>0?(sr/vc*100).toFixed(1)+'%':'0.0%';
  }
}

    const s=ts[t.name];
    h+=`<div class="tcc">
      <div class="tcch" style="background:${t.color}"><span>${t.name}</span><span style="font-size:11px;opacity:.8">${t.members.join(' · ')}</span></div>
      <div class="tccb">
        <div class="tcr"><span style="color:var(--text2)">완납</span><span style="font-weight:700;color:var(--green);font-family:'Roboto Mono',monospace">${F(s.paid)}원</span></div>
        <div class="tcr"><span style="color:var(--text2)">예정</span><span style="font-weight:700;color:var(--gold);font-family:'Roboto Mono',monospace">${F(s.exp)}원</span></div>
        <div class="tcr"><span style="color:var(--text2)">건수</span><span style="font-weight:700">${s.cnt}건 (등록 ${s.wan})</span></div>
      </div>
    </div>`;
  });
  h += `</div>`;

  dates.forEach(date => {
    const rows=Object.entries(CONSULT[date]||{});
    if(!rows.length) return;
    let dp=0,dem=0;
    rows.forEach(([,r])=>{dp+=N(r.paid);dem+=N(r.expected)*(N(r.rate)/100);});
    const col=cCol[date];
    h+=`<div class="dhdr" onclick="W._cc('${date}')">
      <span class="dtc">${dlbl(date)}</span>
      <div style="display:flex;gap:11px;align-items:center">
        <span class="dts">${rows.length}건 · 완납 ${F(dp)}원 · 기대 ${F(dem)}원</span>
        <span style="font-size:11px;color:var(--text3)">${col?'▼':'▲'}</span>
      </div>
    </div>`;
    if (!col) {
      const to=TM_CFG.map(t=>t.name);
      const sorted=rows.sort(([,a],[,b])=>to.indexOf(getTeam(a.mentor)?.name||'')-to.indexOf(getTeam(b.mentor)?.name||''));
      h+=`<table class="ctbl"><thead><tr>
        <th style="width:68px">멘토</th><th style="width:78px">학생이름</th>
        <th style="width:80px">과목</th>
        <th style="width:63px">상태</th><th style="width:73px">결과</th>
        <th style="width:86px">완납(원)</th><th style="width:86px">예정(원)</th>
        <th style="width:50px">시간</th>
        <th>비고</th><th style="width:22px"></th>
      </tr></thead><tbody>`;
      let lt=null;
      sorted.forEach(([rid,r])=>{
        const t=getTeam(r.mentor);
        if(t&&t.name!==lt){lt=t.name;h+=`<tr><td colspan="10" style="padding:0"><div class="tsect" style="border-left-color:${t.color};color:${t.color}">${t.name}</div></td></tr>`;}
        const rowBg = r.result==='완납' ? 'background:#FFFDE7' : r.result==='미납' ? 'background:#FEF2F2' : r.result==='취소' ? 'background:#E5E7EB;color:#6B7280' : r.result==='COD' ? 'background:#EFF4FF' : '';
        h+=`<tr style="${rowBg}">
          <td><select class="cs" onchange="W._cu('${date}','${rid}','mentor',this.value)">
            <option value="">선택</option>
            ${TM_CFG.map(tm=>`<optgroup label="${tm.name}">${tm.members.map(m=>`<option value="${m}"${r.mentor===m?' selected':''}>${m}</option>`).join('')}</optgroup>`).join('')}
          </select></td>
          <td><input class="ci" value="${r.student||''}" placeholder="이름" oninput="W._cu('${date}','${rid}','student',this.value)"></td>
          <td><input class="ci" value="${r.subject||''}" placeholder="과목" oninput="W._cu('${date}','${rid}','subject',this.value)"></td>
          <td><select class="cs" onchange="W._cu('${date}','${rid}','status',this.value)">
            ${STS.map(s=>`<option value="${s}"${r.status===s?' selected':''}>${s}</option>`).join('')}
          </select></td>
          <td><select class="cs" onchange="W._cu('${date}','${rid}','result',this.value)">
            <option value="">-</option>
            ${RES.map(s=>`<option value="${s}"${r.result===s?' selected':''}>${s}</option>`).join('')}
          </select></td>
          <td><input class="cn" value="${r.paid?F(N(r.paid)):''}" placeholder="0" oninput="W._cu('${date}','${rid}','paid',this.value)"></td>
          <td><input class="cn" value="${r.expected?F(N(r.expected)):''}" placeholder="0" oninput="W._cu('${date}','${rid}','expected',this.value)"></td>
          <td><input class="ci" style="width:46px" value="${r.time||''}" placeholder="00:00" oninput="W._cu('${date}','${rid}','time',this.value)"></td>
          <td><input class="ci" value="${r.note||''}" placeholder="비고" oninput="W._cu('${date}','${rid}','note',this.value)"></td>
          <td><button class="dbc" onclick="W._cd('${date}','${rid}')">×</button></td>
        </tr>`;
      });
      h+=`</tbody></table><button class="arb" onclick="W._ca('${date}')">+ 행 추가</button>`;
    }
  });

  h+=`<div style="margin-top:11px;display:flex;gap:8px;align-items:center">
    <input type="date" id="cdi" value="${todayStr()}"
      style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--text);background:var(--bg2)">
    <button onclick="W._cad()" style="padding:6px 14px;border-radius:7px;font-size:12px;font-weight:700;background:var(--accent);color:#fff;border:none;cursor:pointer">+ 날짜 추가</button>
  </div>`;
  return h;
}

// ── 전역 핸들러 W ─────────────────────────────────────
// 입력값 콤마 포맷
function formatBizInp(el) {
  const n = N(el.value);
  const pos = el.selectionStart;
  const old = el.value;
  el.value = n ? F(n) : '';
  // 커서 위치 보정
  const diff = el.value.length - old.length;
  try { el.setSelectionRange(pos+diff, pos+diff); } catch(e){}
}

const W = {
  _swDash() {
    curMonth='current'; cw=-1;
    // 대시보드 소메뉴 토글
    const dashSub = document.getElementById('nav-dash-sub');
    const isOpen = dashSub && dashSub.style.display !== 'none';
    if(dashSub) dashSub.style.display = isOpen ? 'none' : '';
    // 영업현황 소메뉴 닫기
    const bizSub = document.getElementById('nav-biz-sub');
    if(bizSub) bizSub.style.display = 'none';
    // 활성화
    ['nav-dash','nav-w0','nav-w1','nav-w2','nav-w3','nav-biz','nav-biz-sum','nav-biz-con'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    document.getElementById('nav-dash')?.classList.add('on');
    const pt = document.getElementById('page-title');
    if(pt) pt.textContent = '대시보드';
    renderMain();
  },
  _swBiz(tab) {
    curMonth='current'; cw=99; bst=tab;
    // 소메뉴 표시
    document.getElementById('nav-biz-sub').style.display='';
    // 활성화
    ['nav-dash','nav-w0','nav-w1','nav-w2','nav-w3','nav-biz'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    document.getElementById('nav-biz')?.classList.add('on');
    ['nav-biz-sum','nav-biz-con','nav-biz-unp','nav-biz-add'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    if(tab==='요약') document.getElementById('nav-biz-sum')?.classList.add('on');
    else if(tab==='상담내역') document.getElementById('nav-biz-con')?.classList.add('on');
    else if(tab==='미납리스트') document.getElementById('nav-biz-unp')?.classList.add('on');
    else if(tab==='추가리스트') document.getElementById('nav-biz-add')?.classList.add('on');
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent = tab==='요약'?'영업 요약':tab==='상담내역'?'상담 내역':tab==='미납리스트'?'미납 리스트':'추가 리스트';
    showBiz();
  },
  _sw(wi) {
    curMonth='current'; cw=wi;
    if(wi===99){
      document.getElementById('nav-biz-sub').style.display='';
      document.getElementById('nav-dash-sub').style.display='none';
    } else {
      document.getElementById('nav-biz-sub').style.display='none';
      document.getElementById('nav-dash-sub').style.display='';
    }
    renderTabs();
    if(wi===99) showBiz();
    else { tcBuilt=false; rvBuilt=false; renderMain(); }
  },
  _setMonth(month) {
    curMonth=month; cw=-1;
    if(month.startsWith('sales/')) arcSubTab='결산';
    else arcSubTab='영업';
    renderTabs(); renderSbMonths(); renderArchiveView(month);
  },
  _arcTab(month, tab) {
    arcSubTab=tab; renderArchiveView(month);
  },
  _di(field,val) {
    DAILY[field]=N(val); set(rDaily,DAILY); updDailyCalc(); if(cw<99) renderMsg();
  },
  _sv(team,field,val) {
    DATA[team][cw][field]=val; set(rSales,DATA); updTStats(); renderKPI(); renderSum(); renderMsg();
  },
  _rv(team,field,val) { REVIEW[team][field]=val; set(rReview,REVIEW); },
  _bst(tab) {
    bst=tab;
    ['nav-biz-sum','nav-biz-con','nav-biz-unp','nav-biz-add'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
    if(tab==='요약') document.getElementById('nav-biz-sum')?.classList.add('on');
    else if(tab==='상담내역') document.getElementById('nav-biz-con')?.classList.add('on');
    else if(tab==='미납리스트') document.getElementById('nav-biz-unp')?.classList.add('on');
    else if(tab==='추가리스트') document.getElementById('nav-biz-add')?.classList.add('on');
    const pt=document.getElementById('page-title');
    if(pt) pt.textContent = tab==='요약'?'영업 요약':tab==='상담내역'?'상담 내역':tab==='미납리스트'?'미납 리스트':'추가 리스트';
    showBiz();
  },
  _bm(team,member,field,val) {
    const n=N(val);
    if(!BIZ[team]) BIZ[team]={};
    if(!BIZ[team][member]) BIZ[team][member]={sales:0,inquiry:0,totalSales:0,refund:0};
    BIZ[team][member][field]=n;
    // 순매출 자동 표시
    const bd=BIZ[team][member];
    const net=(bd.totalSales||0)-(bd.refund||0);
    const netEl=document.getElementById("biz-net-"+team+"-"+member);
    if(netEl) netEl.textContent=F(net);
    // 팀 합계 업데이트
    const teamCfg = TM_CFG.find(t=>t.name===team);
    if(teamCfg){
      const tTM = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.totalSales||0),0);
      const tRef = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.refund||0),0);
      const tGoalSum = teamCfg.members.reduce((s,m)=>s+(BIZ[team]?.[m]?.goal||0),0);
      const tmEl = document.getElementById("biz-tm-"+team);
      const refEl = document.getElementById("biz-ref-"+team);
      const netEl2 = document.getElementById("biz-net-"+team+"-team");
      const goalEl = document.getElementById("biz-goal-"+team);
      if(tmEl) tmEl.textContent = F(tTM);
      if(refEl) refEl.textContent = F(tRef);
      if(netEl2) netEl2.textContent = F(tTM-tRef);
      if(goalEl) goalEl.textContent = F(tGoalSum);
    }
    set(rBiz,BIZ); updBizKPI();
  },
  _cc(date) { cCol[date]=!cCol[date]; showBiz(); },
  _cu(date,rid,field,val) {
    if(!CONSULT[date]||!CONSULT[date][rid]) return;
    CONSULT[date][rid][field]=val; set(rConsult,CONSULT); updBizKPI();
  },
  _ca(date) {
    if(!CONSULT[date]) CONSULT[date]={};
    const id=Math.random().toString(36).slice(2,10);
    CONSULT[date][id]={mentor:'',student:'',subject:'',status:'상담',result:'',paid:'',expected:'',time:'',note:''};
    set(rConsult,CONSULT); showBiz();
  },
  _cad() {
    const date=document.getElementById('cdi')?.value; if(!date) return;
    if(!CONSULT[date]) CONSULT[date]={};
    const id=Math.random().toString(36).slice(2,10);
    CONSULT[date][id]={mentor:'',student:'',subject:'',status:'상담',result:'',paid:'',expected:'',time:'',note:''};
    cCol[date]=false; set(rConsult,CONSULT); showBiz();
  },
  _cd(date,rid) {
    if(!confirm('삭제할까요?')) return;
    delete CONSULT[date][rid];
    if(!Object.keys(CONSULT[date]).length) delete CONSULT[date];
    set(rConsult,CONSULT); showBiz();
  },
  _csearch(kw) {
    const el = document.getElementById('bc');
    if(!el) return;
    const nav = document.querySelector('.bsn')?.outerHTML || '';
    // 검색창 현재 값 저장
    const curInp = document.getElementById('consult-search');
    const curVal = curInp ? curInp.value : kw;
    el.innerHTML = nav + renderConsult(curVal);
    // 검색창 포커스 & 커서 끝으로
    const inp = document.getElementById('consult-search');
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  },
  _csearchDebounce(val) {
    clearTimeout(window._csTimer);
    window._csTimer = setTimeout(() => W._csearch(val), 300);
  },
  _noticeEdit() {
    NOTICE.editing = !NOTICE.editing;
    const disp = document.getElementById('notice-content-display');
    const inp = document.getElementById('notice-input');
    const btn = document.getElementById('notice-edit-btn');
    if (NOTICE.editing) {
      if(disp) disp.style.display='none';
      if(inp) { inp.style.display=''; inp.focus(); }
      if(btn) btn.textContent='✅ 저장';
    } else {
      const txt = document.getElementById('notice-input')?.value || '';
      NOTICE.text = txt;
      set(rNotice, {text: txt});
      if(disp) { disp.textContent = txt||'(공지사항이 없습니다)'; disp.style.display=''; }
      if(inp) inp.style.display='none';
      if(btn) btn.textContent='✏ 수정';
    }
  },
  _noticeInput(val) { NOTICE.text = val; },
  _alAdd() {
    const id = Math.random().toString(36).slice(2,10);
    ADDLIST[id] = {team:'',mentor:'',student:'',age:'',subject:'',remaining:'',interviewDate:'',availableDate:'',expectedAmount:'',status:'진행중',note:''};
    set(rAddList, ADDLIST);
    if(cw===99 && bst==='추가리스트') showBiz();
  },
  _alAddTeam(teamName) {
    const id = Math.random().toString(36).slice(2,10);
    ADDLIST[id] = {team:teamName,mentor:'',student:'',age:'',subject:'',remaining:'',interviewDate:'',availableDate:'',expectedAmount:'',status:'진행중',note:''};
    set(rAddList, ADDLIST);
    if(cw===99 && bst==='추가리스트') showBiz();
  },
  _alDel(id) {
    if(!confirm('삭제할까요?')) return;
    delete ADDLIST[id];
    set(rAddList, ADDLIST);
    if(cw===99 && bst==='추가리스트') showBiz();
  },
  _alUpdate(id, field, val) {
    if(!ADDLIST[id]) return;
    ADDLIST[id][field] = val;
    // 멘토 선택 시 팀 자동 세팅
    if(field==='mentor' && val) {
      const t = getTeam(val);
      if(t) ADDLIST[id].team = t.name;
    }
    set(rAddList, ADDLIST);
    if(field==='status' && cw===99 && bst==='추가리스트') showBiz();
  },
  _cp() {
    navigator.clipboard.writeText(document.getElementById('mbox').textContent).then(()=>{
      const b=document.getElementById('cpbtn'); b.textContent='✅ 복사됨!'; b.classList.add('done');
      setTimeout(()=>{b.textContent='📋 복사';b.classList.remove('done');},2000);
    });
  },
};

window.W = W;
cw=-1; renderTabs(); renderMain();
</script>
